apiVersion: v2
name: formbricks
description: A Helm chart for Formbricks with PostgreSQL, Redis

type: application

# Helm chart Version
version: 0.0.0-dev

# This is the version number of the application being deployed.
appVersion: "3.7.0"

icon: https://formbricks.com/favicon.ico

keywords:
  - formbricks
  - postgresql
  - redis

home: https://formbricks.com/docs/self-hosting/setup/kubernetes
maintainers:
  - name: Formbricks
    email: info@formbricks.com

dependencies:
  - name: postgresql
    version: "16.4.16"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: redis
    version: 20.11.2
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled
  - name: gateway-helm
    alias: envoy
    version: "v1.7.1"
    repository: "oci://docker.io/envoyproxy"
    condition: envoy.controller.enabled
  - name: redis
    alias: envoyRedis
    version: 20.11.2
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: envoyRedis.enabled

{{- if and .Values.authzed.enabled (eq .Values.authzed.mode "selfHosted") (or (not .Values.authzed.auth.existingSecret) (not .Values.authzed.datastore.existingSecret)) }}
{{- if and (not .Values.authzed.datastore.existingSecret) (not .Values.postgresql.enabled) }}
{{- fail "authzed.datastore.existingSecret is required for selfHosted AuthZed with external PostgreSQL" }}
{{- end }}
{{- $presharedKey := include "formbricks.authzedPresharedKey" . -}}
{{- $databasePassword := include "formbricks.authzedDatabasePassword" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "formbricks.authzedManagedSecretName" . }}
  labels:
    {{- include "formbricks.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.authzed.auth.existingSecret }}
  {{ .Values.authzed.auth.tokenKey }}: {{ $presharedKey | quote }}
  {{- end }}
  {{- if not .Values.authzed.datastore.existingSecret }}
  {{ .Values.authzed.datastore.uriKey }}: {{ printf "postgresql://spicedb:%s@formbricks-postgresql:5432/spicedb?sslmode=disable" $databasePassword | quote }}
  database_password: {{ $databasePassword | quote }}
  {{- end }}
{{- end }}

{{- if .Values.migration.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "formbricks.migrationJobName" . }}
  labels:
    {{- include "formbricks.labels" . | nindent 4 }}
  annotations:
    # Argo CD sync hook: keep this in Sync phase so lower-wave managed
    # resources such as ExternalSecrets are applied before migrations run.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
    {{- if .Values.migration.annotations }}
    {{- toYaml .Values.migration.annotations | nindent 4 }}
    {{- end }}
spec:
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished | default 300 }}
  backoffLimit: {{ .Values.migration.backoffLimit | default 3 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "formbricks.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      {{- if .Values.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.deployment.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.deployment.tolerations }}
      tolerations:
        {{- toYaml .Values.deployment.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.deployment.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.deployment.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if .Values.rbac.serviceAccount.enabled }}
      serviceAccountName: {{ .Values.rbac.serviceAccount.name | default (include "formbricks.name" .) }}
      {{- end }}
      {{- if .Values.deployment.securityContext }}
      securityContext:
        {{- toYaml .Values.deployment.securityContext | nindent 8 }}
      {{- end }}
      {{- if .Values.migration.waitForDatabase.enabled }}
      initContainers:
        - name: wait-for-database
          image: {{ include "formbricks.deploymentImage" . }}
          imagePullPolicy: {{ .Values.deployment.image.pullPolicy }}
          command:
            - node
            - packages/database/dist/scripts/wait-for-database.js
          args:
            - --timeout-seconds
            - {{ .Values.migration.waitForDatabase.timeoutSeconds | quote }}
            - --interval-seconds
            - {{ .Values.migration.waitForDatabase.intervalSeconds | quote }}
            - --connection-timeout-seconds
            - {{ .Values.migration.waitForDatabase.connectionTimeoutSeconds | quote }}
          {{- include "formbricks.migrationEnvironment" . | nindent 10 }}
          {{- if .Values.migration.resources }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: migration
          image: {{ include "formbricks.deploymentImage" . }}
          imagePullPolicy: {{ .Values.deployment.image.pullPolicy }}
          command:
            - node
            - packages/database/dist/scripts/apply-migrations.js
          {{- include "formbricks.migrationEnvironment" . | nindent 10 }}
          {{- if .Values.migration.resources }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
          {{- end }}
{{- end }}

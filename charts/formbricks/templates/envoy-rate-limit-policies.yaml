      rules:
        - clientSelectors:
            - headers:
                - name: x-api-key
                  type: Distinct
              methods:
                - value: DELETE
              path:
                type: RegularExpression
                value: ^/storage/[^/]+/(public|private)/.+$
          limit:
            requests: 5
            unit: Minute
{{- end }}
{{- end }}

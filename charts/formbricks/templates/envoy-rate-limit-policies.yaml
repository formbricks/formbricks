{{- if and .Values.envoy.formbricks.routes.v1Management .Values.envoy.formbricks.policies.v1Management }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ printf "%s-v1-management-rate-limit" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "formbricks.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ printf "%s-v1-management" $proxyServiceName }}
  rateLimit:
    global:
      rules:
        - clientSelectors:
            - headers:
                - name: x-api-key
                  type: Distinct
              methods:
                - value: POST
              path:
                type: Exact
                value: /api/v1/management/storage
          limit:
            requests: 5
            unit: Minute
        - clientSelectors:
            - headers:
                - name: x-api-key
                  type: Distinct
              methods:
                - value: GET
                - value: POST
                - value: PUT
                - value: PATCH
                - value: DELETE
              path:
                type: PathPrefix
                value: /api/v1/management/
          limit:
            requests: 100
            unit: Minute
{{- end }}

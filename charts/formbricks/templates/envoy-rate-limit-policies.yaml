{{- if and .Values.envoy.enabled .Values.envoy.formbricks.policies.enabled }}
{{- $namespace := include "formbricks.namespace" . -}}
{{- $proxyServiceName := include "formbricks.envoy.proxyServiceName" . -}}
{{- if and .Values.envoy.formbricks.routes.authCallback .Values.envoy.formbricks.policies.authCallback }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ printf "%s-auth-rate-limit" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "formbricks.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ printf "%s-auth-callback" $proxyServiceName }}
  rateLimit:
    global:
      rules:
        - clientSelectors:
            - sourceCIDR:
                type: Distinct
                value: 0.0.0.0/0
              methods:
                - value: POST
              path:
                type: Exact
                value: /api/auth/callback/credentials
          limit:
            requests: 40
            unit: Hour
        - clientSelectors:
            - sourceCIDR:
                type: Distinct
                value: ::/0
              methods:
                - value: POST
              path:
                type: Exact
                value: /api/auth/callback/credentials
          limit:
            requests: 40
            unit: Hour
        - clientSelectors:
            - sourceCIDR:
                type: Distinct
                value: 0.0.0.0/0
              methods:
                - value: POST
              path:
                type: Exact
                value: /api/auth/callback/token
          limit:
            requests: 10
            unit: Hour
        - clientSelectors:
            - sourceCIDR:
                type: Distinct
                value: ::/0
              methods:
                - value: POST
              path:
                type: Exact
                value: /api/auth/callback/token
          limit:
            requests: 10
            unit: Hour
{{- end }}
{{- if and .Values.envoy.formbricks.routes.v1Client .Values.envoy.formbricks.policies.v1Client }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ printf "%s-v1-client-rate-limit" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "formbricks.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ printf "%s-v1-client" $proxyServiceName }}
  rateLimit:
    global:
      rules:
        - clientSelectors:
            - sourceCIDR:
                type: Distinct
                value: 0.0.0.0/0
              methods:
                - value: POST
              path:
                type: RegularExpression
                value: ^/api/v1/client/[^/]+/storage$
          limit:
            requests: 5
            unit: Minute
        - clientSelectors:
            - sourceCIDR:
                type: Distinct
                value: ::/0
              methods:
                - value: POST
              path:
                type: RegularExpression
                value: ^/api/v1/client/[^/]+/storage$
          limit:
            requests: 5
            unit: Minute
        - clientSelectors:
            - sourceCIDR:
                type: Distinct
                value: 0.0.0.0/0
              methods:
                - value: GET
                - value: POST
                - value: PUT
                - value: PATCH
                - value: DELETE
              path:
                type: RegularExpression
                value: ^/api/v1/client/[^/]+/(environment|responses(?:/[^/]+)?|displays|user)$
          limit:
            requests: 100
            unit: Minute
        - clientSelectors:
            - sourceCIDR:
                type: Distinct
                value: ::/0
              methods:
                - value: GET
                - value: POST
                - value: PUT
                - value: PATCH
                - value: DELETE
              path:
                type: RegularExpression
                value: ^/api/v1/client/[^/]+/(environment|responses(?:/[^/]+)?|displays|user)$
          limit:
            requests: 100
            unit: Minute
{{- end }}

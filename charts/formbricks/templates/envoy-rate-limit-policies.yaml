                type: Distinct
                value: 0.0.0.0/0
              methods:
                - value: POST
              path:
                type: RegularExpression
                value: ^/api/v2/client/[^/]+/storage$
          limit:
            requests: 5
            unit: Minute
        - clientSelectors:
            - sourceCIDR:
                type: Distinct
                value: ::/0
              methods:
                - value: POST
              path:
                type: RegularExpression

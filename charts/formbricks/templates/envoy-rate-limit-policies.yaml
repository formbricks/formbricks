{{- if and .Values.envoy.formbricks.routes.storage .Values.envoy.formbricks.policies.storage }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ printf "%s-storage-rate-limit" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:

# Override the name for the application.
# If not set, the chart name will be used.
nameOverride: ""

# Override the name of the application component.
# Defaults to the same value as nameOverride.
componentOverride: ""

# Override the application "part-of" label.
# Defaults to the chart name if not set.
partOfOverride: ""

##########################################################
# Formbricks Configuration
##########################################################
formbricks:
  # REQUIRED: Base URL of the site (e.g., https://formbricks.example.com)
  # This is used for WEBAPP_URL and NEXTAUTH_URL
  webappUrl: ""

  # Optional: Public URL for surveys (defaults to webappUrl if not set)
  publicUrl: ""

##########################################################
# Enterprise Configuration
##########################################################
enterprise:
  enabled: false
  licenseKey: ""

##########################################################
# Database Migration Job Configuration Helm
##########################################################
migration:
  # Enable migration job for ArgoCD deployments
  # When enabled, migrations run as a PreSync hook before the deployment
  # and the startup migration in the container is skipped
  enabled: true

  # Additional annotations for the migration job
  annotations: {}

  # Time to keep the job after completion (seconds)
  ttlSecondsAfterFinished: 300

  # Number of retries before marking the job as failed
  backoffLimit: 3

  # Resource requests and limits for the migration job
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
      cpu: "100m"

##########################################################
# Deployment Configuration
##########################################################
deployment:
  # Deployment strategy configuration
  strategy:
    type: RollingUpdate # Type of deployment strategy (RollingUpdate/Recreate)
    # rollingUpdate:
    #   maxSurge: 25%
    #   maxUnavailable: 25%

  # Automatically reload deployment when ConfigMaps or Secrets change
  reloadOnChange: false

  # NodeSelector for scheduling pods on specific nodes
  nodeSelector: {}

  # Additional labels for Deployment
  additionalLabels: {}

  # Additional pod labels to be used in the Service's label selector
  additionalPodLabels: {}

  # Deployment annotations
  annotations: {}

  # Additional pod annotations
  additionalPodAnnotations: {}

  # Number of replicas when autoscaling is disabled
  replicas: 1

  # Image pull secrets for private container registries
  imagePullSecrets: ""

  # Environment variables from ConfigMaps or Secrets
  envFrom:
    # app-secrets:
    #   type: secret
    #   nameSuffix: app-secrets

  # Environment variables passed to the app container.
  # Cube is bundled by default (see the `cube` section below). To use an external Cube cluster instead,
  # set `cube.enabled: false` and provide CUBEJS_API_URL / CUBEJS_API_SECRET here via deployment.env or envFrom.
  env: {}

  # Tolerations for scheduling pods on tainted nodes
  tolerations: []

  # Pod affinity and anti-affinity rules
  affinity: {}

  # Topology spread constraints for better scheduling
  topologySpreadConstraints: []

  # Number of previous ReplicaSet versions to retain
  revisionHistoryLimit: 2

  # Application container image
  image:
    repository: "ghcr.io/formbricks/formbricks"
    tag: "" # Defaults to appVersion if not set
    digest: "" # If set, digest takes precedence over the tag
    pullPolicy: IfNotPresent

  # Health probes configuration
  probes:
    startupProbe:
      failureThreshold: 30
      periodSeconds: 10
      tcpSocket:
        port: 3000

    readinessProbe:
      failureThreshold: 5
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 5
      initialDelaySeconds: 10
      httpGet:
        path: /health
        port: 3000

    livenessProbe:
      failureThreshold: 5
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 5
      initialDelaySeconds: 10
      httpGet:
        path: /health
        port: 3000

  # Resource requests and limits
  resources:
    limits:
      memory: 2Gi
    requests:
      memory: 1Gi
      cpu: "1"

  # Container security context
  containerSecurityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true

  # Pod security context
  securityContext: {}

  # Command override
  command: []

  # Arguments override
  args: []

  # Container ports
  ports:
    http:
      containerPort: 3000
      protocol: TCP
      exposed: true
    metrics:
      containerPort: 9464
      protocol: TCP
      exposed: true

##########################################################
# Horizontal Pod Autoscaler (HPA)
##########################################################
autoscaling:
  enabled: true # Enable/disable HPA
  additionalLabels: {} # Additional labels for the HPA resource
  annotations: {} # Annotations for HPA
  minReplicas: 1 # Minimum number of replicas
  maxReplicas: 10 # Maximum number of replicas
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300 # Wait 5 minutes before scaling down to prevent thrashing
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120 # Remove at most 1 pod every 2 minutes
    scaleUp:
      stabilizationWindowSeconds: 60 # Wait 1 minute before scaling up
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60 # Add at most 2 pods every minute

##########################################################
# Pod Disruption Budget (PDB)
#
# Ensures a minimum number of pods remain available during
# voluntary disruptions (node drains, cluster upgrades, etc.).
#
# IMPORTANT:
#   - minAvailable and maxUnavailable are MUTUALLY EXCLUSIVE.
#     Setting both will cause a helm install/upgrade failure.
#     To switch, set the unused one to null in your override file.
#   - Accepts an integer (e.g., 1) or a percentage string (e.g., "25%").
#   - For PDB to provide real HA protection, ensure
#     autoscaling.minReplicas >= 2 (or deployment.replicas >= 2
#     if HPA is disabled). With only 1 replica and minAvailable: 1,
#     the PDB will block ALL node drains and cluster upgrades.
##########################################################
pdb:
  enabled: true
  additionalLabels: {}
  annotations: {}

  # Minimum pods that must remain available during disruptions.
  # Set to null and configure maxUnavailable instead if preferred.
  minAvailable: 1

  # Maximum pods that can be unavailable during disruptions.
  # Mutually exclusive with minAvailable — uncomment and set
  # minAvailable to null to use this instead.
  # maxUnavailable: 1

  # Eviction policy for unhealthy pods (Kubernetes 1.27+).
  # "IfHealthy"    — unhealthy pods count toward the budget (default).
  # "AlwaysAllow"  — unhealthy pods can always be evicted,
  #                  preventing them from blocking node drain.
  # unhealthyPodEvictionPolicy: AlwaysAllow

##########################################################
# Service Configuration
##########################################################
service:
  enabled: true # Enable/disable Kubernetes Service
  additionalLabels: {} # Additional labels for Service
  annotations: {} # Annotations for Service
  type: ClusterIP # Service type (ClusterIP, NodePort, LoadBalancer)
  ports: [] # Additional ports

##########################################################
# Role-Based Access Control (RBAC)
##########################################################
rbac:
  enabled: false # Enable/disable RBAC
  serviceAccount:
    enabled: false # Enable/disable ServiceAccount
    name: "" # Custom ServiceAccount name
    additionalLabels: {} # Additional labels
    annotations: {} # Annotations

##########################################################
# Kubernetes Secret Configuration (Quick Start)
##########################################################
secret:
  enabled: true

##########################################################
# External Secrets Configuration
##########################################################
externalSecret:
  enabled: false # Enable/disable ExternalSecrets
  secretStore:
    name: aws-secrets-manager # Secret store reference name
    kind: ClusterSecretStore # Type of secret store
  refreshInterval: "1h" # Frequency of secret sync
  files: {}

##########################################################
# Ingress Configuration
##########################################################
ingress:
  enabled: false # Enable/disable Ingress
  ingressClassName: alb # Specify the Ingress class
  hosts:
    - host: k8s.formbricks.com
      paths:
        - path: /
          pathType: "Prefix"
          serviceName: "formbricks"
  annotations: {} # Ingress annotations

##########################################################
# Envoy Gateway Bundle
##########################################################
envoy:
  # Enable app-bound Envoy resources (Gateway, HTTPRoutes, policies, ingress)
  enabled: false

  # Install the Envoy Gateway controller from this chart when true.
  # Leave disabled when the cluster already provides a compatible controller.
  controller:
    enabled: false

  createNamespace: false

  deployment:
    replicas: 1
    envoyGateway:
      resources:
        limits:
          memory: 1024Mi
        requests:
          cpu: 100m
          memory: 256Mi
      pod:
        topologySpreadConstraints: []
        tolerations: []
        nodeSelector: {}
    ports:
      - name: grpc
        port: 18000
        targetPort: 18000
      - name: ratelimit
        port: 18001
        targetPort: 18001
      - name: wasm
        port: 18002
        targetPort: 18002
      - name: metrics
        port: 19001
        targetPort: 19001

  service:
    type: ClusterIP
    annotations: {}

  config:
    envoyGateway:
      gateway:
        controllerName: gateway.envoyproxy.io/formbricks-envoy-controller
      provider:
        type: Kubernetes
        kubernetes:
          deploy:
            type: GatewayNamespace
          rateLimitDeployment:
            replicas: 1
            container:
              env:
                - name: CACHE_KEY_PREFIX
                  value: "formbricks:"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
      logging:
        level:
          default: info
          global-ratelimit: info
      rateLimit:
        backend:
          type: Redis
          redis:
            # Override this when enabling envoyRedis auth or changing envoyRedis.fullnameOverride.
            url: "formbricks-envoy-redis-master:6379"
        failClosed: false
        telemetry:
          metrics:
            prometheus:
              disable: false
      envoyProxy:
        logging:
          level:
            default: info
        preserveRouteOrder: true

  formbricks:
    gatewayClass:
      create: true
      # Required when create=false so the Gateway can bind to an existing cluster-scoped GatewayClass.
      name: ""
    gateway:
      name: ""
      listenerName: http
      port: 80
    proxy:
      name: ""
      replicas: 1
      service:
        name: ""
        type: ClusterIP
        annotations: {}
      logging:
        defaultLevel: info
      telemetry:
        prometheus:
          enabled: true
        openTelemetry:
          enabled: false
          # Prefer host/port when the collector Service lives in another namespace.
          host: ""
          port: 4317
          serviceName: ""
          serviceNamespace: ""
          deploymentEnvironment: ""
          # Use backendRefs only when you intentionally want Service discovery through Gateway API refs.
          backendRefs: []
    clientTrafficPolicy:
      enabled: true
      numTrustedHops: 2
    ingress:
      enabled: false
      ingressClassName: ""
      # Set this explicitly when both the main app ingress and the Envoy API ingress are enabled.
      host: ""
      annotations: {}
    routes:
      authCallback: true
      v1Client: true
      v2Client: true
      v1Management: true
      v1Webhooks: true
      feedbackRecords: false
      storage: true
    policies:
      enabled: false
      authCallback: true
      v1Client: true
      v2Client: true
      v1Management: true
      v1Webhooks: true
      storage: true

##########################################################
# Dedicated Redis for Envoy Rate Limiting
##########################################################
envoyRedis:
  enabled: false
  fullnameOverride: "formbricks-envoy-redis"
  # Only affects the bundled envoy Redis release.
  # If you point Envoy rate limiting at an external Redis/Valkey instance instead,
  # configure that deployment separately with `maxmemory-policy noeviction`.
  architecture: replication
  rbac:
    create: true
  serviceAccount:
    create: true
    automountServiceAccountToken: true
  auth:
    enabled: false
  commonConfiguration: |-
    appendonly yes
    save ""
  networkPolicy:
    enabled: false
  master:
    resources: {}
    podAntiAffinityPreset: soft
    topologySpreadConstraints: []
    persistence:
      enabled: true
      size: 8Gi
      storageClass: ""
    pdb:
      create: true
      maxUnavailable: 1
  replica:
    replicaCount: 2
    automountServiceAccountToken: true
    resources: {}
    podAntiAffinityPreset: soft
    topologySpreadConstraints: []
    persistence:
      enabled: true
      size: 8Gi
      storageClass: ""
    pdb:
      create: true
      maxUnavailable: 1
  sentinel:
    enabled: true
    quorum: 2
    masterSet: formbricksenvoy
    getMasterTimeout: 90
    automateClusterRecovery: false
    redisShutdownWaitFailover: true
    resources: {}
    persistence:
      enabled: false
    service:
      type: ClusterIP
    masterService:
      enabled: true
      type: ClusterIP
  metrics:
    enabled: false

##########################################################
# Redis Configuration
##########################################################
redis:
  enabled: true # Enable/disable Redis
  # Use this to point Formbricks jobs and cache traffic at an existing Redis/Valkey deployment.
  # External Redis instances must also be configured with `maxmemory-policy noeviction`
  # in their redis.conf/valkey.conf (or equivalent managed-service setting) to avoid BullMQ job loss.
  externalRedisUrl: ""
  fullnameOverride: "formbricks-redis"
  architecture: standalone
  commonConfiguration: |-
    appendonly yes
    save ""
    maxmemory-policy noeviction
  auth:
    enabled: true
    existingSecret: "formbricks-app-secrets"
    existingSecretPasswordKey: "REDIS_PASSWORD"
  networkPolicy:
    enabled: false
  master:
    persistence:
      enabled: true

##########################################################
# Service Monitor to collect Prometheus metrices
##########################################################
serviceMonitor:
  enabled: true

  # Additional labels
  additionalLabels:
  # key: value

  # Additional annotations
  annotations:
  # key: value

  # List of the endpoints of service from which prometheus will scrape data
  endpoints:
    - interval: 5s
      path: /metrics
      port: metrics

##########################################################
# Cube.js Analytics Configuration
##########################################################
cube:
  # Cube semantic-layer service used by Formbricks analytics. Bundled by default.
  # Set to false only if you want to point the app at an external Cube cluster
  # via deployment.env.CUBEJS_API_URL (CUBEJS_API_SECRET must still be provided).
  enabled: true
  replicas: 1

  image:
    repository: "cubejs/cube"
    tag: "v1.6.6"
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  port: 4000

  service:
    type: ClusterIP
    port: 4000

  # The generated app secret supplies CUBEJS_API_SECRET when secret.enabled=true.
  # Secret values such as CUBEJS_DB_* should be supplied through envFrom or another secret-management
  # flow.
  envFrom: []

  env:
    CUBEJS_DB_TYPE: "postgres"
    CUBEJS_DEFAULT_API_SCOPES: "meta,data"
    # Keep the in-memory cache/queue driver at one Cube replica only. The chart
    # fails rendering when this remains "memory" and cube.replicas is greater than 1.
    CUBEJS_CACHE_AND_QUEUE_DRIVER: "memory"
    CUBEJS_JWT_ISSUER: "formbricks-web"
    CUBEJS_JWT_AUDIENCE: "formbricks-cube"

  containerSecurityContext:
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000

  livenessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  resources:
    limits:
      memory: 1Gi
    requests:
      memory: 512Mi
      cpu: "250m"

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

##########################################################
# Hub API Configuration
# Formbricks Hub image: ghcr.io/formbricks/hub
##########################################################
hub:
  # Hub is mandatory in Formbricks 5. Keep this enabled.
  enabled: true
  replicas: 1

  image:
    repository: "ghcr.io/formbricks/hub"
    # Pinned by digest for immutable, reproducible deployments. When digest is set it takes
    # precedence over tag, and deployment, init container, and migration job all resolve to the
    # same immutable image. Update on each Hub release.
    # Current digest corresponds to ghcr.io/formbricks/hub:0.3.0.
    digest: "sha256:6c39b1143527137e881df785a5b668625a1fe3edb05485bb5ded19f813c8de88"
    # Tag is a fallback for dev/non-prod when digest is cleared; keep aligned with the digest above.
    tag: "0.3.0"
    pullPolicy: IfNotPresent

  # Optional override for the secret Hub reads from.
  # Defaults to the generated app secret (<release>-app-secrets), which contains DATABASE_URL and HUB_API_KEY.
  # If you set this, the custom secret must provide DATABASE_URL and HUB_API_KEY.
  # The app secret still needs HUB_API_KEY as well because the web app talks to Hub directly.
  # When secret.enabled=true, the custom Hub secret must already exist at render time so Helm can copy HUB_API_KEY
  # into the generated app secret and Envoy credential.
  existingSecret: ""

  # Optional env vars (non-secret). Use existingSecret for secret values such as DATABASE_URL and HUB_API_KEY.
  env: {}

  # Optional autoscaling for the Hub API deployment.
  autoscaling:
    enabled: false
    additionalLabels: {}
    annotations: {}
    minReplicas: 1
    maxReplicas: 3
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80
    behavior: {}

  # Optional PDB for the Hub API deployment. Disabled by default because a single
  # Hub replica with minAvailable: 1 blocks voluntary node drains.
  pdb:
    enabled: false
    additionalLabels: {}
    annotations: {}
    minAvailable: 1
    # maxUnavailable: 1
    # unhealthyPodEvictionPolicy: AlwaysAllow

  worker:
    # Hub async jobs (webhook dispatch, embeddings) run in hub-worker. Keep this
    # enabled unless another worker deployment processes the same River queues.
    enabled: true
    replicas: 1

    # Optional env vars (non-secret) added only to hub-worker.
    env: {}

    waitForApi:
      # Avoid starting workers before the API service is healthy during installs/upgrades.
      enabled: true
      # 120 attempts * 5 seconds = 10 minutes.
      maxAttempts: 120

    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi
        cpu: "100m"

    autoscaling:
      enabled: false
      additionalLabels: {}
      annotations: {}
      minReplicas: 1
      maxReplicas: 5
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 70
        - type: Resource
          resource:
            name: memory
            target:
              type: Utilization
              averageUtilization: 80
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Pods
              value: 1
              periodSeconds: 120
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 2
              periodSeconds: 60

    # Disabled by default because the default worker replica count is 1.
    pdb:
      enabled: false
      additionalLabels: {}
      annotations: {}
      minAvailable: 1
      # maxUnavailable: 1
      # unhealthyPodEvictionPolicy: AlwaysAllow

    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []

  embeddings:
    # Optional self-hosted OpenAI-compatible embeddings runtime for Hub.
    enabled: false
    runtime: tei
    model: Alibaba-NLP/gte-multilingual-base
    revision: ""
    # Defaults to `model` when empty. Used by TEI OpenAI-compatible responses
    # and as Hub's EMBEDDING_MODEL.
    servedModelName: ""
    # Defaults to http://<release>-hub-embeddings:<service.port>/v1 when empty.
    baseUrl: ""
    maxConcurrent: "5"
    normalize: "false"
    replicas: 1

    image:
      repository: "ghcr.io/huggingface/text-embeddings-inference"
      tag: "cpu-1.9"
      pullPolicy: IfNotPresent

    command: []
    # When empty, the chart renders TEI args from model, servedModelName, port,
    # revision, and persistence.mountPath. Set this to fully override args.
    args: []
    # Keeps the default GTE CPU runtime within the default memory budget.
    extraArgs:
      - --dtype
      - float16
    env: {}

    port: 8080
    prometheusPort: 9000

    service:
      type: ClusterIP
      port: 8080
      annotations: {}
      additionalLabels: {}

    auth:
      # TEI can enforce bearer-token auth with API_KEY. Hub always receives the
      # same key as EMBEDDING_PROVIDER_API_KEY because the OpenAI-compatible Hub
      # provider requires an API key.
      enabled: true
      existingSecret: ""
      secretKey: EMBEDDING_PROVIDER_API_KEY
      apiKey: ""

    huggingFace:
      # Required only for private/gated models unless the model is pre-cached.
      existingSecret: ""
      tokenKey: HF_TOKEN
      token: ""

    persistence:
      enabled: true
      existingClaim: ""
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 10Gi
      mountPath: /data

    resources:
      requests:
        cpu: "4"
        memory: 8Gi
      limits:
        memory: 8Gi

    autoscaling:
      enabled: false
      additionalLabels: {}
      annotations: {}
      minReplicas: 1
      maxReplicas: 2
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 70
        - type: Resource
          resource:
            name: memory
            target:
              type: Utilization
              averageUtilization: 80
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 600
          policies:
            - type: Pods
              value: 1
              periodSeconds: 300
        scaleUp:
          stabilizationWindowSeconds: 120
          policies:
            - type: Pods
              value: 1
              periodSeconds: 120

    # Disabled by default because the default embeddings replica count is 1.
    pdb:
      enabled: false
      additionalLabels: {}
      annotations: {}
      minAvailable: 1
      # maxUnavailable: 1
      # unhealthyPodEvictionPolicy: AlwaysAllow

    probes:
      startupProbe:
        failureThreshold: 60
        periodSeconds: 10
        tcpSocket:
          port: http
      readinessProbe:
        failureThreshold: 6
        periodSeconds: 10
        timeoutSeconds: 5
        tcpSocket:
          port: http
      livenessProbe:
        failureThreshold: 6
        periodSeconds: 20
        timeoutSeconds: 5
        tcpSocket:
          port: http

    podAnnotations: {}
    podLabels: {}
    podSecurityContext: {}
    # Keep empty by default because upstream model-serving images may define
    # their own user and need write access to the model cache path.
    securityContext: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []

  # Upgrade migration job runs goose + river before Helm upgrades Hub resources.
  # Fresh installs run the same migrations through the Hub deployment init container.
  migration:
    ttlSecondsAfterFinished: 300
    backoffLimit: 3
    activeDeadlineSeconds: 900

  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
      cpu: "100m"

##########################################################
# PostgreSQL Configuration
##########################################################
postgresql:
  enabled: true # Enable/disable PostgreSQL
  externalDatabaseUrl: ""
  global:
    security:
      allowInsecureImages: true
  fullnameOverride: "formbricks-postgresql"
  image:
    repository: pgvector/pgvector
    tag: pg17
  auth:
    username: formbricks
    database: formbricks
    existingSecret: "formbricks-app-secrets"
    secretKeys:
      adminPasswordKey: "POSTGRES_ADMIN_PASSWORD"
      userPasswordKey: "POSTGRES_USER_PASSWORD"
  primary:
    networkPolicy:
      enabled: false
    persistence:
      enabled: true
      size: 10Gi
    podSecurityContext:
      enabled: true
      fsGroup: 1001
      runAsUser: 1001
    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      readOnlyRootFilesystem: false

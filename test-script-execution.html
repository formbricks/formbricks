<!DOCTYPE html>
<html>
<head>
  <title>Script Execution Test</title>
</head>
<body>
  <h1>Testing Script Execution Methods</h1>
  <div id="results"></div>

  <script>
    const results = document.getElementById('results');
    
    // Test 1: Using textContent (BROKEN approach)
    function testTextContent() {
      const testScript = `
        (function() {
          if (globalThis.window !== undefined) {
            globalThis.window.testObject1 = {
              initialized: true,
              method: function() { return 'working'; }
            };
          }
        })();
      `;
      
      const scriptElement = document.createElement('script');
      scriptElement.textContent = testScript;
      document.head.appendChild(scriptElement);
      
      // Check if it worked
      const worked = typeof window.testObject1 !== 'undefined';
      const result = document.createElement('p');
      result.style.color = worked ? 'green' : 'red';
      result.textContent = `Test 1 (textContent): ${worked ? '✓ PASSED' : '✗ FAILED - Script did not execute'}`;
      results.appendChild(result);
      
      if (!worked) {
        const detail = document.createElement('p');
        detail.style.marginLeft = '20px';
        detail.style.fontSize = '0.9em';
        detail.textContent = `window.testObject1 = ${typeof window.testObject1}`;
        results.appendChild(detail);
      }
    }
    
    // Test 2: Using indirect eval (FIXED approach)
    function testIndirectEval() {
      const testScript = `
        (function() {
          if (globalThis.window !== undefined) {
            globalThis.window.testObject2 = {
              initialized: true,
              method: function() { return 'working'; }
            };
          }
        })();
      `;
      
      // Execute using indirect eval (the fix)
      (0, eval)(testScript);
      
      // Check if it worked
      const worked = typeof window.testObject2 !== 'undefined';
      const result = document.createElement('p');
      result.style.color = worked ? 'green' : 'red';
      result.textContent = `Test 2 (indirect eval): ${worked ? '✓ PASSED - Script executed successfully' : '✗ FAILED'}`;
      results.appendChild(result);
      
      if (worked && window.testObject2.method) {
        const detail = document.createElement('p');
        detail.style.marginLeft = '20px';
        detail.style.fontSize = '0.9em';
        detail.textContent = `window.testObject2.method() = "${window.testObject2.method()}"`;
        results.appendChild(detail);
      }
    }
    
    // Test 3: Simulating the actual formbricksSurveys initialization
    async function testFormbricksSurveysPattern() {
      // Simulate fetching the UMD bundle
      const mockUmdContent = `
        (function() {
          if (globalThis.window !== undefined) {
            globalThis.window.formbricksSurveys = {
              renderSurvey: function(props) { 
                console.log('renderSurvey called with:', props);
                return 'Survey rendered';
              },
              renderSurveyInline: function(props) { return 'Inline survey rendered'; },
              renderSurveyModal: function(props) { return 'Modal survey rendered'; }
            };
          }
        })();
      `;
      
      // Clear any previous test
      delete window.formbricksSurveys;
      
      // Use the FIXED approach (indirect eval)
      (0, eval)(mockUmdContent);
      
      // Try to call renderSurvey
      let callSuccess = false;
      let callResult = null;
      let errorMessage = null;
      
      try {
        if (typeof window.formbricksSurveys !== 'undefined' && 
            typeof window.formbricksSurveys.renderSurvey === 'function') {
          callResult = window.formbricksSurveys.renderSurvey({ test: true });
          callSuccess = true;
        } else {
          errorMessage = 'window.formbricksSurveys.renderSurvey is not a function';
        }
      } catch (e) {
        errorMessage = e.message;
      }
      
      const result = document.createElement('p');
      result.style.color = callSuccess ? 'green' : 'red';
      result.textContent = `Test 3 (formbricksSurveys pattern): ${callSuccess ? '✓ PASSED - No TypeError!' : '✗ FAILED'}`;
      results.appendChild(result);
      
      const detail = document.createElement('p');
      detail.style.marginLeft = '20px';
      detail.style.fontSize = '0.9em';
      if (callSuccess) {
        detail.style.color = 'green';
        detail.textContent = `Successfully called renderSurvey(), result: "${callResult}"`;
      } else {
        detail.style.color = 'red';
        detail.textContent = `Error: ${errorMessage}`;
      }
      results.appendChild(detail);
    }
    
    // Run all tests
    setTimeout(() => {
      testTextContent();
      testIndirectEval();
      testFormbricksSurveysPattern();
    }, 100);
  </script>
</body>
</html>

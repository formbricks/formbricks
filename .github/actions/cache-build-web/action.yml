name: Build & Cache Web App

inputs:
  e2e_testing_mode:
    description: "Set E2E Testing Mode"
    required: false
    default: "0"
  turbo_token:
    description: "Turborepo token"
    required: false
  turbo_team:
    description: "Turborepo team"
    required: false

runs:
  using: "composite"
  steps:
    - name: Checkout repo
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - uses: ./.github/actions/dangerous-git-checkout

    - name: Cache Build
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      id: cache-build
      env:
        cache-name: prod-build-typecheck
        key-1: ${{ hashFiles('pnpm-lock.yaml') }}
        key-2: ${{ hashFiles('apps/**/**.[jt]s', 'apps/**/**.[jt]sx', 'packages/**/**.[jt]s', 'packages/**/**.[jt]sx', '!**/node_modules') }}
        key-3: ${{ hashFiles('package.json', 'pnpm-workspace.yaml', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json', 'apps/**/tsconfig*.json', 'packages/**/tsconfig*.json', 'packages/config-typescript/**/*.json', 'apps/web/next.config.mjs') }}
      with:
        path: |
          ${{ github.workspace }}/apps/web/.next
          **/.turbo/**
          **/dist/**
        key: ${{ runner.os }}-${{ env.cache-name }}-${{ env.key-1 }}-${{ env.key-2 }}-${{ env.key-3 }}

    - name: Set Cache Hit Status
      run: echo "cache-hit=${{ steps.cache-build.outputs.cache-hit }}" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Setup Node.js 22.x
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: 22.x
      if: steps.cache-build.outputs.cache-hit != 'true'

    - name: Install pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      if: steps.cache-build.outputs.cache-hit != 'true'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --config.platform=linux --config.architecture=x64
      if: steps.cache-build.outputs.cache-hit != 'true'
      shell: bash

    - name: Create .env
      run: pnpm dev:setup
      if: steps.cache-build.outputs.cache-hit != 'true'
      shell: bash

    - name: Fill E2E_TESTING in .env
      if: steps.cache-build.outputs.cache-hit != 'true'
      env:
        E2E_TESTING_MODE: ${{ inputs.e2e_testing_mode }}
      run: |
        echo "E2E_TESTING=$E2E_TESTING_MODE" >> .env
      shell: bash

    - run: |
        pnpm build --filter=@formbricks/web...
      if: steps.cache-build.outputs.cache-hit != 'true'
      shell: bash
      env:
        TURBO_TOKEN: ${{ inputs.turbo_token }}
        TURBO_TEAM: ${{ inputs.turbo_team }}

    - name: Typecheck
      run: pnpm typecheck
      if: steps.cache-build.outputs.cache-hit != 'true'
      shell: bash
      env:
        TURBO_TOKEN: ${{ inputs.turbo_token }}
        TURBO_TEAM: ${{ inputs.turbo_team }}

type: object
description: >
  Optional dry-run input. When `responseId` is omitted, the server synthesizes a
  sample

  `response.completed` payload from the survey configured on the workflow
  trigger. Manually

  authored trigger payloads are intentionally not accepted in Scope 1.
properties:
  responseId:
    type: string
    format: cuid2
    description: >-
      Optional existing response id (from the trigger's survey) to replay as
      dry-run sample data.
additionalProperties: false

type: object
description: >
  Strict v3 survey creation document. This endpoint accepts survey structure
  only: name,

  metadata, languages, welcome card, blocks/elements/logic, endings, hidden
  fields, and variables.

  It rejects legacy `questions` and out-of-scope settings such as styling,
  targeting, segments,

  follow-ups, recaptcha, single-use/email verification, slug, custom scripts,
  analytics fields,

  timestamps, and `createdBy`.


  Translatable fields use real locale-code maps. The map must include the
  canonical

  `defaultLanguage` key, such as `en-US`, so the server can persist the internal
  default

  translation. Locale keys must be canonical BCP 47 codes such as `de-DE`,
  `pt-PT`, or

  `zh-Hans-CN`. Non-default locale keys must be declared in `languages`;
  undeclared locale

  keys in metadata, welcome cards, blocks, or endings are rejected with
  `unsupported_locale`.


  `blocks[].id` and `variables[].id` may be omitted on create and will be
  generated by the

  server. Provide explicit cuid2 ids when other fields in the same request
  reference them.

  For normal sequential flow, omit `logicFallback`. It is only valid together
  with a non-empty

  `logic` array on the same block.
required:
  - workspaceId
  - name
  - blocks
properties:
  workspaceId:
    type: string
    format: cuid2
    description: Workspace where the survey will be created. Requires read/write access.
  name:
    type: string
    minLength: 1
  type:
    type: string
    enum:
      - link
      - app
    default: link
    description: >
      Optional compatibility field. `link` and `app` survey types are accepted
      here; app/in-app

      survey distribution settings remain outside this structure-focused create
      endpoint.
  status:
    type: string
    enum:
      - draft
      - inProgress
      - paused
      - completed
    default: draft
  metadata:
    allOf:
      - $ref: ./SurveyMetadata.yml
    default: {}
  defaultLanguage:
    allOf:
      - $ref: ./LocaleCode.yml
    default: en-US
    description: Default authoring locale. Translatable maps must include this locale key.
  languages:
    type: array
    default: []
    items:
      $ref: ./CreateSurveyLanguage.yml
    description: >
      Optional survey language configuration. Every non-default locale used by
      translatable maps

      must be declared here; omitted languages are not inferred from map keys.
  welcomeCard:
    allOf:
      - $ref: ./SurveyWelcomeCard.yml
    default:
      enabled: false
  blocks:
    type: array
    minItems: 1
    items:
      $ref: ./CreateSurveyBlock.yml
  endings:
    type: array
    default: []
    items:
      $ref: ./SurveyEnding.yml
  hiddenFields:
    allOf:
      - $ref: ./SurveyHiddenFields.yml
    default:
      enabled: false
  variables:
    type: array
    default: []
    items:
      $ref: ./CreateSurveyVariable.yml
additionalProperties: false

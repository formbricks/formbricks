allOf:
  - $ref: ./SurveyElementBase.yml
  - type: object
    required:
      - choices
    properties:
      type:
        type: string
        enum:
          - multipleChoiceMulti
      choices:
        type: array
        minItems: 2
        items:
          $ref: ./SurveyChoice.yml
      shuffleOption:
        $ref: ./SurveyShuffleOption.yml
      otherOptionPlaceholder:
        $ref: ./TranslatableText.yml
      validation:
        $ref: ./SurveyValidation.yml
      displayType:
        $ref: ./SurveyMultipleChoiceDisplayType.yml
unevaluatedProperties: false

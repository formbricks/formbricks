type: object
required:
  - id
  - type
  - actionType
  - config
properties:
  id:
    type: string
    minLength: 1
  type:
    type: string
    enum:
      - action
  actionType:
    type: string
    enum:
      - send_email
  label:
    type: string
    minLength: 1
    maxLength: 120
    description: Optional display label shown in the builder.
  config:
    $ref: ./WorkflowSendEmailActionConfig.yml
  ui:
    $ref: ./WorkflowNodeUi.yml
additionalProperties: false

type: object
required:
  - valid
  - invalid_params
  - languages
properties:
  valid:
    type: boolean
    description: >-
      Whether the generated create payload passed the same v3 create preparation
      pipeline.
  invalid_params:
    type: array
    description: >-
      Repairable validation errors. Successful generate responses return an
      empty array.
    items:
      $ref: ./InvalidParam.yml
  languages:
    type: array
    description: Languages that the generated create payload would connect or create.
    items:
      $ref: ./GeneratedSurveyValidationLanguage.yml
additionalProperties: false

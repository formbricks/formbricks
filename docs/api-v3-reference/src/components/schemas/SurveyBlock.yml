type: object
description: >
  Block-based survey section. Block ids are stable public identifiers. Logic and
  fallbacks can

  jump to block ids or ending ids, so clients and agents should preserve ids
  unless intentionally

  creating/deleting a block.
required:
  - id
  - name
  - elements
properties:
  id:
    type: string
    format: cuid2
    description: Stable block id.
  name:
    type: string
    minLength: 1
  elements:
    type: array
    minItems: 1
    items:
      $ref: ./SurveyElement.yml
  logic:
    type: array
    items:
      $ref: ./SurveyBlockLogic.yml
  logicFallback:
    type: string
    format: cuid2
    description: >
      Block or ending id used when no logic condition matches. Only valid when
      this same block

      has at least one `logic` rule; omit it for normal sequential flow.
  buttonLabel:
    $ref: ./TranslatableText.yml
  backButtonLabel:
    $ref: ./TranslatableText.yml
additionalProperties: false

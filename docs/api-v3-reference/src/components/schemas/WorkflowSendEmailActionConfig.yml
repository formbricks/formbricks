type: object
description: >-
  Send-email action with 1:1 field parity to survey Follow-ups
  (`ZSurveyFollowUpAction`).
required:
  - to
  - from
  - replyTo
  - subject
  - body
  - attachResponseData
properties:
  to:
    type: string
    minLength: 1
    description: >
      Recipient: either a literal email address (e.g. a teammate) or the element
      id of a

      survey question / hidden field whose answer contains the respondent's email
      address

      (contact-info elements resolve index [2]) — the same semantics as the
      Follow-ups `to` field.
  from:
    type: string
    format: email
  replyTo:
    type: array
    items:
      type: string
      format: email
  subject:
    type: string
    minLength: 1
    description: >
      Email subject. Used verbatim (recall tokens are not expanded in the
      subject), the same as Follow-ups.
  body:
    type: string
    minLength: 1
    description: >
      Email body as HTML with recall tokens (`#recall:[elementId]/fallback:x#`).
      Recall tokens

      are expanded against the response, the result is sanitized to a narrow HTML
      allowlist,

      and it is wrapped in the branded Follow-ups email template — identical
      rendering to survey Follow-ups.
  attachResponseData:
    type: boolean
  includeVariables:
    type: boolean
    default: false
  includeHiddenFields:
    type: boolean
    default: false
additionalProperties: false

allOf:
  - $ref: ./SurveyElementBase.yml
  - type: object
    required:
      - scale
      - range
    properties:
      type:
        type: string
        enum:
          - rating
      scale:
        type: string
        enum:
          - number
          - smiley
          - star
      range:
        type: integer
        enum:
          - 3
          - 4
          - 5
          - 6
          - 7
          - 10
      lowerLabel:
        $ref: ./TranslatableText.yml
      upperLabel:
        $ref: ./TranslatableText.yml
      isColorCodingEnabled:
        type: boolean
        default: false
unevaluatedProperties: false

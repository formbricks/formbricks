description: Rate limit exceeded.
headers:
  X-Request-Id:
    schema:
      type: string
    description: Request correlation ID
  Cache-Control:
    schema:
      type: string
    example: private, no-store
  Retry-After:
    schema:
      type: integer
    description: Seconds until the current rate-limit window resets.
content:
  application/problem+json:
    schema:
      $ref: ../schemas/Problem.yml

post:
  operationId: testWorkflowV3
  summary: Dry-run (validate) a workflow
  description: >
    Validates a workflow without running it or causing any side effect. It checks that the
    workflow's current definition is executable and that the trigger's referenced survey and ending
    cards still exist in the workspace. **No** workflow run is created and **no** email or webhook is
    sent.


    The response is always `200` with `{ data: { workflowId, ok, problems } }`. `data.ok` is `true`
    when the workflow would execute; otherwise `data.problems` lists every issue found — each with a
    machine-readable `code` and the offending `field` — so they can be fixed in a single pass.


    Only `enabled` and `disabled` workflows can be tested. Testing a `draft` or `archived` workflow
    returns **422** with code `invalid_workflow_state`.
  tags:
    - V3 Workflows
  parameters:
    - $ref: ../components/parameters/WorkflowIdPath.yml
  responses:
    '200':
      description: >
        Validation result. The request succeeded; inspect `data.ok` to see whether the workflow is
        ready, and `data.problems` for any issues.
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../components/schemas/WorkflowTestResult.yml
          examples:
            ok:
              summary: Workflow is valid and ready to enable
              value:
                data:
                  workflowId: clworkflow0000000000000000
                  ok: true
                  problems: []
            problems:
              summary: Workflow has unresolved trigger references
              value:
                data:
                  workflowId: clworkflow0000000000000000
                  ok: false
                  problems:
                    - code: survey_not_found
                      field: definition.trigger.config.surveyId
                      message: The referenced survey does not exist in this workspace.
                    - code: ending_card_not_found
                      field: definition.trigger.config.endingCardIds
                      message: Ending card clending000000000000000000 does not exist on the survey.
    '401':
      $ref: ../components/responses/V3Unauthorized.yml
    '403':
      $ref: ../components/responses/V3Forbidden.yml
    '422':
      $ref: ../components/responses/V3UnprocessableContent.yml
    '429':
      $ref: ../components/responses/V3TooManyRequests.yml
    '500':
      $ref: ../components/responses/V3InternalServerError.yml
  security:
    - sessionAuth: []
    - apiKeyAuth: []

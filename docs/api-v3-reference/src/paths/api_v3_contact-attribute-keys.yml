get:
  operationId: listContactAttributeKeysV3
  summary: List contact attribute keys
  description: |
    Returns the contact attribute keys for a workspace. Use the returned `key` values as
    `targeting.filters[].root.contactAttributeKey` when targeting app surveys; `dataType` hints which
    operators apply. Session cookie or x-api-key. (Applying targeting filters requires the Contacts
    entitlement; this discovery endpoint does not.)
  tags:
    - V3 Contact Attribute Keys
  parameters:
    - in: query
      name: workspaceId
      required: true
      schema:
        type: string
        format: cuid2
      description: |
        Workspace identifier. This is the canonical container ID for v3 APIs.
    - in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
      description: Page size (max 100).
    - in: query
      name: cursor
      schema:
        type: string
      description: >
        Opaque cursor returned as `meta.nextCursor` from the previous page. Omit on the first
        request.
  responses:
    "200":
      description: Contact attribute keys retrieved successfully
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/json:
          schema:
            type: object
            required:
              - data
              - meta
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/ContactAttributeKeyResource.yml
              meta:
                type: object
                required:
                  - limit
                  - nextCursor
                properties:
                  limit:
                    type: integer
                  nextCursor:
                    type:
                      - string
                      - "null"
                    description: >-
                      Opaque cursor for the next page. `null` when there are no more results.
    "400":
      $ref: ../components/responses/V3BadRequest.yml
    "401":
      $ref: ../components/responses/V3Unauthorized.yml
    "403":
      $ref: ../components/responses/V3Forbidden.yml
    "429":
      $ref: ../components/responses/V3TooManyRequests.yml
    "500":
      $ref: ../components/responses/V3InternalServerError.yml
  security:
    - sessionAuth: []
    - apiKeyAuth: []

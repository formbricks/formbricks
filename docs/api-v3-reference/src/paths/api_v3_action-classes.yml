get:
  operationId: listActionClassesV3
  summary: List action classes
  description: |
    Returns the action classes (user actions that can trigger an app survey) for a workspace. Use
    the returned ids as `distribution.triggers[].actionClassId` when creating or updating app
    surveys. Read-only: this v3 endpoint lists action classes but does not create them — action
    classes are managed in the Formbricks app (Actions settings) or via the v1/v2 management API.

    An empty `data` array means the workspace has no action classes yet. Triggers are optional, so
    you can still create an app survey with `distribution.triggers: []` (or omit `distribution`
    entirely) and attach triggers later via `PATCH` once an action class exists. Session cookie or
    x-api-key.
  tags:
    - V3 Action Classes
  parameters:
    - in: query
      name: workspaceId
      required: true
      schema:
        type: string
        format: cuid2
      description: |
        Workspace identifier. This is the canonical container ID for v3 APIs.
  responses:
    "200":
      description: Action classes retrieved successfully
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/ActionClassResource.yml
    "400":
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/Problem.yml
    "401":
      description: Not authenticated (no valid session or API key)
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/Problem.yml
    "403":
      description: >-
        Forbidden — no access, or workspace does not exist (404 not used; avoids
        existence leak)
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/Problem.yml
    "429":
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the current rate-limit window resets
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/Problem.yml
    "500":
      description: Internal Server Error
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/Problem.yml
  security:
    - sessionAuth: []
    - apiKeyAuth: []

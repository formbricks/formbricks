post:
  operationId: disableWorkflowV3
  summary: Disable a workflow
  description: >
    Moves an `enabled` workflow to `disabled`. Disabled workflows keep their
    configuration but

    do not respond to trigger events; runs that are already queued or running
    are not canceled.

    Calling disable in any other state returns **422** with code
    `invalid_workflow_state`.
  tags:
    - V3 Workflows
  parameters:
    - $ref: ../components/parameters/WorkflowIdPath.yml
  responses:
    '200':
      $ref: ../components/responses/WorkflowResourceResponse.yml
    '400':
      $ref: ../components/responses/V3BadRequest.yml
    '401':
      $ref: ../components/responses/V3Unauthorized.yml
    '403':
      $ref: ../components/responses/V3Forbidden.yml
    '422':
      $ref: ../components/responses/V3UnprocessableContent.yml
    '429':
      $ref: ../components/responses/V3TooManyRequests.yml
    '500':
      $ref: ../components/responses/V3InternalServerError.yml
  security:
    - sessionAuth: []
    - apiKeyAuth: []

get:
  operationId: getSurveysV3
  summary: List surveys
  description: |
    Returns surveys for the workspace. Session cookie or x-api-key.
  tags:
    - V3 Surveys
  parameters:
    - in: query
      name: workspaceId
      required: true
      schema:
        type: string
        format: cuid2
      description: |
        Workspace identifier. This is the canonical container ID for v3 APIs.
    - in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size (max 100)
    - in: query
      name: cursor
      schema:
        type: string
      description: >
        Opaque cursor returned as `meta.nextCursor` from the previous page. Omit
        on the first request.
    - in: query
      name: includeTotalCount
      schema:
        type: boolean
        default: true
      description: >
        Whether to calculate `meta.totalCount` for this request. Set to `false`
        on cursor-pagination follow-up requests to skip the extra count query;
        in that case `meta.totalCount` is `null`.
    - in: query
      name: filter[name][contains]
      schema:
        type: string
        maxLength: 512
      description: >-
        Case-insensitive substring match on survey name (same as in-app list
        filters).
    - in: query
      name: filter[status][in]
      schema:
        type: array
        items:
          type: string
          enum:
            - draft
            - inProgress
            - paused
            - completed
      style: form
      explode: true
      description: >
        Survey status filter. Repeat the parameter
        (`filter[status][in]=draft&filter[status][in]=inProgress`) or use
        comma-separated values (`filter[status][in]=draft,inProgress`). Invalid
        values → **400**.
    - in: query
      name: filter[type][in]
      schema:
        type: array
        items:
          type: string
          enum:
            - link
            - app
      style: form
      explode: true
      description: >-
        Survey type filter (`link` / `app`). Same repeat-or-comma rules as
        `filter[status][in]`.
    - in: query
      name: sortBy
      schema:
        type: string
        enum:
          - createdAt
          - updatedAt
          - name
          - relevance
      description: >-
        Sort order. Defaults to `updatedAt`. The `cursor` token is bound to the
        selected sort order.
  responses:
    '200':
      description: Surveys retrieved successfully
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/json:
          schema:
            type: object
            required:
              - data
              - meta
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/SurveyListItem.yml
              meta:
                type: object
                required:
                  - limit
                  - nextCursor
                  - totalCount
                properties:
                  limit:
                    type: integer
                  nextCursor:
                    type:
                      - string
                      - 'null'
                    description: >-
                      Opaque cursor for the next page. `null` when there are no
                      more results.
                  totalCount:
                    type:
                      - integer
                      - 'null'
                    minimum: 0
                    description: >-
                      Total number of surveys matching the current filters
                      across all pages. `null` when `includeTotalCount=false`.
    '400':
      $ref: ../components/responses/V3BadRequest.yml
    '401':
      $ref: ../components/responses/V3Unauthorized.yml
    '403':
      $ref: ../components/responses/V3Forbidden.yml
    '429':
      $ref: ../components/responses/V3TooManyRequests.yml
    '500':
      $ref: ../components/responses/V3InternalServerError.yml
  security:
    - sessionAuth: []
    - apiKeyAuth: []
post:
  operationId: createSurveyV3
  summary: Create a survey
  description: >
    Creates a block-based survey template from one strict survey document. The
    endpoint accepts

    multilingual authoring maps keyed by real locale codes and converts them to
    Formbricks'

    internal default-language representation. Non-default locale keys in
    translated content

    must be declared in `languages`; undeclared locale keys return
    `unsupported_locale` in

    `invalid_params` instead of silently mutating workspace languages.


    `blocks[].id` and `variables[].id` are stable public identifiers. They may
    be omitted on

    create, in which case the server generates cuid2 ids. If the same create
    request needs to

    reference a block or variable from logic, provide explicit valid ids and use
    those references

    consistently.


    For normal sequential surveys, omit `logic` and `logicFallback`.
    `logicFallback` is only valid

    when the same block has at least one `logic` rule; otherwise the API returns

    `invalid_reference`.


    `type` may be omitted or set to `link` or `app`. App surveys additionally accept the
    `distribution` (display options + triggers) and `targeting` (contact segment filters) objects;
    both are rejected for link surveys. Trigger ids must reference existing workspace action classes
    (discover them via `GET /api/v3/action-classes`), and `targeting.filters` references
    (contact-attribute keys and segments) must exist in the workspace. Unsupported fields are
    rejected instead of ignored.
  tags:
    - V3 Surveys
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateSurveyRequest.yml
        examples:
          productFeedback:
            summary: Create a multilingual block-based survey
            value:
              workspaceId: clxx1234567890123456789012
              name: Product Feedback Survey
              status: draft
              defaultLanguage: en-US
              metadata:
                cx_operation: enterprise_onboarding
                title:
                  en-US: Product Feedback
                  de-DE: Produktfeedback
              languages:
                - code: de-DE
                  enabled: true
              welcomeCard:
                enabled: true
                headline:
                  en-US: Welcome
                  de-DE: Willkommen
              blocks:
                - name: Main Block
                  elements:
                    - id: satisfaction
                      type: openText
                      headline:
                        en-US: What should we improve?
                        de-DE: Was sollen wir verbessern?
                      required: true
              endings: []
              hiddenFields:
                enabled: false
              variables: []
          appSurvey:
            summary: Create an in-app (app) survey with distribution and triggers
            description: >
              App surveys are shown inside your web or mobile app. `distribution` controls display
              behavior and the action classes that trigger the survey (by id — discover ids via
              `GET /api/v3/action-classes`). `targeting.filters` scopes the audience; an empty array
              targets everyone. `type` is immutable after creation.
            value:
              workspaceId: clxx1234567890123456789012
              name: In-App Onboarding Feedback
              type: app
              status: draft
              defaultLanguage: en-US
              blocks:
                - name: Onboarding
                  elements:
                    - id: onboarding_feedback
                      type: openText
                      headline:
                        en-US: How was your setup experience?
                      required: false
              endings: []
              hiddenFields:
                enabled: false
              variables: []
              distribution:
                displayOption: respondMultiple
                recontactDays: 7
                delay: 5
                triggers:
                  - actionClassId: clyy1234567890123456789012
              targeting:
                # Target: plan = pro AND (role = admin OR role = owner). A node's `resource` is either a
                # single condition or a nested group (array); the first node's `connector` is null.
                filters:
                  - id: clf0aaaaaaaaaaaaaaaaaaaa01
                    connector: null
                    resource:
                      id: clf1aaaaaaaaaaaaaaaaaaaa01
                      root:
                        type: attribute
                        contactAttributeKey: plan
                      qualifier:
                        operator: equals
                      value: pro
                  - id: clf2aaaaaaaaaaaaaaaaaaaa01
                    connector: and
                    resource:
                      - id: clf3aaaaaaaaaaaaaaaaaaaa01
                        connector: null
                        resource:
                          id: clf4aaaaaaaaaaaaaaaaaaaa01
                          root:
                            type: attribute
                            contactAttributeKey: role
                          qualifier:
                            operator: equals
                          value: admin
                      - id: clf5aaaaaaaaaaaaaaaaaaaa01
                        connector: or
                        resource:
                          id: clf6aaaaaaaaaaaaaaaaaaaa01
                          root:
                            type: attribute
                            contactAttributeKey: role
                          qualifier:
                            operator: equals
                          value: owner
          sequentialProductSurvey:
            summary: Create a richer sequential survey without logicFallback
            description: >
              Multi-block survey with generated block and variable ids.
              Sequential surveys should

              omit `logic` and `logicFallback`; blocks are shown in array order.
            value:
              workspaceId: clxx1234567890123456789012
              name: Sequential Product Survey
              defaultLanguage: en-US
              languages:
                - code: de-DE
                  enabled: true
              metadata:
                cx_operation: product_feedback
                title:
                  en-US: Sequential Product Survey
                  de-DE: Sequenzielle Produktumfrage
              welcomeCard:
                enabled: true
                headline:
                  en-US: Help us improve the product
                  de-DE: Hilf uns, das Produkt zu verbessern
              hiddenFields:
                enabled: true
                fieldIds:
                  - account_id
                  - plan
              variables:
                - name: feedback_score
                  type: number
                  value: 0
              blocks:
                - name: Satisfaction
                  elements:
                    - id: overall_rating
                      type: rating
                      headline:
                        en-US: How satisfied are you with the product?
                        de-DE: Wie zufrieden bist du mit dem Produkt?
                      required: true
                      range: 5
                      scale: smiley
                    - id: product_area
                      type: multipleChoiceSingle
                      headline:
                        en-US: Which area should we improve first?
                        de-DE: Welchen Bereich sollten wir zuerst verbessern?
                      required: true
                      choices:
                        - id: onboarding
                          label:
                            en-US: Onboarding
                            de-DE: Onboarding
                        - id: analytics
                          label:
                            en-US: Analytics
                            de-DE: Analysen
                - name: Feedback
                  elements:
                    - id: free_text_feedback
                      type: openText
                      headline:
                        en-US: What is one thing we should change?
                        de-DE: Was sollten wir ändern?
                      required: false
                      longAnswer: true
              endings:
                - id: cmpsequentialend0000000000
                  type: endScreen
                  headline:
                    en-US: Thanks for your feedback!
                    de-DE: Danke für dein Feedback!
  responses:
    '201':
      description: Survey created successfully
      headers:
        Location:
          schema:
            type: string
          description: Relative URL of the created survey resource.
          example: /api/v3/surveys/clsv1234567890123456789012
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../components/schemas/SurveyResource.yml
    '400':
      description: >
        Bad Request — the document failed schema validation, i.e. any rule checkable from the
        request body alone, without consulting stored state. Covers: invalid JSON; unknown or
        unsupported fields (including `distribution`/`targeting` sent on a `link` survey, which are
        `app`-only); missing required fields; wrong types or out-of-range values; bad enum values;
        malformed multilingual maps; and intra-document field-combination rules — notably
        `displayPercentage` is required when `displayOption` is `displaySome` and forbidden
        otherwise. Cross-reference failures that need stored state to detect return **422** instead.
        Every offending field is itemized in `invalid_params`. Unknown, forbidden, or wrongly-combined
        fields carry `code: unsupported_field` (e.g. `distribution` on a link survey, or
        `displayPercentage` without `displayOption: displaySome`); omissions carry
        `code: missing_required_field` (e.g. `displayPercentage` when `displayOption` is `displaySome`).
        Bare type, range, enum, and malformed-locale-map violations report the field `name` with a
        human-readable `reason` and no machine `code`.
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/Problem.yml
    '401':
      $ref: ../components/responses/V3Unauthorized.yml
    '403':
      description: >-
        Forbidden — no write access, missing external URL permission, missing
        Contacts entitlement for app-survey targeting, or workspace does not
        exist (404 not used; avoids existence leak)
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/Problem.yml
    '422':
      description: >-
        Unprocessable Content — the document passed schema validation but failed a cross-reference
        check that requires stored state to detect: duplicate stable ids, dangling logic/jump
        references, undeclared locale keys used in content, invalid media URLs, a
        `distribution.triggers[].actionClassId` referencing an action class that does not exist in
        the workspace (discover valid ids via `GET /api/v3/action-classes`), or a `targeting.filters`
        entry that cannot resolve in the workspace — an unknown contact-attribute key or segment, an
        unsupported person identifier, or an unknown device value. The `invalid_params`
        array pinpoints each issue (e.g. `code: invalid_reference` with the offending `identifier`).
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/Problem.yml
    '429':
      $ref: ../components/responses/V3TooManyRequests.yml
    '500':
      $ref: ../components/responses/V3InternalServerError.yml
  security:
    - sessionAuth: []
    - apiKeyAuth: []

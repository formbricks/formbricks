                          alias: german
                          default: false
                          enabled: false
                      welcomeCard:
                        enabled: false
                      blocks:
                        - id: e0tfwzqk63op37y14z95qq3k
                          name: Main Block
                          elements:
                            - id: nzte4cm8836hgjw63pesziht
                              type: rating

# Regenerate with `pnpm api:v3:bundle`; CI verifies freshness with `pnpm api:v3:check`.
# V3 API — Surveys and Workflows extension (hand-maintained source; not produced by generate-api-specs).
openapi: 3.1.1
info:
  title: Formbricks API v3
  description: |
    **Surveys**: **GET /api/v3/surveys**, **POST /api/v3/surveys**, **POST /api/v3/surveys/generate**, **POST /api/v3/surveys/validate**, **GET /api/v3/surveys/{surveyId}**, **PATCH /api/v3/surveys/{surveyId}**, and **DELETE /api/v3/surveys/{surveyId}**.

    Authenticate all management endpoints with **session cookie** or **`x-api-key`** (management key with access to the workspace).

    **Spec location:** source of truth is the multi-file tree at `docs/api-v3-reference/src/` (root `openapi.yml` plus one file per path and component); `docs/api-v3-reference/openapi.yml` is the generated single-file bundle (alongside v2 at `docs/api-v2-reference/openapi.yml`).

    **workspaceId**
    `workspaceId` is the canonical container identifier for this API. It is a **required query parameter on collection endpoints** (e.g. `GET`/`POST /api/v3/surveys`, `GET /api/v3/action-classes`, `GET /api/v3/contact-attribute-keys`) because those operate within a workspace. Single-resource endpoints (`GET`/`PATCH`/`DELETE /api/v3/surveys/{surveyId}`) locate the resource by its globally-unique id and resolve the workspace from it, so they do **not** accept a `workspaceId` query parameter — sending one returns **400** (`Unrecognized key: "workspaceId"`). `POST /api/v3/surveys` also requires `workspaceId` in the request body.

    **Auth**
    Authenticate with either a session cookie or **`x-api-key`**. In dual-auth mode, V3 checks the API key first when the header is present, otherwise it uses the session path. Unauthenticated callers get **401** before query validation.

    **Pagination**
    Cursor-based pagination with **limit** + opaque **cursor** token. Responses return `meta.nextCursor`; pass that value back as `cursor` to fetch the next page. Survey list responses also include `meta.totalCount`, the total number of surveys matching the current filters across all pages. There is no `offset` in this contract.

    **Filtering**
    Filters use explicit operator-style query parameters under the **`filter[...]` family**. The survey list supports `filter[name][contains]`, `filter[status][in]`, and `filter[type][in]`. Resource-scoping identifiers (`workspaceId`, `responseId`) stay plain query parameters. Multi-value filters use repeated keys or comma-separated values (e.g. `filter[status][in]=draft&filter[status][in]=inProgress` or `filter[status][in]=draft,inProgress`). Sorting remains a flat `sortBy` query parameter.

    **Security**
    Missing/forbidden workspace returns **403** with a generic message (not **404**) so resource existence is not leaked. List responses use `private, no-store`.

    **AI survey creation**
    `POST /api/v3/surveys/generate` returns a draft `POST /api/v3/surveys` payload plus validation metadata. It does not create a survey. It generates survey content for both `link` and `app` surveys; for `app` it seeds a default `distribution` (display once, no triggers, no targeting) that you finish configuring before publishing.
    Prompt text is sent to the configured AI provider for generation, but it is not stored by this endpoint, not logged by default, and not included in audit data.

    **OpenAPI**
    This spec is **not** produced by `pnpm generate-api-specs` (that script only builds v2 → `docs/api-v2-reference/openapi.yml`). When the route contract changes, edit the files under `docs/api-v3-reference/src/`, then run `pnpm api:v3:bundle` to regenerate the committed single-file bundle. `pnpm api:v3:lint` lints the source tree; `pnpm api:v3:check` (CI) fails when the bundle is stale.

    **Overview migration note**
    The v3-backed survey overview page intentionally removes actions that are not yet exposed by this contract: `Created by` filtering, `Duplicate`, `Copy...`, `Preview`, and `Copy link`.

    **Next steps (out of scope for this spec)**
    Additional v3 survey update endpoints, optional ETag/304, field selection, translation-specific writes, and survey version history.
  version: 0.1.0
  x-implementation-notes:
    route: apps/web/app/api/v3/surveys/route.ts
    generate-route: apps/web/app/api/v3/surveys/generate/route.ts
    query-parser: apps/web/app/api/v3/surveys/parse-v3-surveys-list-query.ts
    auth: apps/web/app/api/v3/lib/auth.ts
    workspace-resolution: apps/web/app/api/v3/lib/workspace-context.ts
    openapi-generated: false
    spec-source: docs/api-v3-reference/src (regenerate bundle with `pnpm api:v3:bundle`)
    pagination-model: cursor
    cursor-pagination: supported
servers:
  - url: https://app.formbricks.com
    description: Formbricks Cloud. Paths in this spec already include the `/api/v3` prefix; self-hosted instances substitute their own origin.
paths:
  /api/v3/surveys:
    get:
      operationId: getSurveysV3
      summary: List surveys
      description: |
        Returns surveys for the workspace. Session cookie or x-api-key.
      tags:
        - V3 Surveys
      parameters:
        - in: query
          name: workspaceId
          required: true
          schema:
            type: string
            format: cuid2
          description: |
            Workspace identifier. This is the canonical container ID for v3 APIs.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Page size (max 100)
        - in: query
          name: cursor
          schema:
            type: string
          description: |
            Opaque cursor returned as `meta.nextCursor` from the previous page. Omit on the first request.
        - in: query
          name: includeTotalCount
          schema:
            type: boolean
            default: true
          description: |
            Whether to calculate `meta.totalCount` for this request. Set to `false` on cursor-pagination follow-up requests to skip the extra count query; in that case `meta.totalCount` is `null`.
        - in: query
          name: filter[name][contains]
          schema:
            type: string
            maxLength: 512
          description: Case-insensitive substring match on survey name (same as in-app list filters).
        - in: query
          name: filter[status][in]
          schema:
            type: array
            items:
              type: string
              enum:
                - draft
                - inProgress
                - paused
                - completed
          style: form
          explode: true
          description: |
            Survey status filter. Repeat the parameter (`filter[status][in]=draft&filter[status][in]=inProgress`) or use comma-separated values (`filter[status][in]=draft,inProgress`). Invalid values → **400**.
        - in: query
          name: filter[type][in]
          schema:
            type: array
            items:
              type: string
              enum:
                - link
                - app
          style: form
          explode: true
          description: Survey type filter (`link` / `app`). Same repeat-or-comma rules as `filter[status][in]`.
        - in: query
          name: sortBy
          schema:
            type: string
            enum:
              - createdAt
              - updatedAt
              - name
              - relevance
          description: Sort order. Defaults to `updatedAt`. The `cursor` token is bound to the selected sort order.
      responses:
        '200':
          description: Surveys retrieved successfully
          headers:
            X-Request-Id:
              schema:
                type: string
              description: Request correlation ID
            Cache-Control:
              schema:
                type: string
              example: private, no-store
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SurveyListItem'
                  meta:
                    type: object
                    required:
                      - limit
                      - nextCursor
                      - totalCount
                    properties:
                      limit:
                        type: integer
                      nextCursor:
                        type:
                          - string
                          - 'null'
                        description: Opaque cursor for the next page. `null` when there are no more results.
                      totalCount:
                        type:
                          - integer
                          - 'null'
                        minimum: 0
                        description: Total number of surveys matching the current filters across all pages. `null` when `includeTotalCount=false`.
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Not authenticated (no valid session or API key)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: Forbidden — no access, or workspace does not exist (404 not used; avoids existence leak)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until the current rate-limit window resets
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      security:
        - sessionAuth: []
        - apiKeyAuth: []
    post:
      operationId: createSurveyV3
      summary: Create a survey
      description: |
        Creates a block-based survey template from one strict survey document. The endpoint accepts
        multilingual authoring maps keyed by real locale codes and converts them to Formbricks'
        internal default-language representation. Non-default locale keys in translated content
        must be declared in `languages`; undeclared locale keys return `unsupported_locale` in
        `invalid_params` instead of silently mutating workspace languages.

        `blocks[].id` and `variables[].id` are stable public identifiers. They may be omitted on
        create, in which case the server generates cuid2 ids. If the same create request needs to
        reference a block or variable from logic, provide explicit valid ids and use those references
        consistently.

        For normal sequential surveys, omit `logic` and `logicFallback`. `logicFallback` is only valid
        when the same block has at least one `logic` rule; otherwise the API returns
        `invalid_reference`.

        `type` may be omitted or set to `link` or `app`. App surveys additionally accept the `distribution` (display options + triggers) and `targeting` (contact segment filters) objects; both are rejected for link surveys. Trigger ids must reference existing workspace action classes (discover them via `GET /api/v3/action-classes`). Unsupported fields are rejected instead of ignored.
      tags:
        - V3 Surveys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSurveyRequest'
            examples:
              productFeedback:
                summary: Create a multilingual block-based survey
                value:
                  workspaceId: clxx1234567890123456789012
                  name: Product Feedback Survey
                  status: draft
                  defaultLanguage: en-US
                  metadata:
                    cx_operation: enterprise_onboarding
                    title:
                      en-US: Product Feedback
                      de-DE: Produktfeedback
                  languages:
                    - code: de-DE
                      enabled: true
                  welcomeCard:
                    enabled: true
                    headline:
                      en-US: Welcome
                      de-DE: Willkommen
                  blocks:
                    - name: Main Block
                      elements:
                        - id: satisfaction
                          type: openText
                          headline:
                            en-US: What should we improve?
                            de-DE: Was sollen wir verbessern?
                          required: true
                  endings: []
                  hiddenFields:
                    enabled: false
                  variables: []
              appSurvey:
                summary: Create an in-app (app) survey with distribution and triggers
                description: |
                  App surveys are shown inside your web or mobile app. `distribution` controls display behavior and the action classes that trigger the survey (by id — discover ids via `GET /api/v3/action-classes`). `targeting.filters` scopes the audience; an empty array targets everyone. `type` is immutable after creation.
                value:
                  workspaceId: clxx1234567890123456789012
                  name: In-App Onboarding Feedback
                  type: app
                  status: draft
                  defaultLanguage: en-US
                  blocks:
                    - name: Onboarding
                      elements:
                        - id: onboarding_feedback
                          type: openText
                          headline:
                            en-US: How was your setup experience?
                          required: false
                  endings: []
                  hiddenFields:
                    enabled: false
                  variables: []
                  distribution:
                    displayOption: respondMultiple
                    recontactDays: 7
                    delay: 5
                    triggers:
                      - actionClassId: clyy1234567890123456789012
                  targeting:
                    filters:
                      - id: clf0aaaaaaaaaaaaaaaaaaaa01
                        connector: null
                        resource:
                          id: clf1aaaaaaaaaaaaaaaaaaaa01
                          root:
                            type: attribute
                            contactAttributeKey: plan
                          qualifier:
                            operator: equals
                          value: pro
                      - id: clf2aaaaaaaaaaaaaaaaaaaa01
                        connector: and
                        resource:
                          - id: clf3aaaaaaaaaaaaaaaaaaaa01
                            connector: null
                            resource:
                              id: clf4aaaaaaaaaaaaaaaaaaaa01
                              root:
                                type: attribute
                                contactAttributeKey: role
                              qualifier:
                                operator: equals
                              value: admin
                          - id: clf5aaaaaaaaaaaaaaaaaaaa01
                            connector: or
                            resource:
                              id: clf6aaaaaaaaaaaaaaaaaaaa01
                              root:
                                type: attribute
                                contactAttributeKey: role
                              qualifier:
                                operator: equals
                              value: owner
              sequentialProductSurvey:
                summary: Create a richer sequential survey without logicFallback
                description: |
                  Multi-block survey with generated block and variable ids. Sequential surveys should
                  omit `logic` and `logicFallback`; blocks are shown in array order.
                value:
                  workspaceId: clxx1234567890123456789012
                  name: Sequential Product Survey
                  defaultLanguage: en-US
                  languages:
                    - code: de-DE
                      enabled: true
                  metadata:
                    cx_operation: product_feedback
                    title:
                      en-US: Sequential Product Survey
                      de-DE: Sequenzielle Produktumfrage
                  welcomeCard:
                    enabled: true
                    headline:
                      en-US: Help us improve the product
                      de-DE: Hilf uns, das Produkt zu verbessern
                  hiddenFields:
                    enabled: true
                    fieldIds:
                      - account_id
                      - plan
                  variables:
                    - name: feedback_score
                      type: number
                      value: 0
                  blocks:
                    - name: Satisfaction
                      elements:
                        - id: overall_rating
                          type: rating
                          headline:
                            en-US: How satisfied are you with the product?
                            de-DE: Wie zufrieden bist du mit dem Produkt?
                          required: true
                          range: 5
                          scale: smiley
                        - id: product_area
                          type: multipleChoiceSingle
                          headline:
                            en-US: Which area should we improve first?
                            de-DE: Welchen Bereich sollten wir zuerst verbessern?
                          required: true
                          choices:
                            - id: onboarding
                              label:
                                en-US: Onboarding
                                de-DE: Onboarding
                            - id: analytics
                              label:
                                en-US: Analytics
                                de-DE: Analysen
                    - name: Feedback
                      elements:
                        - id: free_text_feedback
                          type: openText
                          headline:
                            en-US: What is one thing we should change?
                            de-DE: Was sollten wir ändern?
                          required: false
                          longAnswer: true
                  endings:
                    - id: cmpsequentialend0000000000
                      type: endScreen
                      headline:
                        en-US: Thanks for your feedback!
                        de-DE: Danke für dein Feedback!
      responses:
        '201':
          description: Survey created successfully
          headers:
            Location:
              schema:
                type: string
              description: Relative URL of the created survey resource.
              example: /api/v3/surveys/clsv1234567890123456789012
            X-Request-Id:
              schema:
                type: string
              description: Request correlation ID
            Cache-Control:
              schema:
                type: string
              example: private, no-store
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/SurveyResource'
        '400':
          description: |
            Bad Request — the document failed schema validation, i.e. any rule checkable from the request body alone, without consulting stored state. Covers: invalid JSON; unknown or unsupported fields (including `distribution`/`targeting` sent on a `link` survey, which are `app`-only); missing required fields; wrong types or out-of-range values; bad enum values; malformed multilingual maps; and intra-document field-combination rules — notably `displayPercentage` is required when `displayOption` is `displaySome` and forbidden otherwise. Cross-reference failures that need stored state to detect return **422** instead. Every offending field is itemized in `invalid_params`. Unknown, forbidden, or wrongly-combined fields carry `code: unsupported_field` (e.g. `distribution` on a link survey, or `displayPercentage` without `displayOption: displaySome`); omissions carry `code: missing_required_field` (e.g. `displayPercentage` when `displayOption` is `displaySome`). Bare type, range, enum, and malformed-locale-map violations report the field `name` with a human-readable `reason` and no machine `code`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Not authenticated (no valid session or API key)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: Forbidden — no write access, missing external URL permission, missing Contacts entitlement for app-survey targeting, or workspace does not exist (404 not used; avoids existence leak)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: 'Unprocessable Content — the document passed schema validation but failed a cross-reference check that requires stored state to detect: duplicate stable ids, dangling logic/jump references, undeclared locale keys used in content, invalid media URLs, or a `distribution.triggers[].actionClassId` referencing an action class that does not exist in the workspace (discover valid ids via `GET /api/v3/action-classes`). The `invalid_params` array pinpoints each issue (e.g. `code: invalid_reference` with the offending `identifier`).'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until the current rate-limit window resets
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      security:
        - sessionAuth: []
        - apiKeyAuth: []
  /api/v3/surveys/generate:
    post:
      operationId: generateSurveyV3
      summary: Create a survey draft payload with AI
      description: |
        Creates a strict v3 `POST /api/v3/surveys` create payload from a creator prompt and returns
        validation metadata. This endpoint is single-purpose: it does **not** persist the survey.
        Clients should validate the returned payload with `/api/v3/surveys/validate` or use the
        embedded validation metadata, then create the draft through `POST /api/v3/surveys`.

        The generated payload always sets `status: draft`. Both `type: link` and `type: app` are
        supported; for `app`, the payload includes a default `distribution` (display once, no triggers,
        no targeting) that you finish configuring in the editor or via the create request.

        Prompt privacy: prompt text is sent to the configured AI provider to create the payload, but
        this endpoint does not store prompts and server logs should use request ids and failure
        categories instead of raw prompt content.
      tags:
        - V3 Surveys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateSurveyRequest'
            examples:
              onboarding:
                summary: Create a link survey draft
                value:
                  workspaceId: clxx1234567890123456789012
                  type: link
                  language: en-US
                  prompt: Understand why new users stop during onboarding and what would help them finish setup.
      responses:
        '200':
          description: Survey create payload generated successfully. The survey has not been created yet.
          headers:
            X-Request-Id:
              schema:
                type: string
              description: Request correlation ID
            Cache-Control:
              schema:
                type: string
              example: private, no-store
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/GenerateSurveyResult'
              examples:
                generated:
                  summary: Generated draft create payload
                  value:
                    data:
                      language: en-US
                      payload:
                        workspaceId: clxx1234567890123456789012
                        type: link
                        name: Onboarding Completion Survey
                        status: draft
                        defaultLanguage: en-US
                        languages:
                          - code: en-US
                            default: true
                            enabled: true
                        metadata:
                          title:
                            en-US: Onboarding Completion Survey
                        welcomeCard:
                          enabled: false
                        blocks:
                          - id: clbk1234567890123456789012
                            name: Main
                            elements:
                              - id: q_1_example
                                type: openText
                                headline:
                                  en-US: What made onboarding hard to complete?
                                required: false
                                isDraft: true
                                inputType: text
                                longAnswer: false
                                charLimit:
                                  enabled: false
                        endings:
                          - id: clen1234567890123456789012
                            type: endScreen
                            headline:
                              en-US: Thanks for your feedback
                        hiddenFields:
                          enabled: false
                        variables: []
                      validation:
                        valid: true
                        invalid_params: []
                        languages:
                          - code: en-US
                            default: true
                            enabled: true
        '400':
          description: Malformed body or a prompt that is too short or underspecified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                shortPrompt:
                  summary: Prompt needs more detail
                  value:
                    title: Bad Request
                    status: 400
                    detail: Prompt needs more detail
                    code: bad_request
                    requestId: req_123
                    invalid_params:
                      - name: prompt
                        reason: Describe the survey goal, audience, or topic in a sentence so the AI can create a useful draft.
        '401':
          description: Not authenticated (no valid session or API key)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: Forbidden — no write access, workspace does not exist, AI is not in plan, or AI smart tools are disabled
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                noWorkspaceWriteAccess:
                  summary: No workspace write access
                  value:
                    title: Forbidden
                    status: 403
                    detail: You are not authorized to access this resource
                    code: forbidden
                    requestId: req_123
                aiDisabled:
                  summary: AI smart tools disabled
                  value:
                    title: AI Unavailable
                    status: 403
                    detail: AI smart tools are disabled for this organization.
                    code: ai_smart_tools_disabled
                    requestId: req_123
                aiNotInPlan:
                  summary: AI features not enabled for the plan
                  value:
                    title: AI Unavailable
                    status: 403
                    detail: AI features are not enabled for this organization's plan.
                    code: ai_features_not_enabled
                    requestId: req_123
        '422':
          description: AI generated an invalid payload after schema and v3 create validation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                invalidGeneratedPayload:
                  summary: Invalid generated payload
                  value:
                    title: Unprocessable Content
                    status: 422
                    detail: 'Generated survey payload is invalid: generatedSurvey.blocks: Too small'
                    code: ai_generated_payload_invalid
                    requestId: req_123
                    invalid_params:
                      - name: generatedSurvey.blocks
                        reason: Too small
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until the current rate-limit window resets
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '502':
          description: The configured AI provider failed or could not produce a valid draft
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                providerFailed:
                  summary: AI provider failed
                  value:
                    title: Bad Gateway
                    status: 502
                    detail: The AI provider could not generate a valid survey draft. Try again or add more detail.
                    code: bad_gateway
                    requestId: req_123
        '503':
          description: AI is not configured on this Formbricks instance
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                instanceNotConfigured:
                  summary: AI instance configuration missing
                  value:
                    title: AI Unavailable
                    status: 503
                    detail: AI is not configured for this Formbricks instance.
                    code: ai_instance_not_configured
                    requestId: req_123
      security:
        - sessionAuth: []
        - apiKeyAuth: []
  /api/v3/surveys/validate:
    post:
      operationId: validateSurveyV3
      summary: Validate a survey document
      description: |
        Validates a future create or patch survey payload without writing data, creating languages,
        or creating survey versions. Invalid survey documents return `200` with `data.valid=false`
        so agents and MCP clients can repair payloads from structured `invalid_params`.

        Use `400` only for malformed validation envelopes, unsupported operations, invalid `surveyId`,
        or unsupported query parameters.
      tags:
        - V3 Surveys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateSurveyRequest'
            examples:
              createValidation:
                summary: Validate a create payload
                value:
                  operation: create
                  data:
                    workspaceId: clxx1234567890123456789012
                    name: Product Feedback Survey
                    defaultLanguage: en-US
                    blocks:
                      - id: clbk1234567890123456789012
                        name: Main Block
                        elements:
                          - id: satisfaction
                            type: openText
                            headline:
                              en-US: What should we improve?
                            required: true
              patchValidation:
                summary: Validate a patch payload
                value:
                  operation: patch

            - country
          properties:
            type:
              type: string
              enum:
                - address
            addressLine1:
              $ref: '#/components/schemas/SurveyToggleInputConfig'
            addressLine2:
              $ref: '#/components/schemas/SurveyToggleInputConfig'
            city:
              $ref: '#/components/schemas/SurveyToggleInputConfig'
            state:
              $ref: '#/components/schemas/SurveyToggleInputConfig'
            zip:
              $ref: '#/components/schemas/SurveyToggleInputConfig'
            country:

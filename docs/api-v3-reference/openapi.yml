                - 5
            lowerLabel:
              $ref: '#/components/schemas/TranslatableText'
            upperLabel:
              $ref: '#/components/schemas/TranslatableText'
            isColorCodingEnabled:
              type: boolean
              default: false
      unevaluatedProperties: false
    SurveyCesElement:
      allOf:
        - $ref: '#/components/schemas/SurveyElementBase'
        - type: object
          required:
            - scale
            - range
          properties:
            type:
              type: string
              enum:
                - ces
            scale:
              type: string
              enum:
                - number
                - smiley
                - star
            range:
              type: integer
              enum:
                - 5
                - 7
            lowerLabel:
              $ref: '#/components/schemas/TranslatableText'
            upperLabel:
              $ref: '#/components/schemas/TranslatableText'
            isColorCodingEnabled:
              type: boolean
              default: false
      unevaluatedProperties: false
    SurveyElement:
      oneOf:
        - $ref: '#/components/schemas/SurveyOpenTextElement'
        - $ref: '#/components/schemas/SurveyConsentElement'
        - $ref: '#/components/schemas/SurveyMultipleChoiceSingleElement'
        - $ref: '#/components/schemas/SurveyMultipleChoiceMultiElement'
        - $ref: '#/components/schemas/SurveyNpsElement'
        - $ref: '#/components/schemas/SurveyCtaElement'
        - $ref: '#/components/schemas/SurveyRatingElement'
        - $ref: '#/components/schemas/SurveyPictureSelectionElement'
        - $ref: '#/components/schemas/SurveyDateElement'
        - $ref: '#/components/schemas/SurveyFileUploadElement'
        - $ref: '#/components/schemas/SurveyCalElement'
        - $ref: '#/components/schemas/SurveyMatrixElement'
        - $ref: '#/components/schemas/SurveyAddressElement'
        - $ref: '#/components/schemas/SurveyRankingElement'
        - $ref: '#/components/schemas/SurveyContactInfoElement'
        - $ref: '#/components/schemas/SurveyCsatElement'
        - $ref: '#/components/schemas/SurveyCesElement'
      discriminator:
        propertyName: type
        mapping:
          openText: '#/components/schemas/SurveyOpenTextElement'
          consent: '#/components/schemas/SurveyConsentElement'
          multipleChoiceSingle: '#/components/schemas/SurveyMultipleChoiceSingleElement'
          multipleChoiceMulti: '#/components/schemas/SurveyMultipleChoiceMultiElement'
          nps: '#/components/schemas/SurveyNpsElement'
          cta: '#/components/schemas/SurveyCtaElement'
          rating: '#/components/schemas/SurveyRatingElement'
          pictureSelection: '#/components/schemas/SurveyPictureSelectionElement'
          date: '#/components/schemas/SurveyDateElement'
          fileUpload: '#/components/schemas/SurveyFileUploadElement'
          cal: '#/components/schemas/SurveyCalElement'
          matrix: '#/components/schemas/SurveyMatrixElement'
          address: '#/components/schemas/SurveyAddressElement'
          ranking: '#/components/schemas/SurveyRankingElement'
          contactInfo: '#/components/schemas/SurveyContactInfoElement'
          csat: '#/components/schemas/SurveyCsatElement'
          ces: '#/components/schemas/SurveyCesElement'
      description: |
        Survey element/question inside a block. Element ids are stable public identifiers used by
        logic, recall strings, response data, quotas, integrations, and analysis. `type` selects the
        allowed shape; unsupported fields are rejected instead of ignored.
    SurveyDynamicReference:
      type: object
      description: Dynamic reference to another value in the survey document.
      required:
        - type
        - value
      properties:
        type:
          type: string
          enum:
            - element
            - variable
            - hiddenField
        value:
          type: string
          description: Element id, variable id, or hidden field id depending on `type`.
        meta:
          type: object
          additionalProperties:
            type: string
      additionalProperties: false
    SurveyLogicOperand:
      oneOf:
        - type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              enum:
                - static
            value:
              oneOf:
                - type: string
                - type: number
                - type: array
                  items:
                    type: string
          additionalProperties: false
        - $ref: '#/components/schemas/SurveyDynamicReference'
    SurveyCondition:
      type: object
      description: |
        Single condition. Operators such as `isSubmitted`, `isSkipped`, `isClicked`, `isAccepted`,
        `isBooked`, `isSet`, and `isEmpty` do not use `rightOperand`; comparison operators do.
      required:
        - id
        - leftOperand
        - operator
      properties:
        id:
          type: string
          format: cuid2
        leftOperand:
          $ref: '#/components/schemas/SurveyDynamicReference'
        operator:
          type: string
          enum:
            - equals
            - doesNotEqual
            - contains
            - doesNotContain
            - startsWith
            - doesNotStartWith
            - endsWith
            - doesNotEndWith
            - isSubmitted
            - isSkipped
            - isGreaterThan
            - isLessThan
            - isGreaterThanOrEqual
            - isLessThanOrEqual
            - equalsOneOf
            - includesAllOf
            - includesOneOf
            - doesNotIncludeOneOf
            - doesNotIncludeAllOf
            - isClicked
            - isNotClicked
            - isAccepted
            - isBefore
            - isAfter
            - isBooked
            - isPartiallySubmitted
            - isCompletelySubmitted
            - isSet
            - isNotSet
            - isEmpty
            - isNotEmpty
            - isAnyOf
        rightOperand:
          $ref: '#/components/schemas/SurveyLogicOperand'
      additionalProperties: false
    SurveyConditionGroup:
      type: object
      required:
        - id
        - connector
        - conditions
      properties:
        id:
          type: string
          format: cuid2
        connector:
          type: string
          enum:
            - and
            - or
        conditions:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/SurveyCondition'
              - $ref: '#/components/schemas/SurveyConditionGroup'
      additionalProperties: false
    SurveyCalculateAction:
      type: object
      description: Updates a survey variable when the logic rule matches.
      required:
        - id
        - objective
        - variableId
        - operator
        - value
      properties:
        id:
          type: string
          format: cuid2
        objective:
          type: string
          enum:
            - calculate
        variableId:
          type: string
          format: cuid2
          description: Variable id for `calculate`.
        operator:
          type: string
          enum:
            - assign
            - concat
            - add
            - subtract
            - multiply
            - divide
        value:
          $ref: '#/components/schemas/SurveyLogicOperand'
      additionalProperties: false
    SurveyRequireAnswerAction:
      type: object
      description: Requires an element/question to be answered before continuing.
      required:
        - id
        - objective
        - target
      properties:
        id:
          type: string
          format: cuid2
        objective:
          type: string
          enum:
            - requireAnswer
        target:
          type: string
          description: Target element id.
      additionalProperties: false
    SurveyJumpToBlockAction:
      type: object
      description: Jumps to another block or ending when the logic rule matches.
      required:
        - id
        - objective
        - target
      properties:
        id:
          type: string
          format: cuid2
        objective:
          type: string
          enum:
            - jumpToBlock
        target:
          type: string
          format: cuid2
          description: Target block id or ending id.
      additionalProperties: false
    SurveyLogicAction:
      oneOf:
        - $ref: '#/components/schemas/SurveyCalculateAction'
        - $ref: '#/components/schemas/SurveyRequireAnswerAction'
        - $ref: '#/components/schemas/SurveyJumpToBlockAction'
      description: |
        Logic action. Keep referenced ids stable: `calculate.variableId` points to a variable id,
        `requireAnswer.target` points to an element id, and `jumpToBlock.target` points to a block id
        or ending id.
    SurveyBlockLogic:
      type: object
      description: Conditional logic rule evaluated at block level.
      required:
        - id
        - conditions
        - actions
      properties:
        id:
          type: string
          format: cuid2
        conditions:
          $ref: '#/components/schemas/SurveyConditionGroup'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/SurveyLogicAction'
      additionalProperties: false
    CreateSurveyBlock:
      type: object
      description: |
        Block accepted by `POST /api/v3/surveys`. `id` may be omitted and will be generated by the
        server. Provide an explicit cuid2 id when logic in the same request needs to jump to this block.
        For normal sequential flow, omit `logic` and `logicFallback`. `logicFallback` is only valid
        when this same block has at least one `logic` rule.
      required:
        - name
        - elements
      properties:
        id:
          type: string
          format: cuid2
          description: Optional stable block id. Generated when omitted.
        name:
          type: string
          minLength: 1
        elements:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SurveyElement'
        logic:
          type: array
          items:
            $ref: '#/components/schemas/SurveyBlockLogic'
        logicFallback:
          type: string
          format: cuid2
          description: |
            Block or ending id used when no logic condition matches. Only valid when this same block
            has at least one `logic` rule; omit it for normal sequential flow.
        buttonLabel:
          $ref: '#/components/schemas/TranslatableText'
        backButtonLabel:
          $ref: '#/components/schemas/TranslatableText'
      additionalProperties: false
    SurveyEndScreenEnding:
      type: object
      description: Visual end screen displayed after survey completion.
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: cuid2
          description: Stable ending id. `jumpToBlock.target` may point to this id.
        type:
          type: string
          enum:
            - endScreen
        headline:
          $ref: '#/components/schemas/TranslatableText'
        subheader:
          $ref: '#/components/schemas/TranslatableText'
        buttonLabel:
          $ref: '#/components/schemas/TranslatableText'
        buttonLink:
          type: string
        imageUrl:
          type: string
        videoUrl:
          type: string
      additionalProperties: false
    SurveyRedirectEnding:
      type: object
      description: |
        Redirects the respondent to a URL after survey completion. External redirects require the
        organization's external URL permission; otherwise write endpoints return `403 Forbidden`.
      required:
        - id
        - type
        - url
      properties:
        id:
          type: string
          format: cuid2
          description: Stable ending id. `jumpToBlock.target` may point to this id.
        type:
          type: string
          enum:
            - redirectToUrl
        url:
          type: string
          format: uri
          description: External redirect URL. Requires the organization's external URL permission.
        label:
          type: string
          description: Optional internal label for redirect endings.
      additionalProperties: false
    SurveyEnding:
      oneOf:
        - $ref: '#/components/schemas/SurveyEndScreenEnding'
        - $ref: '#/components/schemas/SurveyRedirectEnding'
      discriminator:
        propertyName: type
        mapping:
          endScreen: '#/components/schemas/SurveyEndScreenEnding'
          redirectToUrl: '#/components/schemas/SurveyRedirectEnding'
      description: |
        Ending reached after the last block or a jump action. `type` selects the allowed shape;
        unsupported fields are rejected instead of ignored.
    SurveyHiddenFields:
      type: object
      description: |
        Hidden fields, sometimes called embedded data in other survey products. Field ids are stable
        public identifiers and may be referenced by logic, recall, quotas, integrations, and response data.
        Use only letters, numbers, underscores, and hyphens; avoid spaces and reserved ids.
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        fieldIds:
          type: array
          items:
            type: string
            pattern: ^[a-zA-Z0-9_-]+$
          uniqueItems: true
      additionalProperties: false
    CreateSurveyNumberVariable:
      type: object
      required:
        - name
        - type
        - value
      properties:
        id:
          type: string
          format: cuid2
          description: Optional stable variable id. Generated when omitted.
        name:
          type: string
          pattern: ^[a-z0-9_]+$
          description: Unique variable name. Lowercase letters, numbers, and underscores only.
        type:
          type: string
          enum:
            - number
        value:
          type: number
          description: Default numeric value.
      additionalProperties: false
    CreateSurveyTextVariable:
      type: object
      required:
        - name
        - type
        - value
      properties:
        id:
          type: string
          format: cuid2
          description: Optional stable variable id. Generated when omitted.
        name:
          type: string
          pattern: ^[a-z0-9_]+$
          description: Unique variable name. Lowercase letters, numbers, and underscores only.
        type:
          type: string
          enum:
            - text
        value:
          type: string
          description: Default text value.
      additionalProperties: false
    CreateSurveyVariable:
      oneOf:
        - $ref: '#/components/schemas/CreateSurveyNumberVariable'
        - $ref: '#/components/schemas/CreateSurveyTextVariable'
      description: |
        Survey variable accepted by `POST /api/v3/surveys`. `id` may be omitted and will be
        generated by the server. Provide an explicit cuid2 id when logic in the same request needs
        to reference this variable.
    CreateSurveyRequest:
      type: object
      description: |
        Strict v3 survey creation document. This endpoint accepts survey structure only: name,
        metadata, languages, welcome card, blocks/elements/logic, endings, hidden fields, and variables.
        It rejects legacy `questions` and out-of-scope settings such as styling, targeting, segments,
        follow-ups, recaptcha, single-use/email verification, slug, custom scripts, analytics fields,
        timestamps, and `createdBy`.

        Translatable fields use real locale-code maps. The map must include the canonical
        `defaultLanguage` key, such as `en-US`, so the server can persist the internal default
        translation. Locale keys must be canonical BCP 47 codes such as `de-DE`, `pt-PT`, or
        `zh-Hans-CN`. Non-default locale keys must be declared in `languages`; undeclared locale
        keys in metadata, welcome cards, blocks, or endings are rejected with `unsupported_locale`.

        `blocks[].id` and `variables[].id` may be omitted on create and will be generated by the
        server. Provide explicit cuid2 ids when other fields in the same request reference them.
        For normal sequential flow, omit `logicFallback`. It is only valid together with a non-empty
        `logic` array on the same block.
      required:
        - workspaceId
        - name
        - blocks
      properties:
        workspaceId:
          type: string
          format: cuid2
          description: Workspace where the survey will be created. Requires read/write access.
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - link
            - app
          default: link
          description: |
            Optional compatibility field. `link` and `app` survey types are accepted here; app/in-app
            survey distribution settings remain outside this structure-focused create endpoint.
        status:
          type: string
          enum:
            - draft
            - inProgress
            - paused
            - completed
          default: draft
        metadata:
          allOf:
            - $ref: '#/components/schemas/SurveyMetadata'
          default: {}
        defaultLanguage:
          allOf:
            - $ref: '#/components/schemas/LocaleCode'
          default: en-US
          description: Default authoring locale. Translatable maps must include this locale key.
        languages:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/CreateSurveyLanguage'
          description: |
            Optional survey language configuration. Every non-default locale used by translatable maps
            must be declared here; omitted languages are not inferred from map keys.
        welcomeCard:
          allOf:
            - $ref: '#/components/schemas/SurveyWelcomeCard'
          default:
            enabled: false
        blocks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateSurveyBlock'
        endings:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/SurveyEnding'
        hiddenFields:
          allOf:
            - $ref: '#/components/schemas/SurveyHiddenFields'
          default:
            enabled: false
        variables:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/CreateSurveyVariable'
      additionalProperties: false
    SurveyLanguage:
      type: object
      description: |
        Language configured for this survey. GET responses expose the server-emitted code/tag used as the
        translatable map key. Existing surveys can use region-qualified, language-only, or script-only codes.
        Disabled languages can still be read by the management API so unfinished translations can be completed.
      required:
        - code
        - default
        - enabled
      properties:
        code:
          type: string
          description: Server-emitted survey language code/tag used as the translatable map key.
          example: en-US
        alias:
          type:
            - string
            - 'null'
          description: Optional configured alias accepted by `?lang` for compatibility and agent discovery.
          example: english
        default:
          type: boolean
          description: Whether this is the default authoring language.
        enabled:
          type: boolean
          description: Whether this language is enabled for respondent-facing delivery.
    SurveyBlock:
      type: object
      description: |
        Block-based survey section. Block ids are stable public identifiers. Logic and fallbacks can
        jump to block ids or ending ids, so clients and agents should preserve ids unless intentionally
        creating/deleting a block.
      required:
        - id
        - name
        - elements
      properties:
        id:
          type: string
          format: cuid2
          description: Stable block id.
        name:
          type: string
          minLength: 1
        elements:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SurveyElement'
        logic:
          type: array
          items:
            $ref: '#/components/schemas/SurveyBlockLogic'
        logicFallback:
          type: string
          format: cuid2
          description: |
            Block or ending id used when no logic condition matches. Only valid when this same block
            has at least one `logic` rule; omit it for normal sequential flow.
        buttonLabel:
          $ref: '#/components/schemas/TranslatableText'
        backButtonLabel:
          $ref: '#/components/schemas/TranslatableText'
      additionalProperties: false
    SurveyNumberVariable:
      type: object
      description: |
        Number variable. Used by `calculate` logic actions with numeric operators such as `add`,
        `subtract`, `multiply`, `divide`, or `assign`.
      required:
        - id
        - name
        - type
        - value
      properties:
        id:
          type: string
          format: cuid2
          description: Stable variable id referenced from logic.
        name:
          type: string
          pattern: ^[a-z0-9_]+$
          description: Unique variable name. Lowercase letters, numbers, and underscores only.
        type:
          type: string
          enum:
            - number
        value:
          type: number
          description: Default numeric value.
      additionalProperties: false
    SurveyTextVariable:
      type: object
      description: |
        Text variable. Used by `calculate` logic actions with text operators such as `assign` or `concat`.
      required:
        - id
        - name
        - type
        - value
      properties:
        id:
          type: string
          format: cuid2
          description: Stable variable id referenced from logic.
        name:
          type: string
          pattern: ^[a-z0-9_]+$
          description: Unique variable name. Lowercase letters, numbers, and underscores only.
        type:
          type: string
          enum:
            - text
        value:
          type: string
          description: Default text value.
      additionalProperties: false
    SurveyVariable:
      oneOf:
        - $ref: '#/components/schemas/SurveyNumberVariable'
        - $ref: '#/components/schemas/SurveyTextVariable'
      description: |
        Survey variable. Variable ids are stable references used by logic and calculation actions.
        Variable names are human-readable labels and must be unique within the survey.
    SurveyResource:
      type: object
      required:
        - id
        - workspaceId
        - createdAt
        - updatedAt
        - name
        - type
        - status
        - metadata
        - defaultLanguage
        - languages
        - welcomeCard
        - blocks
        - endings
        - hiddenFields
        - variables
      properties:
        id:
          type: string
        workspaceId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        name:
          type: string
        type:
          type: string
          enum:
            - link
            - app
            - website
            - web
        status:
          type: string
          enum:
            - draft
            - inProgress
            - paused
            - completed
        metadata:
          anyOf:
            - $ref: '#/components/schemas/SurveyMetadata'
            - type: 'null'
        defaultLanguage:
          type: string
          description: Emitted language code/tag for the survey default language. The internal `default` translation key is never exposed.
        languages:
          type: array
          items:
            $ref: '#/components/schemas/SurveyLanguage'
        welcomeCard:
          $ref: '#/components/schemas/SurveyWelcomeCard'
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/SurveyBlock'
        endings:
          type: array
          items:
            $ref: '#/components/schemas/SurveyEnding'
        hiddenFields:
          $ref: '#/components/schemas/SurveyHiddenFields'
        variables:
          type: array
          items:
            $ref: '#/components/schemas/SurveyVariable'
    AISurveyGenerationLocaleCode:
      type: string
      enum:
        - de-DE
        - en-US
        - es-ES
        - fr-FR
        - hu-HU
        - ja-JP
        - nl-NL
        - pt-BR
        - pt-PT
        - ro-RO
        - ru-RU
        - sv-SE
        - tr-TR
        - zh-Hans-CN
        - zh-Hant-TW
      description: Supported app locale code that AI survey creation can return.
      example: en-US
    GenerateSurveyRequest:
      type: object
      description: |
        AI survey creation request. `prompt` is used only to create a draft payload; it is not
        persisted by this endpoint. The generated payload is validated and returned to the caller for
        a separate create request.
      required:
        - workspaceId
        - prompt
      properties:
        workspaceId:
          type: string
          format: cuid2
          description: Workspace where the AI-created survey draft would be created. Requires read/write access.
        prompt:
          type: string
          minLength: 4
          maxLength: 1200
          description: |
            Natural-language survey goal and audience. Prompts with fewer than 24 characters or fewer
            than four whitespace-separated words return prompt feedback before any AI provider call.
        type:
          type: string
          enum:
            - link
          default: link
          description: Link Survey is the only AI-created type until the v3 create endpoint supports additional types.
        language:
          $ref: '#/components/schemas/AISurveyGenerationLocaleCode'
          description: |
            Preferred survey language. Session clients should send the logged-in user's language.
            The generator uses it when the prompt language is ambiguous or cannot be confidently
            matched to a supported app locale.
      additionalProperties: false
    GeneratedSurveyValidationLanguage:
      type: object
      required:
        - code
        - default
        - enabled
      properties:
        code:
          $ref: '#/components/schemas/AISurveyGenerationLocaleCode'
        default:
          type: boolean
        enabled:
          type: boolean
      additionalProperties: false
    GeneratedSurveyValidationResult:
      type: object
      required:
        - valid
        - invalid_params
        - languages
      properties:
        valid:
          type: boolean
          description: Whether the generated create payload passed the same v3 create preparation pipeline.
        invalid_params:
          type: array
          description: Repairable validation errors. Successful generate responses return an empty array.
          items:
            $ref: '#/components/schemas/InvalidParam'
        languages:
          type: array
          description: Languages that the generated create payload would connect or create.
          items:
            $ref: '#/components/schemas/GeneratedSurveyValidationLanguage'
      additionalProperties: false
    GenerateSurveyResult:
      type: object
      required:
        - language
        - payload
        - validation
      properties:
        language:
          $ref: '#/components/schemas/AISurveyGenerationLocaleCode'
          description: Supported app locale used for the AI-created survey content and create payload language maps.
        payload:
          allOf:
            - $ref: '#/components/schemas/CreateSurveyRequest'
          description: |
            Strict create payload ready for `POST /api/v3/surveys`. It always has `status: draft`.
        validation:
          $ref: '#/components/schemas/GeneratedSurveyValidationResult'
      additionalProperties: false
    ValidateSurveyCreateRequest:
      type: object
      required:
        - operation
        - data
      properties:
        operation:
          type: string
          enum:
            - create
        data:
          description: Intended create payload. Invalid documents are allowed so the endpoint can return repairable validation errors.
          anyOf:
            - $ref: '#/components/schemas/CreateSurveyRequest'
            - type: object
              additionalProperties: true
      additionalProperties: false
    PatchSurveyRequest:
      type: object
      minProperties: 1
      description: |
        Patch payload shape. Top-level fields are partial; any provided nested object or array
        fully replaces that subtree. Omitted top-level fields are preserved. Immutable/system fields
        such as `id`, `workspaceId`, `type`, `defaultLanguage`, timestamps, `questions`, analytics,
        distribution, styling, targeting, and scripts are rejected.

        `metadata`, `languages`, `welcomeCard`, `blocks`, `endings`, `hiddenFields`, and `variables`
        replace their full top-level value when provided. Missing ids in replaced arrays are deletions.
        Non-default locale keys in translatable maps must be declared in `languages`; undeclared locale
        keys are rejected with `unsupported_locale`. To remove a language, remove it from both
        `languages` and every translatable map that contains that locale key.
        Use `/api/v3/surveys/validate` with `operation: patch` before committing automated or agentic
        changes.
      properties:
        name:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - draft
            - inProgress
            - paused
            - completed
        metadata:
          allOf:
            - $ref: '#/components/schemas/SurveyMetadata'
        languages:
          type: array
          items:
            $ref: '#/components/schemas/CreateSurveyLanguage'
          description: |
            Replaces the survey language configuration. The default language cannot be changed through
            PATCH; any `default: true` entry must match the existing default language. Languages referenced
            by `metadata`, `welcomeCard`, `blocks`, or `endings` translatable maps must be explicitly
            declared here, so remove the locale key from those maps as well when intentionally removing
            a language.
        welcomeCard:
          $ref: '#/components/schemas/SurveyWelcomeCard'
        blocks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SurveyBlock'
        endings:
          type: array
          items:
            $ref: '#/components/schemas/SurveyEnding'
        hiddenFields:
          $ref: '#/components/schemas/SurveyHiddenFields'
        variables:
          type: array
          items:
            $ref: '#/components/schemas/SurveyVariable'
      additionalProperties: false
    ValidateSurveyPatchRequest:
      type: object
      required:
        - operation
        - surveyId
        - data
      properties:
        operation:
          type: string
          enum:
            - patch
        surveyId:
          type: string
          format: cuid2
        data:
          description: Intended patch payload. Invalid documents are allowed so the endpoint can return repairable validation errors.
          anyOf:
            - $ref: '#/components/schemas/PatchSurveyRequest'
            - type: object
              additionalProperties: true
      additionalProperties: false
    ValidateSurveyRequest:
      oneOf:
        - $ref: '#/components/schemas/ValidateSurveyCreateRequest'
        - $ref: '#/components/schemas/ValidateSurveyPatchRequest'
      discriminator:
        propertyName: operation
        mapping:
          create: '#/components/schemas/ValidateSurveyCreateRequest'
          patch: '#/components/schemas/ValidateSurveyPatchRequest'
    SurveyValidationLanguage:
      type: object
      required:
        - code
        - default
        - enabled
        - writeBehavior
      properties:
        code:
          $ref: '#/components/schemas/LocaleCode'
        default:
          type: boolean
        enabled:
          type: boolean
        writeBehavior:
          type: string
          enum:
            - connect_or_create
          description: Validation is read-only; a real write would connect an existing language or create it if missing.
      additionalProperties: false
    SurveyValidationResult:
      type: object
      required:
        - valid
        - operation
        - invalid_params
      properties:
        valid:
          type: boolean
          description: Whether the submitted survey document is valid.
        operation:
          type: string
          enum:
            - create
            - patch
        invalid_params:
          type: array
          description: Repairable validation errors using document-relative paths.
          items:
            $ref: '#/components/schemas/InvalidParam'
        languages:
          type: array
          description: Languages that a successful write would connect or create. Present only when `valid=true`.
          items:
            $ref: '#/components/schemas/SurveyValidationLanguage'
      additionalProperties: false
    WorkflowStatus:
      type: string
      enum:
        - draft
        - enabled
        - disabled
        - archived
      description: |
        Workflow lifecycle state. `draft` workflows are editable and inert. `enabled` workflows
        respond to trigger events. `disabled` workflows keep their configuration but are inert.
        `archived` workflows are soft-deleted: read-only, excluded from default list reads, and
        restorable via unarchive.

        Status only changes through lifecycle endpoints. Valid transitions: `draft` → `enabled`,
        `enabled` ↔ `disabled`, `enabled`/`disabled` → `draft`, any non-archived state → `archived`
        (archive), and `archived` → `draft` (unarchive).
    WorkflowRunStatus:
      type: string
      enum:
        - queued
        - running
        - completed
        - failed
        - canceled
      description: |
        Workflow run lifecycle state. `completed`, `failed`, and `canceled` are terminal. Valid
        transitions: `queued` → `running`, `running` → `queued` (retry/backoff), `queued` →
        `canceled`, and `running` → `completed`/`failed`/`canceled`. Retries do not introduce a
        separate status; retry state is exposed via `attempt` and `nextAttemptAt`.
    WorkflowRunSummary:
      type: object
      description: |
        Slim run shape returned by `GET /api/v3/workflows/runs` and embedded as `lastRun` in
        workflow resources. Excludes `triggerPayload`, `data`, and `logs`.
      required:
        - id
        - workflowId
        - workspaceId
        - workflowVersionId
        - status
        - isDryRun
        - triggerType
        - surveyId
        - responseId
        - error
        - attempt
        - createdAt
        - updatedAt
        - startedAt
        - finishedAt
      properties:
        id:
          type: string
          format: cuid2
        workflowId:
          type: string
          format: cuid2
        workspaceId:
          type: string
          format: cuid2
        workflowVersionId:
          type:
            - string
            - 'null'
          format: cuid2
          description: |
            Immutable workflow version snapshot the run executes against. `null` for dry runs of
            workflows that have never been enabled. Version contents are not readable through the
            v3 API in Scope 1.
        status:
          $ref: '#/components/schemas/WorkflowRunStatus'
        isDryRun:
          type: boolean
          description: '`true` for runs created by `POST /api/v3/workflows/{workflowId}/test`.'
        triggerType:
          type: string
          enum:
            - response.completed
        surveyId:
          type:
            - string
            - 'null'
          format: cuid2
        responseId:
          type:
            - string
            - 'null'
          format: cuid2
          description: Survey response that triggered the run. `null` for synthesized dry-run data or when the response was deleted.
        error:
          type:
            - string
            - 'null'
          description: Terminal or most recent failure reason. `null` while the run is healthy.
        attempt:
          type: integer
          minimum: 0
          description: Retry attempt counter. `0` on the first execution; retries increment it without changing `status`.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        startedAt:
          type:
            - string
            - 'null'
          format: date-time
        finishedAt:
          type:
            - string
            - 'null'
          format: date-time
    WorkflowListItem:
      type: object
      description: |
        Slim workflow shape returned by `GET /api/v3/workflows`. `triggerType` and `surveyId` are
        derived read-only projections of `definition.trigger`, so list consumers can render and
        filter without loading full definitions. Serialized dates are ISO 8601 strings.
      required:
        - id
        - workspaceId
        - name
        - description
        - status
        - triggerType
        - surveyId
        - createdBy
        - creator
        - createdAt
        - updatedAt
        - lastRun
      properties:
        id:
          type: string
          format: cuid2
        workspaceId:
          type: string
          format: cuid2
        name:
          type: string
        description:
          type:
            - string
            - 'null'
        status:
          $ref: '#/components/schemas/WorkflowStatus'
        triggerType:
          type: string
          enum:
            - response.completed
          description: Derived from `definition.trigger.triggerType`.
        surveyId:
          type: string
          format: cuid2
          description: Derived from `definition.trigger.config.surveyId`.
        createdBy:
          type:
            - string
            - 'null'
          format: cuid2
          description: User id that created the workflow. `null` when the creating user was deleted.
        creator:
          type:
            - object
            - 'null'
          required:
            - name
          properties:
            name:
              type: string
          description: Creating user's name. `null` when the creating user was deleted.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastRun:
          anyOf:
            - $ref: '#/components/schemas/WorkflowRunSummary'
            - type: 'null'
          description: Most recent run summary (dry runs included). `null` when the workflow has never run.
    CursorPaginationMeta:
      type: object
      required:
        - limit
        - nextCursor
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 100
        nextCursor:
          type:
            - string
            - 'null'
          description: Opaque cursor for the next page. `null` when there are no more results.
      additionalProperties: false
    WorkflowNodeUi:
      type: object
      description: Builder-only UI metadata that does not affect workflow execution. Additional keys are preserved.
      properties:
        position:
          type: object
          required:
            - x
            - 'y'
          properties:
            x:
              type: number
            'y':
              type: number
          additionalProperties: false
        collapsed:
          type: boolean
      additionalProperties: true
    WorkflowResponseCompletedTriggerNode:
      type: object
      required:
        - id
        - type
        - triggerType
        - config
      properties:
        id:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - trigger
        triggerType:
          type: string
          enum:
            - response.completed
        label:
          type: string
          minLength: 1
          maxLength: 120
          description: Optional display label shown in the builder.
        config:
          type: object
          required:
            - surveyId
          properties:
            surveyId:
              type: string
              format: cuid2
              description: Survey whose completed responses trigger the workflow. Must exist in the workspace.
            endingCardIds:
              type: array
              items:
                type: string
                format: cuid2
              default: []
              description: Ending card ids that should trigger the workflow. Empty or omitted means every ending matches.
          additionalProperties: false
        ui:
          $ref: '#/components/schemas/WorkflowNodeUi'
      additionalProperties: false
    WorkflowSendEmailActionConfig:
      type: object
      description: Send-email action with 1:1 field parity to survey Follow-ups (`ZSurveyFollowUpAction`).
      required:
        - to
        - from
        - replyTo
        - subject
        - body
        - attachResponseData
      properties:
        to:
          type: string
          minLength: 1
          description: |
            Recipient: either a literal email address (e.g. a teammate) or the element id of a
            survey question whose answer contains the respondent's email address — the same
            semantics as the Follow-ups `to` field.
        from:
          type: string
          format: email
        replyTo:
          type: array
          items:
            type: string
            format: email
        subject:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
        attachResponseData:
          type: boolean
        includeVariables:
          type: boolean
          default: false
        includeHiddenFields:
          type: boolean
          default: false
      additionalProperties: false
    WorkflowSendEmailActionNode:
      type: object
      required:
        - id
        - type
        - actionType
        - config
      properties:
        id:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - action
        actionType:
          type: string
          enum:
            - send_email
        label:
          type: string
          minLength: 1
          maxLength: 120
          description: Optional display label shown in the builder.
        config:
          $ref: '#/components/schemas/WorkflowSendEmailActionConfig'
        ui:
          $ref: '#/components/schemas/WorkflowNodeUi'
      additionalProperties: false
    WorkflowEdge:
      type: object
      required:
        - id
        - source
        - target
      properties:
        id:
          type: string
          minLength: 1
        source:
          type: string
          minLength: 1
          description: Node id the edge starts from.
        target:
          type: string
          minLength: 1
          description: Node id the edge points to.
        sourceHandle:
          type: string
          minLength: 1
          description: Builder handle identifier on the source node. Reserved for branch nodes (`then`/`else`) in future scopes.
        targetHandle:
          type: string
          minLength: 1
          description: Builder handle identifier on the target node.
      additionalProperties: false
    WorkflowDefinition:
      type: object
      description: |
        Scope 1 workflow JSON document, mirroring `ZWorkflowDefinition` in `packages/workflows`. The
        definition is the public source of truth for the builder and API clients. Scope 1
        intentionally excludes user-authored if/else branches, webhook actions, schedules, delays,
        loops, and AI/MCP-assisted creation; future node types extend `nodes` additively.

        Graph rules enforced on every write (**400** with `invalid_params` on violation):
        node ids are unique across `trigger` and `nodes`; every edge references existing node ids;
        the trigger has at most one outgoing edge; `entryNodeId` equals `trigger.id`. Trigger-only
        drafts (no `nodes`, no `edges`) are valid persisted documents. Executability rules (exactly
        one outgoing trigger edge, acyclic graph, every node reachable from the trigger) are
        additionally enforced by `enable` and `test` with **422** `workflow_not_executable`.
      required:
        - trigger
        - entryNodeId
      properties:
        schemaVersion:
          type: integer
          enum:
            - 1
          default: 1
          description: Definition schema version. Optional on writes (defaults to the current version); always present in responses.
        trigger:
          $ref: '#/components/schemas/WorkflowResponseCompletedTriggerNode'
        nodes:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/WorkflowSendEmailActionNode'
          description: Child nodes of the graph. The trigger lives in `trigger`, not in this array. Scope 1 accepts `send_email` action nodes only. Optional on writes (defaults to empty for trigger-only drafts); always present in responses.
        edges:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/WorkflowEdge'
          description: Optional on writes (defaults to empty for trigger-only drafts); always present in responses.
        entryNodeId:
          type: string
          minLength: 1
          description: Workflow entry point. Must equal `trigger.id`.
      additionalProperties: false
    CreateWorkflowRequest:
      type: object
      required:
        - workspaceId
        - name
        - definition
      properties:
        workspaceId:
          type: string
          format: cuid2
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type:
            - string
            - 'null'
          maxLength: 500
        status:
          type: string
          enum:
            - draft
          description: New workflows are created as drafts in Scope 1.
        definition:
          $ref: '#/components/schemas/WorkflowDefinition'
      additionalProperties: false
    WorkflowResource:
      description: |
        Full workflow shape returned by detail, create, update, duplicate, and lifecycle endpoints:
        the list-item fields plus the complete `definition` document.
      allOf:
        - $ref: '#/components/schemas/WorkflowListItem'
        - type: object
          required:
            - definition
          properties:
            definition:
              $ref: '#/components/schemas/WorkflowDefinition'
    WorkflowTriggerPayload:
      type: object
      description: |
        Trigger payload snapshot captured when a run is created, mirroring
        `ZWorkflowTriggerRunPayload`. Additional runner keys may be present.
      required:
        - type
        - workspaceId
        - surveyId
        - responseId
        - triggeredAt
      properties:
        type:
          type: string
          enum:
            - response.completed
        workspaceId:
          type: string
          format: cuid2
        surveyId:
          type: string
          format: cuid2
        responseId:
          type: string
          format: cuid2
          description: For dry runs without a `responseId` input, this references the synthesized sample response.
        endingCardId:
          type: string
          format: cuid2
          description: Ending card the respondent reached, when the survey uses ending cards.
        data:
          type: object
          description: Response data snapshot used by the runner.
        triggeredAt:
          type: string
          format: date-time
      additionalProperties: true
    WorkflowRunLogStatus:
      type: string
      enum:
        - pending
        - running
        - succeeded
        - failed
        - skipped
      description: Status of one executed (or skipped) workflow step within a run.
    WorkflowRunStepResult:
      type: object
      description: In-document result for one workflow step, mirroring `ZWorkflowStepResult`.
      required:
        - stepId
        - stepType
        - status
      properties:
        stepId:
          type: string
          minLength: 1
          description: Node id of the executed step.
        stepType:
          type: string
          minLength: 1
          description: Node/step type, e.g. `response.completed` or `send_email`.
        status:
          $ref: '#/components/schemas/WorkflowRunLogStatus'
        input:
          type: object
          description: Step input snapshot.
        output:
          type: object
          description: Step output snapshot, or the mocked output for dry runs.
        error:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
      additionalProperties: false
    WorkflowRunData:
      type: object
      description: |
        Run execution data persisted with the run, mirroring `ZWorkflowRunData`. Scope 1 exposes
        this as a debug-oriented JSON dump. Additional runner keys may be present.
      required:
        - steps
      properties:
        trigger:
          allOf:
            - $ref: '#/components/schemas/WorkflowTriggerPayload'
          description: Optional duplicate of the trigger payload snapshot kept inside the run data document.
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowRunStepResult'
      additionalProperties: true
    WorkflowRunLog:
      type: object
      description: Persisted trace entry for one workflow run step, mirroring the `WorkflowRunLog` table row.
      required:
        - id
        - runId
        - sequence
        - stepId
        - stepType
        - status
        - input
        - output
        - error
        - startedAt
        - finishedAt
      properties:
        id:
          type: string
          format: cuid2
        runId:
          type: string
          format: cuid2
        sequence:
          type: integer
          minimum: 0
          description: Order of the entry within the run.
        stepId:
          type: string
          minLength: 1
        stepType:
          type: string
          minLength: 1
        status:
          $ref: '#/components/schemas/WorkflowRunLogStatus'
        input:
          type: object
          description: Step input snapshot. Empty object when nothing was recorded.
        output:
          type: object
          description: Step output snapshot (mocked for dry runs). Empty object when nothing was recorded.
        error:
          type:
            - string
            - 'null'
        startedAt:
          type:
            - string
            - 'null'
          format: date-time
        finishedAt:
          type:
            - string
            - 'null'
          format: date-time
      additionalProperties: false
    WorkflowRunResource:
      description: |
        Full run shape returned by `GET /api/v3/workflows/runs/{runId}` and
        `POST /api/v3/workflows/{workflowId}/test`: the summary fields plus the captured trigger
        payload, per-step results, the persisted log trace, and retry/idempotency metadata.
      allOf:
        - $ref: '#/components/schemas/WorkflowRunSummary'
        - type: object
          required:
            - triggerPayload
            - data
            - logs
            - idempotencyKey
            - nextAttemptAt
            - lastErrorAt
          properties:
            triggerPayload:
              $ref: '#/components/schemas/WorkflowTriggerPayload'
            data:
              $ref: '#/components/schemas/WorkflowRunData'
            logs:
              type: array
              items:
                $ref: '#/components/schemas/WorkflowRunLog'
              description: Persisted step-by-step trace, ordered by `sequence`. Empty while the run is still `queued`.
            idempotencyKey:
              type:
                - string
                - 'null'
              description: Deduplication key for this run, unique per workflow. Set from the `Idempotency-Key` header on dry runs or from trigger-event deduplication.
            nextAttemptAt:
              type:
                - string
                - 'null'
              format: date-time
              description: When the next retry attempt is scheduled. `null` when no retry is pending.
            lastErrorAt:
              type:
                - string
                - 'null'
              format: date-time
    PatchWorkflowRequest:
      type: object
      description: |
        Partial workflow update. `name` and `description` are accepted in any state except
        `archived`; `definition` is only accepted while the workflow is `draft` or `disabled`.
        `status` is intentionally not patchable — use the lifecycle endpoints.
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type:
            - string
            - 'null'
          maxLength: 500
        definition:
          $ref: '#/components/schemas/WorkflowDefinition'
      additionalProperties: false
    DuplicateWorkflowRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Optional name for the duplicate. If omitted, the server chooses a non-conflicting copy name.
      additionalProperties: false
    TestWorkflowRequest:
      type: object
      description: |
        Optional dry-run input. When `responseId` is omitted, the server synthesizes a sample
        `response.completed` payload from the survey configured on the workflow trigger. Manually
        authored trigger payloads are intentionally not accepted in Scope 1.
      properties:
        responseId:
          type: string
          format: cuid2
          description: Optional existing response id (from the trigger's survey) to replay as dry-run sample data.
      additionalProperties: false
  parameters:
    WorkspaceIdQuery:
      in: query
      name: workspaceId
      required: true
      schema:
        type: string
        format: cuid2
      description: Workspace identifier. This is the canonical container ID for v3 APIs.
    LimitQuery:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size (max 100).
    CursorQuery:
      in: query
      name: cursor
      schema:
        type: string
      description: Opaque cursor returned as `meta.nextCursor` from the previous page. Omit on the first request.
    WorkflowRunIdPath:
      in: path
      name: runId
      required: true
      schema:
        type: string
        format: cuid2
      description: Workflow run identifier.
    WorkflowIdPath:
      in: path
      name: workflowId
      required: true
      schema:
        type: string
        format: cuid2
      description: Workflow identifier.
  responses:
    V3BadRequest:
      description: Bad Request — malformed JSON, invalid query/body/params, duplicate name, or unsupported field.
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    V3Unauthorized:
      description: Not authenticated (no valid session or API key).
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    V3Forbidden:
      description: Forbidden — no workspace access, or resource does not exist (404 not used; avoids existence leak).
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    V3TooManyRequests:
      description: Rate limit exceeded.
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
        Retry-After:
          schema:
            type: integer
          description: Seconds until the current rate-limit window resets.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    V3InternalServerError:
      description: Internal Server Error.
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    V3UnprocessableContent:
      description: Unprocessable Content — semantic validation failed or the requested lifecycle transition is invalid.
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    WorkflowResourceResponse:
      description: Workflow returned successfully
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: '#/components/schemas/WorkflowResource'
    V3Conflict:
      description: Conflict — an `Idempotency-Key` retry arrived while the original request was still being processed (IETF `draft-ietf-httpapi-idempotency-key-header` semantics). Retry after the original request completes to receive its stored result.
      headers:
        X-Request-Id:
          schema:
            type: string
          description: Request correlation ID
        Cache-Control:
          schema:
            type: string
          example: private, no-store
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

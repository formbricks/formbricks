          $ref: '#/components/responses/V3BadRequest'
        '401':
          $ref: '#/components/responses/V3Unauthorized'
        '403':
          $ref: '#/components/responses/V3Forbidden'
        '429':
          $ref: '#/components/responses/V3TooManyRequests'
        '500':
          $ref: '#/components/responses/V3InternalServerError'
      security:
        - sessionAuth: []
        - apiKeyAuth: []
  /api/v3/workflows/{workflowId}/duplicate:
    post:
      operationId: duplicateWorkflowV3
      summary: Duplicate a workflow
      description: |
        Creates a new `draft` workflow by copying an existing workflow's definition, name (or the
        provided override), and description. The duplicate receives its own id and timestamps and
        starts with empty run and version history; the source workflow is unchanged. Archived
        workflows can be duplicated (the copy starts as a normal draft).
      tags:
        - V3 Workflows
      parameters:
        - $ref: '#/components/parameters/WorkflowIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicateWorkflowRequest'
      responses:
        '201':
          description: Workflow duplicated successfully
          headers:
            X-Request-Id:
              schema:
                type: string
              description: Request correlation ID
            Cache-Control:
              schema:
                type: string
              example: private, no-store
            Location:
              schema:
                type: string
              example: /api/v3/workflows/clworkflowcopy000000000
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/WorkflowResource'
        '400':
          $ref: '#/components/responses/V3BadRequest'
        '401':
          $ref: '#/components/responses/V3Unauthorized'
        '403':
          $ref: '#/components/responses/V3Forbidden'
        '422':
          $ref: '#/components/responses/V3UnprocessableContent'
        '429':
          $ref: '#/components/responses/V3TooManyRequests'
        '500':
          $ref: '#/components/responses/V3InternalServerError'
      security:
        - sessionAuth: []
        - apiKeyAuth: []
  /api/v3/workflows/{workflowId}/enable:
    post:
      operationId: enableWorkflowV3
      summary: Enable a workflow
      description: |
        Moves a workflow from `draft` or `disabled` to `enabled`. Only enabled workflows respond to
        trigger events.

        Enabling validates that the definition is executable — the trigger has exactly one outgoing
        edge (trigger-only drafts cannot be enabled), the graph is acyclic, every node is
        reachable from the trigger, only Scope 1 node types are present, and the referenced survey
        and ending cards still exist — and then snapshots an immutable workflow version. Runs
        reference that snapshot via `workflowVersionId`, so later draft edits never change what an
        enabled workflow executes. Validation failures return **422** with code
        `workflow_not_executable` and structured `invalid_params`; calling enable in a state other
        than `draft` or `disabled` returns **422** with code `invalid_workflow_state`. Two concurrent enable requests race to publish the next version; the loser is rejected with **409** code `conflict` and can safely retry.
      tags:
        - V3 Workflows
      parameters:
        - $ref: '#/components/parameters/WorkflowIdPath'
      responses:
        '200':
          $ref: '#/components/responses/WorkflowResourceResponse'
        '400':
          $ref: '#/components/responses/V3BadRequest'
        '401':
          $ref: '#/components/responses/V3Unauthorized'
        '403':
          $ref: '#/components/responses/V3Forbidden'
        '409':
          $ref: '#/components/responses/V3Conflict'
        '422':
          $ref: '#/components/responses/V3UnprocessableContent'
        '429':
          $ref: '#/components/responses/V3TooManyRequests'
        '500':
          $ref: '#/components/responses/V3InternalServerError'
      security:
        - sessionAuth: []
        - apiKeyAuth: []
  /api/v3/workflows/{workflowId}/disable:
    post:
      operationId: disableWorkflowV3
      summary: Disable a workflow
      description: |
        Moves an `enabled` workflow to `disabled`. Disabled workflows keep their configuration but
        do not respond to trigger events; runs that are already queued or running are not canceled.
        Calling disable in any other state returns **422** with code `invalid_workflow_state`.
      tags:
        - V3 Workflows
      parameters:
        - $ref: '#/components/parameters/WorkflowIdPath'
      responses:
        '200':
          $ref: '#/components/responses/WorkflowResourceResponse'
        '400':
          $ref: '#/components/responses/V3BadRequest'
        '401':
          $ref: '#/components/responses/V3Unauthorized'
        '403':
          $ref: '#/components/responses/V3Forbidden'
        '422':
          $ref: '#/components/responses/V3UnprocessableContent'
        '429':
          $ref: '#/components/responses/V3TooManyRequests'
        '500':
          $ref: '#/components/responses/V3InternalServerError'
      security:
        - sessionAuth: []
        - apiKeyAuth: []
  /api/v3/workflows/{workflowId}/archive:
    post:
      operationId: archiveWorkflowV3
      summary: Archive a workflow
      description: |
        Soft-deletes a workflow by moving it from any non-archived state to `archived`. Archived
        workflows stop responding to trigger events immediately, become read-only, and are excluded
        from list responses unless requested with `filter[status][in]=archived`. Their runs, version
        history, and definition are preserved, and the workflow can be restored with
        `POST /api/v3/workflows/{workflowId}/unarchive`. Archiving an already archived workflow
        returns **422** with code `invalid_workflow_state`.
      tags:
        - V3 Workflows
      parameters:
        - $ref: '#/components/parameters/WorkflowIdPath'
      responses:
        '200':
          $ref: '#/components/responses/WorkflowResourceResponse'
        '400':
          $ref: '#/components/responses/V3BadRequest'
        '401':
          $ref: '#/components/responses/V3Unauthorized'
        '403':
          $ref: '#/components/responses/V3Forbidden'
        '422':
          $ref: '#/components/responses/V3UnprocessableContent'
        '429':
          $ref: '#/components/responses/V3TooManyRequests'
        '500':
          $ref: '#/components/responses/V3InternalServerError'
      security:
        - sessionAuth: []
        - apiKeyAuth: []
  /api/v3/workflows/{workflowId}/unarchive:
    post:
      operationId: unarchiveWorkflowV3
      summary: Unarchive a workflow
      description: |
        Restores an `archived` workflow to `draft`. Unarchiving never re-enables a workflow
        automatically: re-enable explicitly with `POST /api/v3/workflows/{workflowId}/enable`, which
        re-validates the definition (the referenced survey or ending cards may have changed while
        the workflow was archived). Calling unarchive on a non-archived workflow returns **422**
        with code `invalid_workflow_state`.
      tags:
        - V3 Workflows
      parameters:
        - $ref: '#/components/parameters/WorkflowIdPath'
      responses:
        '200':
          $ref: '#/components/responses/WorkflowResourceResponse'
        '400':
          $ref: '#/components/responses/V3BadRequest'
        '401':
          $ref: '#/components/responses/V3Unauthorized'
        '403':
          $ref: '#/components/responses/V3Forbidden'
        '422':
          $ref: '#/components/responses/V3UnprocessableContent'
        '429':
          $ref: '#/components/responses/V3TooManyRequests'
        '500':
          $ref: '#/components/responses/V3InternalServerError'
      security:
        - sessionAuth: []
        - apiKeyAuth: []
  /api/v3/workflows/{workflowId}/test:
    post:
      operationId: testWorkflowV3
      summary: Test a workflow with a dry run
      description: |
        Creates a dry-run workflow run for configuration validation and debugging. Dry runs validate
        the definition, evaluate the trigger against sample data, and mock action execution — they
        never send email or perform real side effects. The run is persisted with `isDryRun: true`.

        Testing works in `draft`, `enabled`, and `disabled` states so workflows can be verified
        before they go live; testing an `archived` workflow returns **422** with code
        `invalid_workflow_state`. Definitions that cannot execute return **422** with code
        `workflow_not_executable` and structured `invalid_params`.

        By default the server synthesizes a sample `response.completed` payload from the configured
        survey; pass `responseId` to replay an existing response instead. Execution is asynchronous:
        the endpoint returns the created run (initially `queued`) and clients poll
        `GET /api/v3/workflows/runs/{runId}` for step results and logs.
      tags:
        - V3 Workflows
      parameters:
        - $ref: '#/components/parameters/WorkflowIdPath'
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            maxLength: 255
          description: |
            Optional client-generated key that makes dry-run creation retry-safe (IETF
            `draft-ietf-httpapi-idempotency-key-header` semantics). Keys are unique per workflow; a
            retried request with the same key returns the previously created run instead of creating
            a duplicate. A retry that arrives while the original request is still being processed
            is rejected with **409 Conflict**; retry after the first request completes.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestWorkflowRequest'
      responses:
        '201':
          description: Dry-run workflow run created successfully
          headers:
            X-Request-Id:
              schema:
                type: string
              description: Request correlation ID
            Cache-Control:
              schema:
                type: string
              example: private, no-store
            Location:
              schema:
                type: string
              example: /api/v3/workflows/runs/clworkflowrun000000000
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/WorkflowRunResource'
              examples:
                queuedDryRun:
                  summary: Newly created dry run (poll the run endpoint for results)
                  value:
                    data:
                      id: clworkflowrun0000000000000
                      workflowId: clworkflow0000000000000000
                      workspaceId: clworkspace000000000000000
                      workflowVersionId: null
                      status: queued
                      isDryRun: true
                      triggerType: response.completed
                      surveyId: clsurvey000000000000000000
                      responseId: null
                      error: null
                      attempt: 0
                      createdAt: '2026-06-11T09:30:00.000Z'
                      updatedAt: '2026-06-11T09:30:00.000Z'
                      startedAt: null
                      finishedAt: null
                      idempotencyKey: null
                      nextAttemptAt: null
                      lastErrorAt: null
                      triggerPayload:
                        type: response.completed
                        workspaceId: clworkspace000000000000000
                        surveyId: clsurvey000000000000000000
                        responseId: clresponse0000000000000000
                        endingCardId: clending000000000000000000
                        triggeredAt: '2026-06-11T09:30:00.000Z'
                      data:
                        steps: []
                      logs: []
        '400':
          $ref: '#/components/responses/V3BadRequest'
        '401':
          $ref: '#/components/responses/V3Unauthorized'
        '403':
          $ref: '#/components/responses/V3Forbidden'
        '409':
          $ref: '#/components/responses/V3Conflict'
        '422':
          $ref: '#/components/responses/V3UnprocessableContent'
        '429':
          $ref: '#/components/responses/V3TooManyRequests'
        '500':
          $ref: '#/components/responses/V3InternalServerError'
      security:
        - sessionAuth: []
        - apiKeyAuth: []
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: |
        NextAuth session JWT cookie. **Development:** often `next-auth.session-token`.
        **Production (HTTPS):** often `__Secure-next-auth.session-token`. Send the cookie your browser receives after sign-in.
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        Management API key; must include **workspaceId** as an allowed workspace with read, write, or manage permission.
  schemas:
    SurveyListItem:
      type: object
      description: |
        Shape returned by `GET /api/v3/surveys`. Serialized dates are ISO 8601 strings.
        The v3 overview contract intentionally omits internal fields such as `_count`.
        Legacy DB rows may include survey **type** values `website` or `web` (see Prisma); filter **type** only accepts `link` | `app`.
      properties:
        id:
          type: string
        name:
          type: string
        workspaceId:
          type: string
        type:
          type: string
          enum:
            - link
            - app
            - website
            - web
        status:
          type: string
          enum:
            - draft
            - inProgress
            - paused
            - completed
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        responseCount:
          type: integer
        creator:
          type:
            - object
            - 'null'
          properties:
            name:
              type: string
        singleUse:
          type:
            - object
            - 'null'
          properties:
            enabled:
              type: boolean
            isEncrypted:
              type: boolean
    InvalidParam:
      type: object
      description: |
        Field-level validation error. `name` and `reason` are always intended for humans.
        Optional machine-readable fields are included when the API can identify the semantic error,
        especially for survey locale, identifier, and reference validation used by MCP and agent clients.
      required:
        - name
        - reason
      properties:
        name:
          type: string
          description: Dot-path to the invalid request field.
        reason:
          type: string
          description: Human-readable repair guidance.
        code:
          type: string
          enum:
            - dangling_reference
            - duplicate_identifier
            - duplicate_locale
            - forbidden_identifier
            - immutable_identifier
            - invalid_graph
            - invalid_locale
            - invalid_reference
            - missing_required_field
            - missing_translation
            - unsupported_field
            - unsupported_locale
          description: |
            Machine-readable validation category, when available. `invalid_graph` covers workflow
            graph-structure violations such as a duplicated trigger edge, an unreachable node, or a
            cycle.
        identifier:
          type: string
          description: Identifier involved in the validation failure, when available. For language errors, this can be the normalized language code.
        referenceType:
          type: string
          enum:
            - block
            - element
            - ending
            - hiddenField
            - language
            - variable
            - variableName
            - recall
            - node
            - edge
            - survey
            - endingCard
          description: Identifier namespace involved in the validation failure. `node`, `edge`, `survey`, and `endingCard` are used by workflow validation.
        missingId:
          type: string
          description: Referenced id that does not exist in the submitted survey document.
        firstUsedAt:
          type: string
          description: Dot-path where a duplicate identifier was first used.
        conflictsWith:
          type: string
          description: Dot-path to the existing identifier that conflicts with this field.
      additionalProperties: false
    Problem:
      type: object
      description: RFC 9457 Problem Details for HTTP APIs (`application/problem+json`). Responses typically include a machine-readable `code` field alongside `title`, `status`, `detail`, and `requestId`.
      required:
        - title
        - status
        - detail
        - requestId
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
          enum:
            - ai_features_not_enabled
            - ai_generated_payload_invalid
            - ai_instance_not_configured
            - ai_smart_tools_disabled
            - bad_gateway
            - bad_request
            - conflict
            - forbidden
            - internal_server_error
            - invalid_workflow_state
            - not_authenticated
            - too_many_requests
            - unprocessable_content
            - workflow_not_executable
        requestId:
          type: string
        details:
          type: object
        invalid_params:
          type: array
          items:
            $ref: '#/components/schemas/InvalidParam'
    TranslatableTextMap:
      type: object
      description: Multilingual text map keyed by the emitted `languages[].code` values for this survey.
      propertyNames:
        type: string
        description: Survey language code/tag, for example `en-US`, `de-DE`, or `zh-Hans-CN`.
      additionalProperties:
        type: string
    TranslatableText:
      allOf:
        - $ref: '#/components/schemas/TranslatableTextMap'
      description: |
        Survey authoring text. `GET /api/v3/surveys/{surveyId}` always returns maps keyed by the emitted
        `languages[].code` values for this survey. Use `?lang=` to filter which language keys are included.
        The internal storage key `default` is never exposed by v3.
      examples:
        - en-US: What should we improve?
          de-DE: Was sollten wir verbessern?
    SurveyMetadata:
      type: object
      description: |
        Arbitrary JSON survey context for customer- or operation-specific metadata. v3 preserves
        arbitrary metadata values as-is. If present, `title` and `description` are treated as
        translatable text maps and returned with real locale-code keys.
      properties:
        title:
          $ref: '#/components/schemas/TranslatableText'
        description:
          $ref: '#/components/schemas/TranslatableText'
      additionalProperties: true
    LocaleCode:
      type: string
      pattern: ^[a-z]{2}(?:-[A-Z][a-z]{3})?-[A-Z]{2}$
      description: Canonical locale code accepted by v3 survey APIs, for example `en-US`, `de-DE`, or `zh-Hans-CN`.
      example: en-US
    CreateSurveyLanguage:
      type: object
      description: Language to connect to the created survey. `default`, if provided, must match `defaultLanguage`.
      required:
        - code
      properties:
        code:
          $ref: '#/components/schemas/LocaleCode'
        default:
          type: boolean
          description: Optional marker for readability; only the `defaultLanguage` entry may set this to true.
        enabled:
          type: boolean
          default: true
          description: Whether this language is enabled for respondent-facing delivery.
      additionalProperties: false
    SurveyWelcomeCard:
      type: object
      description: Optional card shown before the first survey block.
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        headline:
          $ref: '#/components/schemas/TranslatableText'
        subheader:
          $ref: '#/components/schemas/TranslatableText'
        buttonLabel:
          $ref: '#/components/schemas/TranslatableText'
        fileUrl:
          type: string
        videoUrl:
          type: string
        timeToFinish:
          type: boolean
        showResponseCount:
          type: boolean
      additionalProperties: false
    SurveyElementBase:
      type: object
      required:
        - id
        - type
        - headline
        - required
      properties:
        id:
          type: string
          pattern: ^[a-zA-Z0-9_-]+$
          description: Stable element id. Avoid spaces and reserved ids.
        type:
          type: string
          enum:
            - openText
            - multipleChoiceSingle
            - multipleChoiceMulti
            - nps
            - rating
            - csat
            - ces
            - consent
            - pictureSelection
            - cta
            - date
            - fileUpload
            - cal
            - matrix
            - address
            - ranking
            - contactInfo
        headline:
          $ref: '#/components/schemas/TranslatableText'
        subheader:
          $ref: '#/components/schemas/TranslatableText'
        required:
          type: boolean
        imageUrl:
          type: string
        videoUrl:
          type: string
        isDraft:
          type: boolean
          description: Draft marker used by the editor and future update rules.
    SurveyCharLimit:
      type: object
      description: Optional `openText` character limit configuration.
      properties:
        enabled:
          type: boolean
          default: false
        min:
          type: number
        max:
          type: number
      additionalProperties: false
    SurveyValidationRule:
      type: object
      required:
        - id
        - type
        - params
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - minLength
            - maxLength
            - pattern
            - email
            - url
            - phone
            - equals
            - doesNotEqual
            - contains
            - doesNotContain
            - minValue
            - maxValue
            - isGreaterThan
            - isLessThan
            - minSelections
            - maxSelections
            - minRanked
            - rankAll
            - minRowsAnswered
            - answerAllRows
            - isLaterThan
            - isEarlierThan
            - isBetween
            - isNotBetween
            - fileExtensionIs
            - fileExtensionIsNot
        params:
          type: object
          additionalProperties: true
        field:
          type: string
          enum:
            - addressLine1
            - addressLine2
            - city
            - state
            - zip
            - country
            - firstName
            - lastName
            - email
            - phone
            - company
      additionalProperties: false
    SurveyValidation:
      type: object
      description: Optional element-level validation rules.
      required:
        - rules
      properties:
        logic:
          type: string
          enum:
            - and
            - or
          default: and
        rules:
          type: array
          items:
            $ref: '#/components/schemas/SurveyValidationRule'
      additionalProperties: false
    SurveyOpenTextElement:
      allOf:
        - $ref: '#/components/schemas/SurveyElementBase'
        - type: object
          properties:
            type:
              type: string
              enum:
                - openText
            placeholder:
              $ref: '#/components/schemas/TranslatableText'
            longAnswer:
              type: boolean
            inputType:
              type: string
              enum:
                - text
                - email
                - url
                - number
                - phone
              default: text
            insightsEnabled:
              type: boolean
              default: false
            charLimit:
              $ref: '#/components/schemas/SurveyCharLimit'
            validation:
              $ref: '#/components/schemas/SurveyValidation'
      unevaluatedProperties: false
    SurveyConsentElement:
      allOf:
        - $ref: '#/components/schemas/SurveyElementBase'
        - type: object
          required:
            - label
          properties:
            type:
              type: string
              enum:
                - consent
            label:
              $ref: '#/components/schemas/TranslatableText'
            validation:
              $ref: '#/components/schemas/SurveyValidation'
      unevaluatedProperties: false
    SurveyChoice:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: string
          description: Stable choice id.
        label:
          $ref: '#/components/schemas/TranslatableText'
      additionalProperties: false
    SurveyShuffleOption:
      type: string
      enum:
        - none
        - all
        - exceptLast
        - reverseOrderOccasionally
        - reverseOrderExceptLast
    SurveyMultipleChoiceDisplayType:
      type: string
      enum:
        - list
        - dropdown
    SurveyMultipleChoiceSingleElement:
      allOf:
        - $ref: '#/components/schemas/SurveyElementBase'
        - type: object
          required:
            - choices
          properties:
            type:
              type: string
              enum:
                - multipleChoiceSingle
            choices:
              type: array
              minItems: 2
              items:
                $ref: '#/components/schemas/SurveyChoice'
            shuffleOption:
              $ref: '#/components/schemas/SurveyShuffleOption'
            otherOptionPlaceholder:
              $ref: '#/components/schemas/TranslatableText'
            displayType:
              $ref: '#/components/schemas/SurveyMultipleChoiceDisplayType'
      unevaluatedProperties: false
    SurveyMultipleChoiceMultiElement:
      allOf:
        - $ref: '#/components/schemas/SurveyElementBase'
        - type: object
          required:
            - choices
          properties:
            type:
              type: string
              enum:
                - multipleChoiceMulti
            choices:
              type: array
              minItems: 2
              items:
                $ref: '#/components/schemas/SurveyChoice'
            shuffleOption:
              $ref: '#/components/schemas/SurveyShuffleOption'
            otherOptionPlaceholder:
              $ref: '#/components/schemas/TranslatableText'
            validation:
              $ref: '#/components/schemas/SurveyValidation'
            displayType:
              $ref: '#/components/schemas/SurveyMultipleChoiceDisplayType'
      unevaluatedProperties: false
    SurveyNpsElement:
      allOf:
        - $ref: '#/components/schemas/SurveyElementBase'
        - type: object
          properties:
            type:
              type: string
              enum:
                - nps
            lowerLabel:
              $ref: '#/components/schemas/TranslatableText'
            upperLabel:
              $ref: '#/components/schemas/TranslatableText'
            isColorCodingEnabled:
              type: boolean
              default: false
      unevaluatedProperties: false
    SurveyCtaElement:
      allOf:
        - $ref: '#/components/schemas/SurveyElementBase'
        - type: object
          description: If `buttonExternal` is true, `buttonUrl` and `ctaButtonLabel` are required.
          properties:
            type:
              type: string
              enum:
                - cta
            buttonExternal:
              type: boolean
              default: false
            buttonUrl:
              type: string
            ctaButtonLabel:
              $ref: '#/components/schemas/TranslatableText'
        - if:
            required:
              - buttonExternal
            properties:
              buttonExternal:
                const: true
          then:
            required:
              - buttonUrl
              - ctaButtonLabel
      unevaluatedProperties: false
    SurveyRatingElement:
      allOf:
        - $ref: '#/components/schemas/SurveyElementBase'
        - type: object
          required:
            - scale
            - range
          properties:
            type:
              type: string
              enum:
                - rating
            scale:
              type: string
              enum:
                - number
                - smiley
                - star
            range:
              type: integer
              enum:
                - 3
                - 4
                - 5
                - 6
                - 7
                - 10
            lowerLabel:
              $ref: '#/components/schemas/TranslatableText'
            upperLabel:
              $ref: '#/components/schemas/TranslatableText'
            isColorCodingEnabled:
              type: boolean
              default: false
      unevaluatedProperties: false
    SurveyPictureChoice:
      type: object
      required:
        - id
        - imageUrl
      properties:
        id:
          type: string
          description: Stable picture choice id.
        imageUrl:

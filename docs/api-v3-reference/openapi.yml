          schema:
            type: string
            format: cuid2
          description: Optional workflow scoping. Returns only runs of this workflow.
        - in: query
          name: responseId
          schema:
            type: string
            format: cuid2
          description: Optional response scoping. Returns only runs triggered by this survey response.
        - in: query
          name: filter[status][in]
          schema:
            type: array

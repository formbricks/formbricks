            lowerLabel:
              $ref: '#/components/schemas/TranslatableText'
            upperLabel:
              $ref: '#/components/schemas/TranslatableText'
            isColorCodingEnabled:
              type: boolean
              default: false
      unevaluatedProperties: false
    SurveyElement:
      oneOf:
        - $ref: '#/components/schemas/SurveyOpenTextElement'
        - $ref: '#/components/schemas/SurveyConsentElement'
        - $ref: '#/components/schemas/SurveyMultipleChoiceSingleElement'
        - $ref: '#/components/schemas/SurveyMultipleChoiceMultiElement'
        - $ref: '#/components/schemas/SurveyNpsElement'
        - $ref: '#/components/schemas/SurveyCtaElement'
        - $ref: '#/components/schemas/SurveyRatingElement'
        - $ref: '#/components/schemas/SurveyPictureSelectionElement'
        - $ref: '#/components/schemas/SurveyDateElement'
        - $ref: '#/components/schemas/SurveyFileUploadElement'
        - $ref: '#/components/schemas/SurveyCalElement'
        - $ref: '#/components/schemas/SurveyMatrixElement'
        - $ref: '#/components/schemas/SurveyAddressElement'
        - $ref: '#/components/schemas/SurveyRankingElement'
        - $ref: '#/components/schemas/SurveyContactInfoElement'
        - $ref: '#/components/schemas/SurveyCsatElement'
        - $ref: '#/components/schemas/SurveyCesElement'
      discriminator:
        propertyName: type
        mapping:
          openText: '#/components/schemas/SurveyOpenTextElement'
          consent: '#/components/schemas/SurveyConsentElement'
          multipleChoiceSingle: '#/components/schemas/SurveyMultipleChoiceSingleElement'
          multipleChoiceMulti: '#/components/schemas/SurveyMultipleChoiceMultiElement'
          nps: '#/components/schemas/SurveyNpsElement'
          cta: '#/components/schemas/SurveyCtaElement'
          rating: '#/components/schemas/SurveyRatingElement'
          pictureSelection: '#/components/schemas/SurveyPictureSelectionElement'
          date: '#/components/schemas/SurveyDateElement'
          fileUpload: '#/components/schemas/SurveyFileUploadElement'
          cal: '#/components/schemas/SurveyCalElement'
          matrix: '#/components/schemas/SurveyMatrixElement'
          address: '#/components/schemas/SurveyAddressElement'
          ranking: '#/components/schemas/SurveyRankingElement'
          contactInfo: '#/components/schemas/SurveyContactInfoElement'
          csat: '#/components/schemas/SurveyCsatElement'
          ces: '#/components/schemas/SurveyCesElement'
      description: |
        Survey element/question inside a block. Element ids are stable public identifiers used by
        logic, recall strings, response data, quotas, integrations, and analysis. `type` selects the
        allowed shape; unsupported fields are rejected instead of ignored.
    SurveyDynamicReference:
      type: object
      description: Dynamic reference to another value in the survey document.
      required:
        - type
        - value
      properties:
        type:
          type: string
          enum:
            - element
            - variable
            - hiddenField
        value:
          type: string
          description: Element id, variable id, or hidden field id depending on `type`.
        meta:
          type: object
          additionalProperties:
            type: string
      additionalProperties: false
    SurveyLogicOperand:
      oneOf:
        - type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              enum:
                - static
            value:
              oneOf:
                - type: string
                - type: number
                - type: array
                  items:
                    type: string
          additionalProperties: false
        - $ref: '#/components/schemas/SurveyDynamicReference'
    SurveyCondition:
      type: object
      description: |
        Single condition. Operators such as `isSubmitted`, `isSkipped`, `isClicked`, `isAccepted`,
        `isBooked`, `isSet`, and `isEmpty` do not use `rightOperand`; comparison operators do.
      required:
        - id
        - leftOperand
        - operator
      properties:
        id:
          type: string
          format: cuid2
        leftOperand:
          $ref: '#/components/schemas/SurveyDynamicReference'
        operator:
          type: string
          enum:
            - equals
            - doesNotEqual
            - contains
            - doesNotContain
            - startsWith
            - doesNotStartWith
            - endsWith
            - doesNotEndWith
            - isSubmitted
            - isSkipped
            - isGreaterThan
            - isLessThan
            - isGreaterThanOrEqual
            - isLessThanOrEqual
            - equalsOneOf
            - includesAllOf
            - includesOneOf
            - doesNotIncludeOneOf
            - doesNotIncludeAllOf
            - isClicked
            - isNotClicked
            - isAccepted
            - isBefore
            - isAfter
            - isBooked
            - isPartiallySubmitted
            - isCompletelySubmitted
            - isSet
            - isNotSet
            - isEmpty
            - isNotEmpty
            - isAnyOf
        rightOperand:
          $ref: '#/components/schemas/SurveyLogicOperand'
      additionalProperties: false
    SurveyConditionGroup:
      type: object
      required:
        - id
        - connector
        - conditions
      properties:
        id:
          type: string
          format: cuid2
        connector:
          type: string
          enum:
            - and
            - or
        conditions:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/SurveyCondition'
              - $ref: '#/components/schemas/SurveyConditionGroup'
      additionalProperties: false
    SurveyCalculateAction:
      type: object
      description: Updates a survey variable when the logic rule matches.
      required:
        - id
        - objective
        - variableId
        - operator
        - value
      properties:
        id:
          type: string
          format: cuid2
        objective:
          type: string
          enum:
            - calculate
        variableId:
          type: string
          format: cuid2
          description: Variable id for `calculate`.
        operator:
          type: string
          enum:
            - assign
            - concat
            - add
            - subtract
            - multiply
            - divide
        value:
          $ref: '#/components/schemas/SurveyLogicOperand'
      additionalProperties: false
    SurveyRequireAnswerAction:
      type: object
      description: Requires an element/question to be answered before continuing.
      required:
        - id
        - objective
        - target
      properties:
        id:
          type: string
          format: cuid2
        objective:
          type: string
          enum:
            - requireAnswer
        target:
          type: string
          description: Target element id.
      additionalProperties: false
    SurveyJumpToBlockAction:
      type: object
      description: Jumps to another block or ending when the logic rule matches.
      required:
        - id
        - objective
        - target
      properties:
        id:
          type: string
          format: cuid2
        objective:
          type: string
          enum:
            - jumpToBlock
        target:
          type: string
          format: cuid2
          description: Target block id or ending id.
      additionalProperties: false
    SurveyLogicAction:
      oneOf:
        - $ref: '#/components/schemas/SurveyCalculateAction'
        - $ref: '#/components/schemas/SurveyRequireAnswerAction'
        - $ref: '#/components/schemas/SurveyJumpToBlockAction'
      description: |
        Logic action. Keep referenced ids stable: `calculate.variableId` points to a variable id,
        `requireAnswer.target` points to an element id, and `jumpToBlock.target` points to a block id
        or ending id.
    SurveyBlockLogic:
      type: object
      description: Conditional logic rule evaluated at block level.
      required:
        - id
        - conditions
        - actions
      properties:
        id:
          type: string
          format: cuid2
        conditions:
          $ref: '#/components/schemas/SurveyConditionGroup'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/SurveyLogicAction'
      additionalProperties: false
    CreateSurveyBlock:
      type: object
      description: |
        Block accepted by `POST /api/v3/surveys`. `id` may be omitted and will be generated by the
        server. Provide an explicit cuid2 id when logic in the same request needs to jump to this block.
        For normal sequential flow, omit `logic` and `logicFallback`. `logicFallback` is only valid
        when this same block has at least one `logic` rule.
      required:
        - name
        - elements
      properties:
        id:
          type: string
          format: cuid2
          description: Optional stable block id. Generated when omitted.
        name:
          type: string
          minLength: 1
        elements:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SurveyElement'
        logic:
          type: array
          items:
            $ref: '#/components/schemas/SurveyBlockLogic'
        logicFallback:
          type: string
          format: cuid2
          description: |
            Block or ending id used when no logic condition matches. Only valid when this same block
            has at least one `logic` rule; omit it for normal sequential flow.
        buttonLabel:
          $ref: '#/components/schemas/TranslatableText'
        backButtonLabel:
          $ref: '#/components/schemas/TranslatableText'
      additionalProperties: false
    SurveyEndScreenEnding:
      type: object
      description: Visual end screen displayed after survey completion.
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: cuid2
          description: Stable ending id. `jumpToBlock.target` may point to this id.
        type:
          type: string
          enum:
            - endScreen
        headline:
          $ref: '#/components/schemas/TranslatableText'
        subheader:
          $ref: '#/components/schemas/TranslatableText'
        buttonLabel:
          $ref: '#/components/schemas/TranslatableText'
        buttonLink:
          type: string
        imageUrl:
          type: string
        videoUrl:
          type: string
      additionalProperties: false
    SurveyRedirectEnding:
      type: object
      description: |
        Redirects the respondent to a URL after survey completion. External redirects require the
        organization's external URL permission; otherwise write endpoints return `403 Forbidden`.
      required:
        - id
        - type
        - url
      properties:
        id:
          type: string
          format: cuid2
          description: Stable ending id. `jumpToBlock.target` may point to this id.
        type:
          type: string
          enum:
            - redirectToUrl
        url:
          type: string
          format: uri
          description: External redirect URL. Requires the organization's external URL permission.
        label:
          type: string
          description: Optional internal label for redirect endings.
      additionalProperties: false
    SurveyEnding:
      oneOf:
        - $ref: '#/components/schemas/SurveyEndScreenEnding'
        - $ref: '#/components/schemas/SurveyRedirectEnding'
      discriminator:
        propertyName: type
        mapping:
          endScreen: '#/components/schemas/SurveyEndScreenEnding'
          redirectToUrl: '#/components/schemas/SurveyRedirectEnding'
      description: |
        Ending reached after the last block or a jump action. `type` selects the allowed shape;
        unsupported fields are rejected instead of ignored.
    SurveyHiddenFields:
      type: object
      description: |
        Hidden fields, sometimes called embedded data in other survey products. Field ids are stable
        public identifiers and may be referenced by logic, recall, quotas, integrations, and response data.
        Use only letters, numbers, underscores, and hyphens; avoid spaces and reserved ids.
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        fieldIds:
          type: array
          items:
            type: string
            pattern: ^[a-zA-Z0-9_-]+$
          uniqueItems: true
      additionalProperties: false
    CreateSurveyNumberVariable:
      type: object
      required:
        - name
        - type
        - value
      properties:
        id:
          type: string
          format: cuid2
          description: Optional stable variable id. Generated when omitted.
        name:
          type: string
          pattern: ^[a-z0-9_]+$
          description: Unique variable name. Lowercase letters, numbers, and underscores only.
        type:
          type: string
          enum:
            - number
        value:
          type: number
          description: Default numeric value.
      additionalProperties: false
    CreateSurveyTextVariable:
      type: object
      required:
        - name
        - type
        - value
      properties:
        id:
          type: string
          format: cuid2
          description: Optional stable variable id. Generated when omitted.
        name:
          type: string
          pattern: ^[a-z0-9_]+$
          description: Unique variable name. Lowercase letters, numbers, and underscores only.
        type:
          type: string
          enum:
            - text
        value:
          type: string
          description: Default text value.
      additionalProperties: false
    CreateSurveyVariable:
      oneOf:
        - $ref: '#/components/schemas/CreateSurveyNumberVariable'
        - $ref: '#/components/schemas/CreateSurveyTextVariable'
      description: |
        Survey variable accepted by `POST /api/v3/surveys`. `id` may be omitted and will be
        generated by the server. Provide an explicit cuid2 id when logic in the same request needs
        to reference this variable.
    SurveyTrigger:
      type: object
      description: |
        Reference to an existing workspace action class that triggers this app survey. Discover available action-class ids with `GET /api/v3/action-classes`.
      required:
        - actionClassId
      properties:
        actionClassId:
          type: string
          format: cuid2
          description: Id of an action class in the same workspace.
      additionalProperties: false
    SurveyDistribution:
      type: object
      description: |
        App-survey runtime/display settings. Only valid for `type: app`; rejected for link surveys.
        **Replacement semantics (destructive):** when `distribution` is provided on PATCH it fully replaces the stored object — any sub-field you omit is reset to its default, NOT preserved. In particular, omitting `triggers` removes ALL existing triggers, and omitting `displayOption` resets it to `displayOnce`. To change one setting, send the complete desired distribution. To leave distribution untouched, omit the whole `distribution` key.
      properties:
        displayOption:
          type: string
          enum:
            - displayOnce
            - displayMultiple
            - respondMultiple
            - displaySome
          default: displayOnce
          description: |
            How often the survey may be shown to a contact. `displaySome` shows it to `displayPercentage` of contacts.
        displayPercentage:
          type:
            - number
            - 'null'
          minimum: 0.01
          maximum: 100
          default: null
          description: |
            Percentage of contacts to show the survey to. Required when `displayOption` is `displaySome`; must be null/omitted otherwise.
        displayLimit:
          type:
            - integer
            - 'null'
          minimum: 0
          default: null
          description: Maximum number of times the survey is shown to a single contact.
        recontactDays:
          type:
            - integer
            - 'null'
          minimum: 0
          default: null
          description: Days to wait before showing this survey again to the same contact. Null uses the workspace default.
        autoClose:
          type:
            - integer
            - 'null'
          minimum: 0
          default: null
          description: Seconds of inactivity after which the survey widget auto-closes. Null disables auto-close.
        autoComplete:
          type:
            - integer
            - 'null'
          minimum: 1
          default: null
          description: Automatically stop collecting responses after this many completed responses. Null disables it.
        delay:
          type: integer
          minimum: 0
          default: 0
          description: Seconds to wait after a trigger fires before showing the survey.
        triggers:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/SurveyTrigger'
          description: |
            Action classes that trigger the survey. Every id must reference an existing workspace action class. On PATCH this list fully replaces the survey's triggers — omitting it (or sending `[]`) removes all existing triggers.
      additionalProperties: false
      example:
        displayOption: displaySome
        displayPercentage: 50
        displayLimit: null
        recontactDays: 7
        autoClose: null
        autoComplete: null
        delay: 0
        triggers:
          - actionClassId: clyy1234567890123456789012
    SegmentFilterValue:
      description: |
        Comparison value for a segment filter condition. A string or number for most operators; a relative-date object (`{ amount, unit }`) for `isOlderThan` / `isNewerThan`; a two-element `[from, to]` string array for `isBetween`. Ignored for `isSet` / `isNotSet` but still required.
      oneOf:
        - type: string
        - type: number
        - type: object
          required:
            - amount
            - unit
          properties:
            amount:
              type: number
            unit:
              type: string
              enum:
                - days
                - weeks
                - months
                - years
          additionalProperties: false
        - type: array
          items:
            type: string
          minItems: 2
          maxItems: 2
    SegmentFilter:
      description: |
        A single targeting condition. `root.type` selects the subject and determines the valid `qualifier.operator` set: `attribute` (a workspace contact-attribute key), `person` (a built-in person identifier such as `userId`/`email`), `segment` (membership in another segment), or `device`. Each variant is one member of this union; the matching member is chosen by `root.type`.
      oneOf:
        - title: AttributeFilter
          description: Matches on a workspace contact-attribute value.
          type: object
          required:
            - id
            - root
            - qualifier
            - value
          properties:
            id:
              type: string
              format: cuid2
            root:
              type: object
              required:
                - type
                - contactAttributeKey
              properties:
                type:
                  type: string
                  enum:
                    - attribute
                contactAttributeKey:
                  type: string
                  description: A contact-attribute key defined in the workspace (e.g. `plan`, `role`).
              additionalProperties: false
            qualifier:
              type: object
              required:
                - operator
              properties:
                operator:
                  type: string
                  enum:
                    - lessThan
                    - lessEqual
                    - greaterThan
                    - greaterEqual
                    - equals
                    - notEquals
                    - isSet
                    - isNotSet
                    - contains
                    - doesNotContain
                    - startsWith
                    - endsWith
                    - isOlderThan
                    - isNewerThan
                    - isBefore
                    - isAfter
                    - isBetween
                    - isSameDay
              additionalProperties: false
            value:
              $ref: '#/components/schemas/SegmentFilterValue'
          additionalProperties: false
        - title: PersonFilter
          description: Matches on a built-in person identifier.
          type: object
          required:
            - id
            - root
            - qualifier
            - value
          properties:
            id:
              type: string
              format: cuid2
            root:
              type: object
              required:
                - type
                - personIdentifier
              properties:
                type:
                  type: string
                  enum:
                    - person
                personIdentifier:
                  type: string
                  description: A built-in person identifier (e.g. `userId`).
              additionalProperties: false
            qualifier:
              type: object
              required:
                - operator
              properties:
                operator:
                  type: string
                  enum:
                    - equals
                    - notEquals
                    - isSet
                    - isNotSet
                    - contains
                    - doesNotContain
                    - startsWith
                    - endsWith
              additionalProperties: false
            value:
              $ref: '#/components/schemas/SegmentFilterValue'
          additionalProperties: false
        - title: SegmentFilter
          description: Matches on membership in another segment.
          type: object
          required:
            - id
            - root
            - qualifier
            - value
          properties:
            id:
              type: string
              format: cuid2
            root:
              type: object
              required:
                - type
                - segmentId
              properties:
                type:
                  type: string
                  enum:
                    - segment
                segmentId:
                  type: string
                  description: Id of the segment to test membership against.
              additionalProperties: false
            qualifier:
              type: object
              required:
                - operator
              properties:
                operator:
                  type: string
                  enum:
                    - userIsIn
                    - userIsNotIn
              additionalProperties: false
            value:
              $ref: '#/components/schemas/SegmentFilterValue'
          additionalProperties: false
        - title: DeviceFilter
          description: Matches on the contact's device type.
          type: object
          required:
            - id
            - root
            - qualifier
            - value
          properties:
            id:
              type: string
              format: cuid2
            root:
              type: object
              required:
                - type
                - deviceType
              properties:
                type:
                  type: string
                  enum:
                    - device
                deviceType:
                  type: string
                  description: Device type (e.g. `desktop`, `phone`).
              additionalProperties: false
            qualifier:
              type: object
              required:
                - operator
              properties:
                operator:
                  type: string
                  enum:
                    - equals
                    - notEquals
              additionalProperties: false
            value:
              $ref: '#/components/schemas/SegmentFilterValue'
          additionalProperties: false
    SegmentFilters:
      type: array
      description: |
        Contact targeting filter tree. An empty array targets everyone. Each node joins the previous one via its `connector` (`and`/`or`; the first node's connector is null). A node's `resource` is either a single filter condition or a nested filter group (enabling parenthesized `and`/`or` logic).
      items:
        type: object
        required:
          - id
          - connector
          - resource
        properties:
          id:
            type: string
            format: cuid2
          connector:
            type:
              - string
              - 'null'
            enum:
              - and
              - or
              - null
            description: Logical connector joining this node to the previous one. Null for the first node.
          resource:
            oneOf:
              - $ref: '#/components/schemas/SegmentFilter'
              - $ref: '#/components/schemas/SegmentFilters'
            description: A single filter condition, or a nested filter group for grouped logic.
        additionalProperties: false
    SurveyTargeting:
      type: object
      description: |
        App-survey contact targeting. Only valid for `type: app`. `filters: []` targets everyone. Setting or changing non-empty filters requires the Contacts entitlement; otherwise create/patch returns 403.

        `attribute` filters reference workspace contact-attribute keys (discover them via `GET /api/v3/contact-attribute-keys`) and `segment` filters reference other segment ids — both are workspace-scoped resources you must obtain before constructing filters (an invalid key/id targets no one rather than erroring). See `SegmentFilter` for the per-`root.type` operator sets.
      required:
        - filters
      properties:
        filters:
          $ref: '#/components/schemas/SegmentFilters'
      additionalProperties: false
    CreateSurveyRequest:
      type: object
      description: |
        Strict v3 survey creation document. This endpoint accepts survey structure only: name,
        metadata, languages, welcome card, blocks/elements/logic, endings, hidden fields, and variables.
        App surveys (`type: app`) additionally accept the `distribution` (display options + triggers) and `targeting` (contact segment filters) objects; these are rejected for `link` surveys.
        It rejects legacy `questions` and out-of-scope settings such as styling, follow-ups, recaptcha, single-use/email verification, slug, custom scripts, analytics fields, timestamps, and `createdBy`.

        Translatable fields use real locale-code maps. The map must include the canonical
        `defaultLanguage` key, such as `en-US`, so the server can persist the internal default
        translation. Locale keys must be canonical BCP 47 codes such as `de-DE`, `pt-PT`, or
        `zh-Hans-CN`. Non-default locale keys must be declared in `languages`; undeclared locale
        keys in metadata, welcome cards, blocks, or endings are rejected with `unsupported_locale`.

        `blocks[].id` and `variables[].id` may be omitted on create and will be generated by the
        server. Provide explicit cuid2 ids when other fields in the same request reference them.
        For normal sequential flow, omit `logicFallback`. It is only valid together with a non-empty
        `logic` array on the same block.
      required:
        - workspaceId
        - name
        - blocks
      properties:
        workspaceId:
          type: string
          format: cuid2
          description: Workspace where the survey will be created. Requires read/write access.
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - link
            - app
          default: link
          description: |
            Survey type. `link` surveys are distributed by URL; `app` surveys are shown in-app and configure their runtime behavior via the `distribution` and `targeting` objects. `type` is immutable after creation (it cannot be changed via PATCH).
        status:
          type: string
          enum:
            - draft
            - inProgress
            - paused
            - completed
          default: draft
        metadata:
          allOf:
            - $ref: '#/components/schemas/SurveyMetadata'
          default: {}
        defaultLanguage:
          allOf:
            - $ref: '#/components/schemas/LocaleCode'
          default: en-US
          description: Default authoring locale. Translatable maps must include this locale key.
        languages:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/CreateSurveyLanguage'
          description: |
            Optional survey language configuration. Every non-default locale used by translatable maps
            must be declared here; omitted languages are not inferred from map keys.
        welcomeCard:
          allOf:
            - $ref: '#/components/schemas/SurveyWelcomeCard'
          default:
            enabled: false
        blocks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateSurveyBlock'
        endings:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/SurveyEnding'
        hiddenFields:
          allOf:
            - $ref: '#/components/schemas/SurveyHiddenFields'
          default:
            enabled: false
        variables:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/CreateSurveyVariable'
        distribution:
          allOf:
            - $ref: '#/components/schemas/SurveyDistribution'
          description: App-survey runtime/display settings. Only valid when `type` is `app`.
        targeting:
          allOf:
            - $ref: '#/components/schemas/SurveyTargeting'
          description: App-survey contact targeting. Only valid when `type` is `app`.
      additionalProperties: false
    SurveyLanguage:
      type: object
      description: |
        Language configured for this survey. GET responses expose the server-emitted code/tag used as the
        translatable map key. Existing surveys can use region-qualified, language-only, or script-only codes.
        Disabled languages can still be read by the management API so unfinished translations can be completed.
      required:
        - code
        - default
        - enabled
      properties:
        code:
          type: string
          description: Server-emitted survey language code/tag used as the translatable map key.
          example: en-US
        alias:
          type:
            - string
            - 'null'
          description: Optional configured alias accepted by `?lang` for compatibility and agent discovery.
          example: english
        default:
          type: boolean
          description: Whether this is the default authoring language.
        enabled:
          type: boolean
          description: Whether this language is enabled for respondent-facing delivery.
    SurveyBlock:
      type: object
      description: |
        Block-based survey section. Block ids are stable public identifiers. Logic and fallbacks can
        jump to block ids or ending ids, so clients and agents should preserve ids unless intentionally
        creating/deleting a block.
      required:
        - id
        - name
        - elements
      properties:
        id:
          type: string
          format: cuid2
          description: Stable block id.
        name:
          type: string
          minLength: 1
        elements:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SurveyElement'
        logic:
          type: array
          items:
            $ref: '#/components/schemas/SurveyBlockLogic'
        logicFallback:
          type: string
          format: cuid2
          description: |
            Block or ending id used when no logic condition matches. Only valid when this same block
            has at least one `logic` rule; omit it for normal sequential flow.
        buttonLabel:
          $ref: '#/components/schemas/TranslatableText'
        backButtonLabel:
          $ref: '#/components/schemas/TranslatableText'
      additionalProperties: false
    SurveyNumberVariable:
      type: object
      description: |
        Number variable. Used by `calculate` logic actions with numeric operators such as `add`,
        `subtract`, `multiply`, `divide`, or `assign`.
      required:
        - id
        - name
        - type
        - value
      properties:
        id:
          type: string
          format: cuid2
          description: Stable variable id referenced from logic.
        name:
          type: string
          pattern: ^[a-z0-9_]+$
          description: Unique variable name. Lowercase letters, numbers, and underscores only.
        type:
          type: string
          enum:
            - number
        value:
          type: number
          description: Default numeric value.
      additionalProperties: false
    SurveyTextVariable:
      type: object
      description: |
        Text variable. Used by `calculate` logic actions with text operators such as `assign` or `concat`.
      required:
        - id
        - name
        - type
        - value
      properties:
        id:
          type: string
          format: cuid2
          description: Stable variable id referenced from logic.
        name:
          type: string
          pattern: ^[a-z0-9_]+$
          description: Unique variable name. Lowercase letters, numbers, and underscores only.
        type:
          type: string
          enum:
            - text
        value:
          type: string
          description: Default text value.
      additionalProperties: false
    SurveyVariable:
      oneOf:
        - $ref: '#/components/schemas/SurveyNumberVariable'
        - $ref: '#/components/schemas/SurveyTextVariable'
      description: |
        Survey variable. Variable ids are stable references used by logic and calculation actions.
        Variable names are human-readable labels and must be unique within the survey.
    SurveyResource:
      type: object
      required:
        - id
        - workspaceId
        - createdAt
        - updatedAt
        - name
        - type
        - status
        - metadata
        - defaultLanguage
        - languages
        - welcomeCard
        - blocks
        - endings
        - hiddenFields
        - variables
      properties:
        id:
          type: string
        workspaceId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        name:
          type: string
        type:
          type: string
          enum:
            - link
            - app
            - website
            - web
        status:
          type: string
          enum:
            - draft
            - inProgress
            - paused
            - completed
        metadata:
          anyOf:
            - $ref: '#/components/schemas/SurveyMetadata'
            - type: 'null'
        defaultLanguage:
          type: string
          description: Emitted language code/tag for the survey default language. The internal `default` translation key is never exposed.
        languages:
          type: array
          items:
            $ref: '#/components/schemas/SurveyLanguage'
        welcomeCard:
          $ref: '#/components/schemas/SurveyWelcomeCard'
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/SurveyBlock'
        endings:
          type: array
          items:
            $ref: '#/components/schemas/SurveyEnding'
        hiddenFields:
          $ref: '#/components/schemas/SurveyHiddenFields'
        variables:
          type: array
          items:
            $ref: '#/components/schemas/SurveyVariable'
        distribution:
          allOf:
            - $ref: '#/components/schemas/SurveyDistribution'
          description: App-survey runtime/display settings. Present only for app surveys; omitted for link surveys.
        targeting:
          allOf:
            - $ref: '#/components/schemas/SurveyTargeting'
          description: App-survey contact targeting. Present only for app surveys; omitted for link surveys.
    AISurveyGenerationLocaleCode:
      type: string
      enum:
        - de-DE
        - en-US
        - es-ES
        - fr-FR
        - hu-HU
        - ja-JP
        - nl-NL
        - pt-BR
        - pt-PT
        - ro-RO
        - ru-RU
        - sv-SE
        - tr-TR
        - zh-Hans-CN
        - zh-Hant-TW
      description: Supported app locale code that AI survey creation can return.
      example: en-US
    GenerateSurveyRequest:
      type: object
      description: |
        AI survey creation request. `prompt` is used only to create a draft payload; it is not
        persisted by this endpoint. The generated payload is validated and returned to the caller for
        a separate create request.
      required:
        - workspaceId
        - prompt
      properties:
        workspaceId:
          type: string
          format: cuid2
          description: Workspace where the AI-created survey draft would be created. Requires read/write access.
        prompt:
          type: string
          minLength: 4
          maxLength: 1200
          description: |
            Natural-language survey goal and audience. Prompts with fewer than 24 characters or fewer
            than four whitespace-separated words return prompt feedback before any AI provider call.
        type:
          type: string
          enum:
            - link
            - app
          default: link
          description: Survey type to generate. The AI generates the survey content (blocks/questions) for both types; for `app` it additionally seeds a default `distribution` (display once, no triggers, no targeting) that you finish configuring before publishing.
        language:
          $ref: '#/components/schemas/AISurveyGenerationLocaleCode'
          description: |
            Preferred survey language. Session clients should send the logged-in user's language.
            The generator uses it when the prompt language is ambiguous or cannot be confidently
            matched to a supported app locale.
      additionalProperties: false
    GeneratedSurveyValidationLanguage:
      type: object
      required:
        - code
        - default
        - enabled
      properties:
        code:
          $ref: '#/components/schemas/AISurveyGenerationLocaleCode'
        default:
          type: boolean
        enabled:
          type: boolean
      additionalProperties: false
    GeneratedSurveyValidationResult:
      type: object
      required:
        - valid
        - invalid_params
        - languages
      properties:
        valid:
          type: boolean
          description: Whether the generated create payload passed the same v3 create preparation pipeline.
        invalid_params:
          type: array
          description: Repairable validation errors. Successful generate responses return an empty array.
          items:
            $ref: '#/components/schemas/InvalidParam'
        languages:
          type: array
          description: Languages that the generated create payload would connect or create.
          items:
            $ref: '#/components/schemas/GeneratedSurveyValidationLanguage'
      additionalProperties: false
    GenerateSurveyResult:
      type: object
      required:
        - language
        - payload
        - validation
      properties:
        language:
          $ref: '#/components/schemas/AISurveyGenerationLocaleCode'
          description: Supported app locale used for the AI-created survey content and create payload language maps.
        payload:
          allOf:
            - $ref: '#/components/schemas/CreateSurveyRequest'
          description: |
            Strict create payload ready for `POST /api/v3/surveys`. It always has `status: draft`.
        validation:
          $ref: '#/components/schemas/GeneratedSurveyValidationResult'
      additionalProperties: false
    ValidateSurveyCreateRequest:
      type: object
      required:
        - operation
        - data
      properties:
        operation:
          type: string
          enum:
            - create
        data:
          description: Intended create payload. Invalid documents are allowed so the endpoint can return repairable validation errors.
          anyOf:
            - $ref: '#/components/schemas/CreateSurveyRequest'
            - type: object
              additionalProperties: true
      additionalProperties: false
    PatchSurveyRequest:
      type: object
      minProperties: 1
      description: |
        Patch payload shape. Top-level fields are partial; any provided nested object or array
        fully replaces that subtree. Omitted top-level fields are preserved. Immutable/system fields
        such as `id`, `workspaceId`, `type`, `defaultLanguage`, timestamps, `questions`, analytics, styling,
        and scripts are rejected. App surveys (stored `type: app`) additionally accept `distribution` and `targeting`; both are rejected for link surveys, and changing `targeting` filters requires the Contacts entitlement.

        `metadata`, `languages`, `welcomeCard`, `blocks`, `endings`, `hiddenFields`, and `variables`
        replace their full top-level value when provided. Missing ids in replaced arrays are deletions.
        Non-default locale keys in translatable maps must be declared in `languages`; undeclared locale
        keys are rejected with `unsupported_locale`. To remove a language, remove it from both
        `languages` and every translatable map that contains that locale key.
        Use `/api/v3/surveys/validate` with `operation: patch` before committing automated or agentic
        changes.
      properties:
        name:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - draft
            - inProgress
            - paused
            - completed
        metadata:
          allOf:
            - $ref: '#/components/schemas/SurveyMetadata'
        languages:
          type: array
          items:
            $ref: '#/components/schemas/CreateSurveyLanguage'
          description: |
            Replaces the survey language configuration. The default language cannot be changed through
            PATCH; any `default: true` entry must match the existing default language. Languages referenced
            by `metadata`, `welcomeCard`, `blocks`, or `endings` translatable maps must be explicitly
            declared here, so remove the locale key from those maps as well when intentionally removing
            a language.
        welcomeCard:
          $ref: '#/components/schemas/SurveyWelcomeCard'
        blocks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SurveyBlock'
        endings:
          type: array
          items:
            $ref: '#/components/schemas/SurveyEnding'
        hiddenFields:
          $ref: '#/components/schemas/SurveyHiddenFields'
        variables:
          type: array
          items:
            $ref: '#/components/schemas/SurveyVariable'
        distribution:
          allOf:
            - $ref: '#/components/schemas/SurveyDistribution'
          description: |
            App-survey runtime/display settings. Only valid for stored `type: app`. Replaces the full distribution; omitted scalars reset to their defaults.
        targeting:
          allOf:
            - $ref: '#/components/schemas/SurveyTargeting'
          description: App-survey contact targeting. Only valid for stored app surveys.
      additionalProperties: false
    ValidateSurveyPatchRequest:
      type: object
      required:
        - operation
        - surveyId
        - data
      properties:
        operation:
          type: string
          enum:
            - patch
        surveyId:
          type: string
          format: cuid2
        data:
          description: Intended patch payload. Invalid documents are allowed so the endpoint can return repairable validation errors.
          anyOf:
            - $ref: '#/components/schemas/PatchSurveyRequest'
            - type: object
              additionalProperties: true
      additionalProperties: false
    ValidateSurveyRequest:
      oneOf:
        - $ref: '#/components/schemas/ValidateSurveyCreateRequest'
        - $ref: '#/components/schemas/ValidateSurveyPatchRequest'
      discriminator:
        propertyName: operation
        mapping:
          create: '#/components/schemas/ValidateSurveyCreateRequest'
          patch: '#/components/schemas/ValidateSurveyPatchRequest'
    SurveyValidationLanguage:
      type: object
      required:
        - code
        - default
        - enabled
        - writeBehavior
      properties:
        code:
          $ref: '#/components/schemas/LocaleCode'
        default:
          type: boolean
        enabled:
          type: boolean
        writeBehavior:
          type: string
          enum:
            - connect_or_create
          description: Validation is read-only; a real write would connect an existing language or create it if missing.
      additionalProperties: false
    SurveyValidationResult:
      type: object
      required:
        - valid
        - operation
        - invalid_params
      properties:
        valid:
          type: boolean
          description: Whether the submitted survey document is valid.
        operation:
          type: string
          enum:
            - create
            - patch
        invalid_params:
          type: array
          description: Repairable validation errors using document-relative paths.
          items:
            $ref: '#/components/schemas/InvalidParam'
        languages:
          type: array
          description: Languages that a successful write would connect or create. Present only when `valid=true`.
          items:
            $ref: '#/components/schemas/SurveyValidationLanguage'
      additionalProperties: false
    ActionClassResource:
      type: object
      description: A workspace action class that can be referenced from an app-survey trigger.
      required:
        - id
        - name
        - description
        - type
        - key
      properties:
        id:
          type: string
          description: Use this value as `distribution.triggers[].actionClassId` on an app survey.
        name:
          type: string
        description:
          type:
            - string
            - 'null'
        type:
          type: string
          enum:
            - code
            - noCode
        key:
          type:
            - string
            - 'null'
          description: Code-action key for code-type action classes; null for no-code actions.
      additionalProperties: false
    ContactAttributeKeyResource:
      type: object
      description: |
        A workspace contact-attribute key. Use `key` as `targeting.filters[].root.contactAttributeKey` on an app survey; `dataType` indicates which operators apply (e.g. `number`/`date` attributes support arithmetic/date operators).
      required:
        - id
        - key
        - name
        - description
        - type
        - dataType
      properties:
        id:
          type: string
          format: cuid2
        key:
          type: string
          description: The attribute key used in targeting filters (e.g. `plan`, `role`).
        name:
          type:
            - string
            - 'null'
          description: Human-readable display name, or null.
        description:
          type:
            - string
            - 'null'
        type:
          type: string
          enum:
            - default
            - custom
          description: Whether this is a built-in (`default`) or workspace-defined (`custom`) attribute.
        dataType:
          type: string
          enum:
            - string
            - number
            - date
      additionalProperties: false

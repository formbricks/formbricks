# V3 API — Surveys + Feedback Records (hand-maintained; not generated by generate-api-specs).
# Implementations:
#   Surveys (in-app route handlers): apps/web/app/api/v3/surveys/route.ts
#                                    apps/web/app/api/v3/surveys/[surveyId]/route.ts
#   Feedback Records (gateway-proxied to upstream Hub): the public paths /api/v3/feedbackRecords/*
#     are matched by the Envoy ingress (charts/formbricks/templates/envoy-gateway-resources.yaml)
#     and forwarded to Hub at /v1/feedback-records/*. Authorization runs in the Next.js ext-auth
#     callback at apps/web/modules/hub/feedback-records-gateway.ts.
#   Gateway tokens: apps/web/app/api/v3/gateway/token/route.ts
#                   apps/web/app/api/v3/feedbackRecords/token/route.ts

openapi: 3.1.0
info:
  title: Formbricks API v3
  description: |
    **Surveys** and **Feedback Records** APIs. Authenticate with **`x-api-key`** (recommended for server-to-server), a **session cookie**, or a short-lived **gateway bearer token** issued by the token endpoints.

    **Spec location:** `docs/api-v3-reference/openapi.yml` (alongside v2 at `docs/api-v2-reference/openapi.yml`).

    **workspaceId**
    Query param `workspaceId` is the canonical container identifier for this API.
    **Deprecated compatibility:** the older `environmentId` identifier is still accepted
    for compatibility but should no longer be used in new integrations.

    **Auth**
    Authenticate with either a session cookie or **`x-api-key`**. In dual-auth mode, V3 checks the API key first when the header is present, otherwise it uses the session path. Unauthenticated callers get **401** before query validation.

    **Pagination**
    Cursor-based pagination with **limit** + opaque **cursor** token. Responses return `meta.nextCursor`; pass that value back as `cursor` to fetch the next page. Responses also include `meta.totalCount`, the total number of surveys matching the current filters across all pages. There is no `offset` in this contract.

    **Filtering**
    Filters use explicit operator-style query parameters under the **`filter[...]` family**. This endpoint supports `filter[name][contains]`, `filter[status][in]`, and `filter[type][in]`. Multi-value filters use repeated keys or comma-separated values (e.g. `filter[status][in]=draft&filter[status][in]=inProgress` or `filter[status][in]=draft,inProgress`). Sorting remains a flat `sortBy` query parameter.

    **Security**
    Missing/forbidden workspace returns **403** with a generic message (not **404**) so resource existence is not leaked. List responses use `private, no-store`.

    **OpenAPI**
    This YAML is **not** produced by `pnpm generate-api-specs` (that script only builds v2 → `docs/api-v2-reference/openapi.yml`). Update this file when the route contract changes.

    **Overview migration note**
    The v3-backed survey overview page intentionally removes actions that are not yet exposed by this contract: `Created by` filtering, `Duplicate`, `Copy...`, `Preview`, and `Copy link`.

    **Next steps (out of scope for this spec)**
    Additional v3 survey endpoints, optional ETag/304, field selection — see Survey-Server-Actions.md Part III.
  version: 0.1.0
  x-implementation-notes:
    route: apps/web/app/api/v3/surveys/route.ts
    query-parser: apps/web/app/api/v3/surveys/parse-v3-surveys-list-query.ts
    auth: apps/web/app/api/v3/lib/auth.ts
    workspace-resolution: apps/web/app/api/v3/lib/workspace-context.ts
    openapi-generated: false
    pagination-model: cursor
    cursor-pagination: supported
paths:
  /api/v3/surveys:
    get:
      operationId: getSurveysV3
      summary: List surveys
      description: |
        Returns surveys for the workspace. Session cookie or x-api-key.
        Note: Environments are deprecated. Use workspace/workspaceId terminology.
      tags:
        - V3 Surveys
      parameters:
        - in: query
          name: workspaceId
          required: true
          schema:
            type: string
            format: cuid2
          description: |
            Workspace identifier. This is the canonical container ID for v3 APIs.
        - in: query
          name: environmentId
          required: false
          deprecated: true
          schema:
            type: string
            format: cuid2
          description: |
            Deprecated: use `workspaceId`. This alias is retained for backward compatibility.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Page size (max 100)
        - in: query
          name: cursor
          schema:
            type: string
          description: |
            Opaque cursor returned as `meta.nextCursor` from the previous page. Omit on the first request.
        - in: query
          name: includeTotalCount
          schema:
            type: boolean
            default: true
          description: |
            Whether to calculate `meta.totalCount` for this request. Set to `false` on cursor-pagination follow-up requests to skip the extra count query; in that case `meta.totalCount` is `null`.
        - in: query
          name: filter[name][contains]
          schema:
            type: string
            maxLength: 512
          description: Case-insensitive substring match on survey name (same as in-app list filters).
        - in: query
          name: filter[status][in]
          schema:
            type: array
            items:
              type: string
              enum: [draft, inProgress, paused, completed]
          style: form
          explode: true
          description: |
            Survey status filter. Repeat the parameter (`filter[status][in]=draft&filter[status][in]=inProgress`) or use comma-separated values (`filter[status][in]=draft,inProgress`). Invalid values → **400**.
        - in: query
          name: filter[type][in]
          schema:
            type: array
            items:
              type: string
              enum: [link, app]
          style: form
          explode: true
          description: Survey type filter (`link` / `app`). Same repeat-or-comma rules as `filter[status][in]`.
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, updatedAt, name, relevance]
          description: Sort order. Defaults to `updatedAt`. The `cursor` token is bound to the selected sort order.
      responses:
        "200":
          description: Surveys retrieved successfully
          headers:
            X-Request-Id:
              schema: { type: string }
              description: Request correlation ID
            Cache-Control:
              schema: { type: string }
              example: "private, no-store"
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SurveyListItem"
                  meta:
                    type: object
                    required: [limit, nextCursor, totalCount]
                    properties:
                      limit: { type: integer }
                      nextCursor:
                        type: string
                        nullable: true
                        description: Opaque cursor for the next page. `null` when there are no more results.
                      totalCount:
                        type: integer
                        nullable: true
                        minimum: 0
                        description: Total number of surveys matching the current filters across all pages. `null` when `includeTotalCount=false`.
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Not authenticated (no valid session or API key)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Forbidden — no access, or workspace does not exist (404 not used; avoids existence leak)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds until the current rate-limit window resets
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
      security:
        - sessionAuth: []
        - apiKeyAuth: []
  /api/v3/surveys/{surveyId}:
    delete:
      operationId: deleteSurveyV3
      summary: Delete a survey
      description: Deletes a survey by id. Session cookie or x-api-key.
      tags:
        - V3 Surveys
      parameters:
        - in: path
          name: surveyId
          required: true
          schema:
            type: string
            format: cuid2
          description: Survey identifier.
      responses:
        "200":
          description: Survey deleted successfully
          headers:
            X-Request-Id:
              schema: { type: string }
              description: Request correlation ID
            Cache-Control:
              schema: { type: string }
              example: "private, no-store"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyDeleteResponse"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Not authenticated (no valid session or API key)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Forbidden — no access, or survey does not exist (404 not used; avoids existence leak)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds until the current rate-limit window resets
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
      security:
        - sessionAuth: []
        - apiKeyAuth: []

  /api/v3/gateway/token:
    post:
      operationId: createGatewayToken
      summary: Issue a gateway service bearer token
      description: |
        Returns a short-lived JWT scoped to a gateway service. Requires a valid **session cookie** (this endpoint is for in-browser code that does not have an API key).

        Use the returned token as `Authorization: Bearer <token>` on subsequent calls to the gateway-proxied Feedback Records endpoints. For server-to-server use, prefer **`x-api-key`** directly — you do not need a token.
      tags:
        - V3 Gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service]
              properties:
                service:
                  type: string
                  enum: [feedbackRecords]
                  description: Gateway service the token authorizes.
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayTokenResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
      security:
        - sessionAuth: []

  /api/v3/feedbackRecords/token:
    post:
      operationId: createFeedbackRecordsToken
      summary: Issue a Feedback Records gateway bearer token
      description: |
        Shorthand for `POST /api/v3/gateway/token` with `service=feedbackRecords`. Returns a short-lived JWT. Requires a valid **session cookie**.
      tags:
        - V3 Gateway
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayTokenResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
      security:
        - sessionAuth: []

  /api/v3/feedbackRecords:
    get:
      operationId: listFeedbackRecords
      summary: List Feedback Records
      description: |
        Returns Feedback Records inside one **Feedback Directory**. Cursor-based pagination — pass the previous response's `next_cursor` as `cursor` on the next request.

        The caller must have access to the target Feedback Directory through the authenticating workspace (API key) or organization/workspace team membership (session/token).
      tags:
        - V3 Feedback Records
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema: { type: string, format: cuid2 }
          description: |
            **Feedback Directory ID.** The parameter is named `tenant_id` to match the upstream Hub contract; in Formbricks it always refers to a Feedback Directory.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
          description: Opaque keyset cursor from the previous page's `next_cursor`.
        - in: query
          name: field_id
          schema: { type: string }
        - in: query
          name: field_type
          schema:
            type: string
            enum: [text, categorical, nps, csat, ces, rating, number, boolean, date]
        - in: query
          name: field_group_id
          schema: { type: string }
        - in: query
          name: source_id
          schema: { type: string }
        - in: query
          name: source_type
          schema: { type: string }
        - in: query
          name: submission_id
          schema: { type: string }
        - in: query
          name: user_id
          schema: { type: string }
        - in: query
          name: since
          schema: { type: string, format: date-time }
          description: Filter `collected_at >= since` (ISO 8601).
        - in: query
          name: until
          schema: { type: string, format: date-time }
          description: Filter `collected_at <= until` (ISO 8601).
      responses:
        "200":
          description: Records retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecordListResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
      security:
        - apiKeyAuth: []
        - sessionAuth: []
        - bearerAuth: []
    post:
      operationId: createFeedbackRecord
      summary: Create a Feedback Record
      description: |
        Creates a record in the given Feedback Directory.

        **Idempotent ingestion.** Records are unique on `(tenant_id, submission_id, field_id)`. Re-posting with the same triple updates the existing record instead of creating a duplicate.

        The `value_*` field you populate should match `field_type`:
        - `value_text` for `text`, `categorical`
        - `value_number` for `nps`, `csat`, `ces`, `rating`, `number`
        - `value_boolean` for `boolean`
        - `value_date` for `date`
      tags:
        - V3 Feedback Records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRecordCreateParams"
      responses:
        "200":
          description: Record created or updated (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecord"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
      security:
        - apiKeyAuth: []
        - sessionAuth: []
        - bearerAuth: []
    delete:
      operationId: bulkDeleteFeedbackRecords
      summary: Bulk delete Feedback Records by user_id (GDPR erasure)
      description: |
        Permanently deletes records matching `user_id`. Designed for GDPR Article 17 (Right to Erasure) requests.

        Omit `tenant_id` to delete that user's records across **every Feedback Directory** the caller has access to. Provide `tenant_id` to restrict the delete to a single directory.
      tags:
        - V3 Feedback Records
      parameters:
        - in: query
          name: user_id
          required: true
          schema: { type: string }
        - in: query
          name: tenant_id
          schema: { type: string, format: cuid2 }
          description: Optional Feedback Directory scope.
      responses:
        "200":
          description: Records deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecordBulkDeleteResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
      security:
        - apiKeyAuth: []
        - sessionAuth: []
        - bearerAuth: []

  /api/v3/feedbackRecords/{id}:
    get:
      operationId: retrieveFeedbackRecord
      summary: Retrieve a Feedback Record
      tags:
        - V3 Feedback Records
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Record retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecord"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
      security:
        - apiKeyAuth: []
        - sessionAuth: []
        - bearerAuth: []
    patch:
      operationId: updateFeedbackRecord
      summary: Update a Feedback Record
      description: |
        Mutable subset only. Identity fields (`tenant_id`, `submission_id`, `field_id`, `field_type`, `source_type`, `collected_at`) cannot be changed via update — recreate the record instead.
      tags:
        - V3 Feedback Records
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRecordUpdateParams"
      responses:
        "200":
          description: Record updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecord"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
      security:
        - apiKeyAuth: []
        - sessionAuth: []
        - bearerAuth: []
    delete:
      operationId: deleteFeedbackRecord
      summary: Delete a single Feedback Record
      tags:
        - V3 Feedback Records
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Record deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
      security:
        - apiKeyAuth: []
        - sessionAuth: []
        - bearerAuth: []

  /api/v3/feedbackRecords/{id}/similar:
    get:
      operationId: retrieveSimilarFeedbackRecords
      summary: Retrieve similar Feedback Records (by embedding)
      description: |
        Returns records semantically similar to the given one, scored by cosine similarity over text embeddings.

        Requires embeddings to be configured on the instance (`EMBEDDING_PROVIDER` and `EMBEDDING_MODEL`). Returns **503** when embeddings are disabled.

        Only records with non-empty `value_text` are embedded, so an `id` pointing to a record without text returns an empty result set.
      tags:
        - V3 Feedback Records
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: tenant_id
          required: true
          schema: { type: string, format: cuid2 }
          description: Feedback Directory ID. Must match the source record's directory.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: min_score
          schema: { type: number, minimum: 0, maximum: 1, default: 0.7 }
          description: Minimum cosine similarity to include in results.
      responses:
        "200":
          description: Similar records retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecordSimilarResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
      security:
        - apiKeyAuth: []
        - sessionAuth: []
        - bearerAuth: []

  /api/v3/feedbackRecords/search/semantic:
    post:
      operationId: semanticSearchFeedbackRecords
      summary: Semantic search across Feedback Records
      description: |
        Embeds the query text and returns Feedback Records ranked by cosine similarity. Scoped to a single Feedback Directory.

        Requires embeddings to be configured on the instance. Returns **503** when embeddings are disabled.
      tags:
        - V3 Feedback Records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query, tenant_id]
              properties:
                query:
                  type: string
                  description: Free-text search query. Embedded and compared via cosine similarity.
                tenant_id:
                  type: string
                  format: cuid2
                  description: Feedback Directory ID.
                limit: { type: integer, minimum: 1, maximum: 100, default: 10 }
                cursor: { type: string }
                min_score: { type: number, minimum: 0, maximum: 1, default: 0.7 }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackRecordSimilarResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
      security:
        - apiKeyAuth: []
        - sessionAuth: []
        - bearerAuth: []

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: |
        NextAuth session JWT cookie. **Development:** often `next-auth.session-token`.
        **Production (HTTPS):** often `__Secure-next-auth.session-token`. Send the cookie your browser receives after sign-in.
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        Formbricks management API key. Generate one from **Workspace Settings → API Keys**.

        For **Feedback Records**, the key's workspace must have access to the target Feedback Directory; `read` for `GET`, `write` for `POST` / `PATCH` / `DELETE`.

        The Hub internal credential (`HUB_API_KEY`) is **never used by clients** — it's a server-side platform secret injected by the gateway after authorization succeeds.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived gateway JWT issued by `POST /api/v3/feedbackRecords/token` or `POST /api/v3/gateway/token`. Intended for **session-only callers** (e.g. the in-app browser code) that cannot present an `x-api-key`. Server-to-server clients should use `apiKeyAuth` instead.
  schemas:
    SurveyListItem:
      type: object
      description: |
        Shape returned by `GET /api/v3/surveys`. Serialized dates are ISO 8601 strings.
        The v3 overview contract intentionally omits deprecated `environmentId` and internal fields such as `_count`.
        Legacy DB rows may include survey **type** values `website` or `web` (see Prisma); filter **type** only accepts `link` | `app`.
      properties:
        id: { type: string }
        name: { type: string }
        workspaceId: { type: string }
        type: { type: string, enum: [link, app, website, web] }
        status:
          type: string
          enum: [draft, inProgress, paused, completed]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        responseCount: { type: integer }
        creator: { type: object, nullable: true, properties: { name: { type: string } } }
        singleUse:
          type: object
          nullable: true
          properties:
            enabled: { type: boolean }
            isEncrypted: { type: boolean }
    SurveyDeleteResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id]
          properties:
            id: { type: string }
    Problem:
      type: object
      description: RFC 9457 Problem Details for HTTP APIs (`application/problem+json`). Responses typically include a machine-readable `code` field alongside `title`, `status`, `detail`, and `requestId`.
      required: [title, status, detail, requestId]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code:
          type: string
          enum: [bad_request, not_authenticated, forbidden, internal_server_error, too_many_requests]
        requestId: { type: string }
        details: { type: object }
        invalid_params:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              reason: { type: string }
    GatewayTokenResponse:
      type: object
      required: [token, expiresAt]
      properties:
        token:
          type: string
          description: "Short-lived JWT. Send as `Authorization: Bearer <token>`."
        expiresAt:
          type: string
          format: date-time
    FeedbackRecordFieldType:
      type: string
      enum: [text, categorical, nps, csat, ces, rating, number, boolean, date]
      description: |
        Normalized type of the recorded answer. Selects which `value_*` field is meaningful.
    FeedbackRecord:
      type: object
      description: A single Feedback Record inside a Feedback Directory.
      required:
        - id
        - tenant_id
        - submission_id
        - field_id
        - field_type
        - source_type
        - collected_at
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid, description: "UUIDv7 primary key." }
        tenant_id:
          type: string
          format: cuid2
          description: Feedback Directory ID.
        submission_id:
          type: string
          description: Stable logical-submission identifier. The third part of the idempotency key.
        field_id:
          type: string
          description: Stable identifier for the question/field within the submission.
        field_type: { $ref: "#/components/schemas/FeedbackRecordFieldType" }
        source_type:
          type: string
          description: "Kind of source (e.g. `survey`, `csv`, `review`, `support`)."
        source_id: { type: string, nullable: true, description: "Original survey/form/ticket ID." }
        source_name: { type: string, nullable: true }
        field_label: { type: string, nullable: true, description: Question text or field label. }
        field_group_id: { type: string, nullable: true, description: Groups related fields (matrix, ranking, grid). }
        field_group_label: { type: string, nullable: true }
        value_text: { type: string, nullable: true }
        value_number: { type: number, nullable: true }
        value_boolean: { type: boolean, nullable: true }
        value_date: { type: string, format: date-time, nullable: true }
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Free-form context (device, campaign, custom fields).
        language: { type: string, nullable: true, description: ISO 639-1 language code. }
        user_id: { type: string, nullable: true, description: "Anonymous identifier. Do not store PII." }
        collected_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    FeedbackRecordCreateParams:
      type: object
      required: [tenant_id, submission_id, field_id, field_type, source_type]
      properties:
        tenant_id: { type: string, format: cuid2, description: Feedback Directory ID. }
        submission_id: { type: string }
        field_id: { type: string }
        field_type: { $ref: "#/components/schemas/FeedbackRecordFieldType" }
        source_type: { type: string }
        source_id: { type: string, nullable: true }
        source_name: { type: string, nullable: true }
        field_label: { type: string, nullable: true }
        field_group_id: { type: string }
        field_group_label: { type: string, nullable: true }
        value_text: { type: string, nullable: true }
        value_number: { type: number, minimum: -1e15, maximum: 1e15 }
        value_boolean: { type: boolean }
        value_date: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true
        language: { type: string }
        user_id: { type: string }
        collected_at:
          type: string
          format: date-time
          description: Defaults to now. Must be between 1970-01-01 and 2080-12-31.
    FeedbackRecordUpdateParams:
      type: object
      description: |
        Mutable fields only. Identity fields cannot be changed via update.
      properties:
        value_text: { type: string }
        value_number: { type: number, minimum: -1e15, maximum: 1e15 }
        value_boolean: { type: boolean }
        value_date: { type: string, format: date-time }
        language: { type: string }
        user_id: { type: string }
        metadata:
          type: object
          additionalProperties: true
    FeedbackRecordListResponse:
      type: object
      required: [data, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/FeedbackRecord" }
        limit: { type: integer }
        next_cursor:
          type: string
          nullable: true
          description: Opaque keyset cursor. Present only when there may be more pages.
    FeedbackRecordBulkDeleteResponse:
      type: object
      required: [deleted_count, message]
      properties:
        deleted_count: { type: integer, minimum: 0 }
        message: { type: string }
    FeedbackRecordSimilarItem:
      type: object
      required: [feedback_record_id, score, field_label, value_text]
      properties:
        feedback_record_id: { type: string, format: uuid }
        score:
          type: number
          minimum: 0
          maximum: 1
          description: "Cosine similarity (0 = unrelated, 1 = identical)."
        field_label: { type: string }
        value_text: { type: string }
    FeedbackRecordSimilarResponse:
      type: object
      required: [data, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/FeedbackRecordSimilarItem" }
        limit: { type: integer }
        next_cursor:
          type: string
          nullable: true
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Unauthorized:
      description: Not authenticated (no valid session, API key, or token)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Forbidden:
      description: Forbidden — no access to the target Feedback Directory (existence not leaked)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds until the current rate-limit window resets.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ServiceUnavailable:
      description: |
        Upstream Hub service unreachable, or instance-level feature (e.g. embeddings) not configured.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

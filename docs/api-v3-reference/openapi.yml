    patch:
      operationId: patchWorkflowV3
      summary: Update a workflow
      description: |
        Updates human-facing workflow metadata and/or the workflow definition. Status changes are
        handled by lifecycle endpoints (`enable`, `disable`, `archive`, `unarchive`) so the state
        machine remains explicit. Provided fields replace the corresponding stored fields; this
        endpoint does not implement JSON Patch.

        `name` and `description` can be updated in any state except `archived`. The `definition`
        can only be updated while the workflow is `draft` or `disabled`: the live version of an
        `enabled` workflow is an immutable snapshot, so definition changes require disabling (or
        moving to draft) first and re-enabling afterwards. Violations return **422** with code
        `invalid_workflow_state`. A structurally invalid definition returns **400** with structured `invalid_params`; the referenced survey and ending cards are not verified here — that existence check runs when the workflow is enabled.
      tags:
        - V3 Workflows
      parameters:
        - $ref: '#/components/parameters/WorkflowIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchWorkflowRequest'
      responses:
        '200':
          description: Workflow updated successfully
          headers:
            X-Request-Id:
              schema:
                type: string
